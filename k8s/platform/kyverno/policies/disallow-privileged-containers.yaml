apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged-containers
  annotations:
    policies.kyverno.io/title: Disallow Privileged Containers
    policies.kyverno.io/category: Pod Security Standards (Baseline)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Baseline and restricted namespaces in this homelab must not request privileged containers.
      Privileged namespaces are explicitly labeled in bootstrap root when workloads still need
      host access.
spec:
  admission: true
  emitWarning: false
  validationFailureAction: Enforce
  background: true
  rules:
    - name: privileged-containers
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: pod-security.kubernetes.io/enforce
                    operator: In
                    values:
                      - baseline
                      - restricted
      validate:
        allowExistingViolations: true
        message: >-
          Baseline and restricted namespaces must not run privileged containers.
        pattern:
          spec:
            containers:
              - =(securityContext):
                  =(privileged): "false"
            =(initContainers):
              - =(securityContext):
                  =(privileged): "false"
            =(ephemeralContainers):
              - =(securityContext):
                  =(privileged): "false"
