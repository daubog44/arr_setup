apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privilege-escalation
  annotations:
    policies.kyverno.io/title: Disallow Privilege Escalation
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Restricted namespaces in this homelab must set allowPrivilegeEscalation to false.
      Privileged namespaces are the explicit repo-managed carve-out for workloads that still
      need elevated behavior.
spec:
  admission: true
  emitWarning: false
  validationFailureAction: Enforce
  background: true
  rules:
    - name: privilege-escalation
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: pod-security.kubernetes.io/enforce
                    operator: In
                    values:
                      - restricted
      validate:
        allowExistingViolations: true
        message: >-
          Restricted namespaces must set allowPrivilegeEscalation to false for all containers.
        pattern:
          spec:
            containers:
              - securityContext:
                  allowPrivilegeEscalation: false
            =(initContainers):
              - securityContext:
                  allowPrivilegeEscalation: false
            =(ephemeralContainers):
              - securityContext:
                  allowPrivilegeEscalation: false
