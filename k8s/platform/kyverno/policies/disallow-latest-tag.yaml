apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Baseline and restricted namespaces in this homelab must pin image tags instead of
      relying on the mutable latest tag. Namespaces explicitly labeled
      pod-security.kubernetes.io/enforce=privileged are the documented carve-out.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: pod-security.kubernetes.io/enforce
                    operator: In
                    values:
                      - baseline
                      - restricted
      validate:
        message: An image tag is required.
        pattern:
          spec:
            containers:
              - image: "*:*"
    - name: validate-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: pod-security.kubernetes.io/enforce
                    operator: In
                    values:
                      - baseline
                      - restricted
      validate:
        message: Using a mutable image tag such as latest is not allowed in baseline or restricted namespaces.
        pattern:
          spec:
            containers:
              - image: "!*:latest"
