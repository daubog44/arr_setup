apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: haac-radarr-pod-delete
  namespace: litmus
  annotations:
    probeRef: "[]"
  labels:
    context: "media_radarr_pod-delete"
    haac.nucleoautogenerativo.it/template: "true"
    weight: "10"
spec:
  annotationCheck: "false"
  appinfo:
    appns: "media"
    applabel: "app=radarr"
    appkind: "deployment"
  jobCleanUpPolicy: "delete"
  engineState: "active"
  chaosServiceAccount: litmus-admin
  experiments:
    - name: pod-delete
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "15"
            - name: CHAOS_INTERVAL
              value: "5"
            - name: FORCE
              value: "false"
