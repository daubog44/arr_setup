apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  admin.enabled: "false"
  users.anonymous.enabled: "false"
  url: https://argocd.nucleoautogenerativo.it
  # Enable OIDC
  oidc.config: |
    name: Authelia
    issuer: https://auth.nucleoautogenerativo.it
    clientID: argocd
    clientSecret: $argocd-oidc-secret:clientSecret
    requestedScopes: ["openid", "profile", "email", "groups"]
    requestedIDTokenClaims: {"groups": {"essential": true}}
  resource.customizations.health.aquasecurity.github.io_ConfigAuditReport: |
    hs = {}
    hs.status = "Healthy"
    hs.message = "Trivy reports are security findings, not GitOps readiness failures."
    return hs
  resource.customizations.health.aquasecurity.github.io_ExposedSecretReport: |
    hs = {}
    hs.status = "Healthy"
    hs.message = "Trivy reports are security findings, not GitOps readiness failures."
    return hs
  resource.customizations.health.aquasecurity.github.io_RbacAssessmentReport: |
    hs = {}
    hs.status = "Healthy"
    hs.message = "Trivy reports are security findings, not GitOps readiness failures."
    return hs
  resource.customizations.health.aquasecurity.github.io_ClusterRbacAssessmentReport: |
    hs = {}
    hs.status = "Healthy"
    hs.message = "Trivy reports are security findings, not GitOps readiness failures."
    return hs
  resource.customizations.health.aquasecurity.github.io_VulnerabilityReport: |
    hs = {}
    hs.status = "Healthy"
    hs.message = "Trivy reports are security findings, not GitOps readiness failures."
    return hs
