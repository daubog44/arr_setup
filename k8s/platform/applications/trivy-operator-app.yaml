apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trivy-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "9"
    renovate/helm-chart: "trivy-operator"
spec:
  project: platform
  source:
    repoURL: https://aquasecurity.github.io/helm-charts/
    chart: trivy-operator
    # renovate: registryUrl=https://aquasecurity.github.io/helm-charts/ chart=trivy-operator
    targetRevision: "0.32.1"
    helm:
      values: |
        # Keep Trivy bounded on this single-master SQLite/Kine control plane.
        # The chart expects namespace filters at the top level, not under `operator`.
        targetNamespaces: "media,mgmt"
        excludeNamespaces: "argocd,kube-system,longhorn-system,monitoring,security,chaos,node-feature-discovery,cloudflared"

        trivy:
          ignoreUnfixed: true # In a homelab, only care about actionable/fixed CVEs
          
        # Enable Prometheus metrics for Vulnerability counts
        serviceMonitor:
          enabled: true
          interval: 30s
          endpointAdditionalProperties:
            relabelings:
              - action: replace
                targetLabel: cluster
                replacement: "haacarr-master"
          
        operator:
          scanJobTimeout: 3m
          scanJobsConcurrentLimit: 1
          vulnerabilityScannerEnabled: true
          sbomGenerationEnabled: false
          configAuditScannerEnabled: true
          rbacAssessmentScannerEnabled: true
          # Node infra/compliance scans require hostPID and hostPath mounts.
          # Keep them disabled for the baseline PodSecurity/LXC homelab model.
          infraAssessmentScannerEnabled: false
          clusterComplianceEnabled: false
          exposedSecretScannerEnabled: true
          scannerReportTTL: "6h"

        trivyOperator:
          reportRecordFailedChecksOnly: true

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
          
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true
