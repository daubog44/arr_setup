apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
  annotations:
    renovate/helm-chart: "falcosidekick"
spec:
  project: platform
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falcosidekick
    # renovate: registryUrl=https://falcosecurity.github.io/charts chart=falcosidekick
    targetRevision: "0.13.1"
    helm:
      values: |
        replicaCount: 1

        serviceMonitor:
          enabled: true

        config:
          ntfy:
            url: "https://ntfy.nucleoautogenerativo.it/haac-alerts"
            checkcert: false

        webui:
          enabled: true
          replicaCount: 1
          disableauth: true
          redis:
            enabled: true
            storageEnabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
