apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
  annotations:
    renovate/helm-chart: "falcosidekick"
spec:
  project: platform
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falcosidekick
    # renovate: registryUrl=https://falcosecurity.github.io/charts chart=falcosidekick
    targetRevision: "0.13.1"
    helm:
      values: |
        replicaCount: 1

        serviceMonitor:
          enabled: true

        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi

        config:
          ntfy:
            url: "https://ntfy.nucleoautogenerativo.it/haac-alerts"
            checkcert: false

        webui:
          enabled: true
          replicaCount: 1
          disableauth: true
          initContainer:
            resources:
              requests:
                cpu: 25m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 128Mi
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          redis:
            enabled: true
            storageEnabled: false
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 250m
                memory: 256Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
