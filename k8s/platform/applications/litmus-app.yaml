apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litmus
  namespace: argocd
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true
    renovate/helm-chart: "litmus"
spec:
  project: platform
  source:
    repoURL: https://litmuschaos.github.io/litmus-helm/
    chart: litmus
    # renovate: registryUrl=https://litmuschaos.github.io/litmus-helm/ chart=litmus
    targetRevision: "3.28.0"
    helm:
      values: |
        existingSecret: litmus-admin-credentials
        portal:
          server:
            service:
              type: ClusterIP

        # Deploy the chaos center and agent together for homelab simplicity
        adminMode: true
        mongodb:
          image:
            registry: docker.io
            repository: bitnamilegacy/mongodb
            tag: 8.0.13-debian-12-r0
          auth:
            existingSecret: litmus-mongodb-credentials
          architecture: replicaset
          replicaCount: 1
          livenessProbe:
            initialDelaySeconds: 120
            timeoutSeconds: 30
          readinessProbe:
            initialDelaySeconds: 30
            timeoutSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 500Mi
            limits:
              cpu: "2"
              memory: 2Gi
              ephemeral-storage: 1Gi
          arbiter:
            enabled: false
          volumePermissions:
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 64Mi
          persistence:
            storageClass: local-path
        
  destination:
    server: https://kubernetes.default.svc
    namespace: chaos
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
