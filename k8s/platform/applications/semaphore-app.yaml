---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: semaphore
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.ntfy: ""
    notifications.argoproj.io/subscribe.on-degraded.ntfy: ""
    notifications.argoproj.io/subscribe.on-sync-succeeded.ntfy: ""
spec:
  project: platform
  source:
    repoURL: https://semaphoreui.github.io/charts
    chart: semaphore
    # renovate: registryUrl=https://charts.semaphoreui.com chart=semaphore
    targetRevision: "16.0.11"
    helm:
      values: |
        # Deployment basics
        replicaCount: 1

        service:
          type: ClusterIP
          port: 3000

        # Database: use the bundled PostgreSQL subchart
        database:
          type: postgres
          host: postgresql
          port: 5432
          name: semaphore
          usernameFromSecret: false
          username: semaphore
          existingSecret: semaphore-db-secret
          passwordKey: POSTGRES_PASSWORD
          options:
            sslmode: disable

        postgresql:
          enabled: true
          auth:
            username: semaphore
            database: semaphore
            existingSecret: semaphore-db-secret
            secretKeys:
              adminPasswordKey: POSTGRES_PASSWORD
              userPasswordKey: POSTGRES_PASSWORD

        secrets:
          existingSecret: semaphore-general

        admin:
          create: true
          existingSecret: semaphore-db-secret
          fullnameKey: ADMIN_NAME
          usernameKey: ADMIN_USERNAME
          passwordKey: ADMIN_PASSWORD
          emailKey: ADMIN_EMAIL

        oidc:
          enable: false

        ingress:
          enabled: false

        extraManifests:
          - apiVersion: traefik.io/v1alpha1
            kind: IngressRoute
            metadata:
              name: semaphore
              namespace: mgmt
            spec:
              entryPoints:
                - web
                - websecure
              routes:
                - match: Host(`ansible.nucleoautogenerativo.it`)
                  kind: Rule
                  services:
                    - name: semaphore
                      port: 3000

        persistence:
          enabled: true
          storageClass: longhorn
          size: 1Gi

        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        # Mount the dynamic Ansible inventory from ConfigMap
        # Updated by Taskfile after each Terraform run
        extraVolumes:
          - name: ansible-inventory
            configMap:
              name: ansible-inventory-cm
        extraVolumeMounts:
          - name: ansible-inventory
            mountPath: /opt/ansible
            readOnly: true

  destination:
    server: https://kubernetes.default.svc
    namespace: mgmt
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
