apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/compare-options: ServerSideDiff=true
    renovate/helm-chart: "kube-prometheus-stack"
spec:
  project: platform
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    # renovate: registryUrl=https://prometheus-community.github.io/helm-charts chart=kube-prometheus-stack
    targetRevision: "84.5.0"
    helm:
      values: |
        # Disable default rules that are too noisy for homelabs or not applicable
        defaultRules:
          create: true
          rules:
            kubeApiserverAvailability: false
            kubeApiserverSlos: false
            kubernetesSystem: false

        alertmanager:
          enabled: true
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['namespace', 'alertname']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: 'ntfy'
              routes:
              - matchers:
                - alertname = "Watchdog"
                receiver: 'null'
            receivers:
            - name: 'null'
            - name: 'ntfy'
              webhook_configs:
                - url: 'https://ntfy.nucleoautogenerativo.it/haac-alerts'
                  send_resolved: true

        grafana:
          enabled: true
          forceDeployDatasources: true
          forceDeployDashboards: true
          defaultDashboardsEnabled: true
          podAnnotations:
            checksum/grafana-oidc-secret: "60e2c2a547257c9cc43176895eee24667aaa3dffe6546a978eaf4002dc4d378f"
            checksum/grafana-observability-surface: "v3-haacarr-master"
          admin:
            existingSecret: grafana-admin-secret
            userKey: admin-user
            passwordKey: admin-password
          grafana.ini:
            server:
              root_url: "https://grafana.nucleoautogenerativo.it"
            auth:
              disable_login_form: true
              oauth_auto_login: true
            auth.basic:
              enabled: true
            auth.generic_oauth:
              enabled: true
              name: Authelia
              icon: signin
              client_id: grafana
              client_secret: "$__env{GRAFANA_OIDC_SECRET}"
              auth_style: InHeader
              scopes: openid profile email groups
              empty_scopes: false
              auth_url: https://auth.nucleoautogenerativo.it/api/oidc/authorization
              token_url: https://auth.nucleoautogenerativo.it/api/oidc/token
              api_url: https://auth.nucleoautogenerativo.it/api/oidc/userinfo
              # Map groups to Grafana roles. Assuming Authelia users are in 'admins' group.
              role_attribute_path: contains(groups[*], 'admins') && 'Admin' || 'Viewer'
          envFromSecret: "grafana-oidc-secret"
          ingress:
            enabled: false
          datasources:
            datasources.yaml:
              apiVersion: 1
              datasources:
                - name: Prometheus
                  type: prometheus
                  uid: prometheus
                  url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
                  access: proxy
                  isDefault: true
                  jsonData:
                    httpMethod: POST
                    timeInterval: 30s
                - name: Alertmanager
                  type: alertmanager
                  uid: alertmanager
                  url: http://kube-prometheus-stack-alertmanager.monitoring:9093/
                  access: proxy
                  jsonData:
                    handleGrafanaManagedAlerts: false
                    implementation: prometheus
          sidecar:
            dashboards:
              enabled: true
            datasources:
              enabled: false

          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
              - name: 'default'
                orgId: 1
                folder: ''
                type: file
                disableDeletion: false
                editable: false
                options:
                  path: /var/lib/grafana/dashboards/default
          dashboards:
            default:
              argocd:
                gnetId: 14584
                revision: 1
                datasource: Prometheus
              kyverno:
                gnetId: 15987
                revision: 2
                datasource: Prometheus
              trivy-operator:
                gnetId: 17813
                revision: 2
                datasource: Prometheus
              qbittorrent:
                gnetId: 17897
                revision: 1
                datasource: Prometheus

        prometheusOperator:
          tls:
            enabled: false
          admissionWebhooks:
            # Avoid ArgoCD hook deletion stalls during first bootstrap. TLS is
            # disabled with the webhook because the chart otherwise mounts the
            # webhook-generated admission secret into the operator pod.
            enabled: false

        prometheus:
          additionalServiceMonitors:
            - name: argocd
              namespaceSelector:
                matchNames:
                  - argocd
              jobLabel: app.kubernetes.io/name
              selector:
                matchLabels:
                  app.kubernetes.io/part-of: argocd
              endpoints:
                - port: metrics
                  path: /metrics
                  interval: 30s
                  relabelings:
                    - action: replace
                      targetLabel: cluster
                      replacement: "haacarr-master"
            - name: qbittorrent
              namespaceSelector:
                matchNames:
                  - media
              selector:
                matchLabels:
                  app: downloaders
              endpoints:
                - port: metrics
                  path: /metrics
                  interval: 30s
                  relabelings:
                    - action: replace
                      targetLabel: cluster
                      replacement: "haacarr-master"
            - name: flaresolverr
              namespaceSelector:
                matchNames:
                  - media
              selector:
                matchLabels:
                  app: flaresolverr
              endpoints:
                - port: metrics
                  path: /metrics
                  interval: 30s
                  relabelings:
                    - action: replace
                      targetLabel: cluster
                      replacement: "haacarr-master"
            - name: radarr
              namespaceSelector:
                matchNames:
                  - media
              selector:
                matchLabels:
                  app: radarr
              endpoints:
                - port: metrics
                  path: /metrics
                  interval: 30s
                  relabelings:
                    - action: replace
                      targetLabel: cluster
                      replacement: "haacarr-master"
            - name: sonarr
              namespaceSelector:
                matchNames:
                  - media
              selector:
                matchLabels:
                  app: sonarr
              endpoints:
                - port: metrics
                  path: /metrics
                  interval: 30s
                  relabelings:
                    - action: replace
                      targetLabel: cluster
                      replacement: "haacarr-master"
            - name: prowlarr
              namespaceSelector:
                matchNames:
                  - media
              selector:
                matchLabels:
                  app: prowlarr
              endpoints:
                - port: metrics
                  path: /metrics
                  interval: 30s
                  relabelings:
                    - action: replace
                      targetLabel: cluster
                      replacement: "haacarr-master"
            - name: lidarr
              namespaceSelector:
                matchNames:
                  - media
              selector:
                matchLabels:
                  app: lidarr
              endpoints:
                - port: metrics
                  path: /metrics
                  interval: 30s
                  relabelings:
                    - action: replace
                      targetLabel: cluster
                      replacement: "haacarr-master"
            - name: sabnzbd
              namespaceSelector:
                matchNames:
                  - media
              selector:
                matchLabels:
                  app: sabnzbd
              endpoints:
                - port: metrics
                  path: /metrics
                  interval: 30s
                  relabelings:
                    - action: replace
                      targetLabel: cluster
                      replacement: "haacarr-master"
            - name: autobrr
              namespaceSelector:
                matchNames:
                  - media
              selector:
                matchLabels:
                  app: autobrr
              endpoints:
                - port: metrics
                  path: /metrics
                  interval: 30s
                  relabelings:
                    - action: replace
                      targetLabel: cluster
                      replacement: "haacarr-master"
            - name: bazarr
              namespaceSelector:
                matchNames:
                  - media
              selector:
                matchLabels:
                  app: bazarr-exportarr
              endpoints:
                - port: metrics
                  path: /metrics
                  interval: 30s
                  relabelings:
                    - action: replace
                      targetLabel: cluster
                      replacement: "haacarr-master"
            - name: unpackerr
              namespaceSelector:
                matchNames:
                  - media
              selector:
                matchLabels:
                  app: unpackerr
              endpoints:
                - port: metrics
                  path: /metrics
                  interval: 30s
                  relabelings:
                    - action: replace
                      targetLabel: cluster
                      replacement: "haacarr-master"
          prometheusSpec:
            securityContext:
              runAsNonRoot: false
              runAsUser: 0
              runAsGroup: 0
              fsGroup: 0
            configMaps: []
            prometheusConfigReloaderSpec:
              extraArgs:
                - --config-envsubst-file=/prometheus/config_out/prometheus.env.yaml
              volumeMounts:
                - name: config-out
                  mountPath: /prometheus/config_out
            containers:
              - name: prometheus
                args:
                  - --config.file=/prometheus/config_out/prometheus.env.yaml
                  - --storage.tsdb.path=/prometheus
                  - --web.console.templates=/etc/prometheus/consoles
                  - --web.console.libraries=/etc/prometheus/console_libraries
                  - --web.enable-lifecycle
                securityContext:
                  privileged: true
                  allowPrivilegeEscalation: true
                  readOnlyRootFilesystem: false
                volumeMounts:
                  - name: config-out
                    mountPath: /prometheus/config_out
                    readOnly: true
                  - name: etc-prometheus
                    mountPath: /etc/prometheus
            volumes:
              - name: etc-prometheus
                emptyDir: {}
            ruleSelectorNilUsesHelmValues: false
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            retention: 15d
            resources:
              requests:
                memory: 512Mi
              limits:
                memory: 1500Mi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi

        kubeControllerManager:
          enabled: false
        kubeApiServer:
          serviceMonitor:
            relabelings:
              - action: replace
                targetLabel: cluster
                replacement: "haacarr-master"
        kubeEtcd:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false

        additionalPrometheusRulesMap:
          node-problem-detector-rules:
            groups:
              - name: node-problem-detector
                rules:
                  - alert: NodeProblemDetected
                    expr: problem_gauge > 0
                    for: 1m
                    labels:
                      severity: critical
                    annotations:
                      summary: "Node problem detected on {{ $labels.node }}"
                      description: "Node {{ $labels.node }} reported a Kernel/System event: {{ $labels.reason }}."
          kube-apiserver-availability-rules:
            groups:
              - name: kube-apiserver-availability.rules
                rules:
                  - record: code_verb:apiserver_request_total:increase30d
                    expr: |
                      avg_over_time(code_verb:apiserver_request_total:increase1h[30d]) * 24 * 30
                  - record: code:apiserver_request_total:increase30d
                    labels:
                      verb: read
                    expr: |
                      sum by (cluster, code) (code_verb:apiserver_request_total:increase30d{verb=~"LIST|GET"})
                  - record: code:apiserver_request_total:increase30d
                    labels:
                      verb: write
                    expr: |
                      sum by (cluster, code) (code_verb:apiserver_request_total:increase30d{verb=~"POST|PUT|PATCH|DELETE"})
                  - record: cluster_verb_scope_le:apiserver_request_sli_duration_seconds_bucket:increase1h
                    expr: |
                      sum by (cluster, verb, scope, le) (increase(apiserver_request_sli_duration_seconds_bucket[1h]))
                  - record: cluster_verb_scope_le:apiserver_request_sli_duration_seconds_bucket:increase30d
                    expr: |
                      sum by (cluster, verb, scope, le) (
                        avg_over_time(cluster_verb_scope_le:apiserver_request_sli_duration_seconds_bucket:increase1h[30d]) * 24 * 30
                      )
                  - record: cluster_verb_scope:apiserver_request_sli_duration_seconds_count:increase1h
                    expr: |
                      sum by (cluster, verb, scope) (
                        cluster_verb_scope_le:apiserver_request_sli_duration_seconds_bucket:increase1h{le="+Inf"}
                      )
                  - record: cluster_verb_scope:apiserver_request_sli_duration_seconds_count:increase30d
                    expr: |
                      sum by (cluster, verb, scope) (
                        cluster_verb_scope_le:apiserver_request_sli_duration_seconds_bucket:increase30d{le="+Inf"}
                      )
                  - record: apiserver_request:availability30d
                    labels:
                      verb: all
                    expr: |
                      1 - (
                        (
                          sum by (cluster) (
                            cluster_verb_scope:apiserver_request_sli_duration_seconds_count:increase30d{verb=~"POST|PUT|PATCH|DELETE"}
                          )
                          -
                          sum by (cluster) (
                            cluster_verb_scope_le:apiserver_request_sli_duration_seconds_bucket:increase30d{verb=~"POST|PUT|PATCH|DELETE",le=~"1(\\.0)?"} or vector(0)
                          )
                        )
                        +
                        (
                          sum by (cluster) (
                            cluster_verb_scope:apiserver_request_sli_duration_seconds_count:increase30d{verb=~"LIST|GET"}
                          )
                          -
                          (
                            sum by (cluster) (
                              cluster_verb_scope_le:apiserver_request_sli_duration_seconds_bucket:increase30d{verb=~"LIST|GET",scope=~"resource|",le=~"1(\\.0)?"} or vector(0)
                            )
                            +
                            sum by (cluster) (
                              cluster_verb_scope_le:apiserver_request_sli_duration_seconds_bucket:increase30d{verb=~"LIST|GET",scope="namespace",le=~"5(\\.0)?"} or vector(0)
                            )
                            +
                            sum by (cluster) (
                              cluster_verb_scope_le:apiserver_request_sli_duration_seconds_bucket:increase30d{verb=~"LIST|GET",scope="cluster",le=~"30(\\.0)?"} or vector(0)
                            )
                          )
                        )
                        +
                        sum by (cluster) (code:apiserver_request_total:increase30d{code=~"5.."} or vector(0))
                      )
                      /
                      sum by (cluster) (code:apiserver_request_total:increase30d)
                  - record: apiserver_request:availability30d
                    labels:
                      verb: read
                    expr: |
                      1 - (
                        sum by (cluster) (
                          cluster_verb_scope:apiserver_request_sli_duration_seconds_count:increase30d{verb=~"LIST|GET"}
                        )
                        -
                        (
                          sum by (cluster) (
                            cluster_verb_scope_le:apiserver_request_sli_duration_seconds_bucket:increase30d{verb=~"LIST|GET",scope=~"resource|",le=~"1(\\.0)?"} or vector(0)
                          )
                          +
                          sum by (cluster) (
                            cluster_verb_scope_le:apiserver_request_sli_duration_seconds_bucket:increase30d{verb=~"LIST|GET",scope="namespace",le=~"5(\\.0)?"} or vector(0)
                          )
                          +
                          sum by (cluster) (
                            cluster_verb_scope_le:apiserver_request_sli_duration_seconds_bucket:increase30d{verb=~"LIST|GET",scope="cluster",le=~"30(\\.0)?"} or vector(0)
                          )
                        )
                        +
                        sum by (cluster) (code:apiserver_request_total:increase30d{verb="read",code=~"5.."} or vector(0))
                      )
                      /
                      sum by (cluster) (code:apiserver_request_total:increase30d{verb="read"})
                  - record: apiserver_request:availability30d
                    labels:
                      verb: write
                    expr: |
                      1 - (
                        (
                          sum by (cluster) (
                            cluster_verb_scope:apiserver_request_sli_duration_seconds_count:increase30d{verb=~"POST|PUT|PATCH|DELETE"}
                          )
                          -
                          sum by (cluster) (
                            cluster_verb_scope_le:apiserver_request_sli_duration_seconds_bucket:increase30d{verb=~"POST|PUT|PATCH|DELETE",le=~"1(\\.0)?"} or vector(0)
                          )
                        )
                        +
                        sum by (cluster) (code:apiserver_request_total:increase30d{verb="write",code=~"5.."} or vector(0))
                      )
                      /
                      sum by (cluster) (code:apiserver_request_total:increase30d{verb="write"})
                  - record: code_resource:apiserver_request_total:rate5m
                    labels:
                      verb: read
                    expr: |
                      sum by (cluster, code, resource) (rate(apiserver_request_total{job="apiserver",verb=~"LIST|GET"}[5m]))
                  - record: code_resource:apiserver_request_total:rate5m
                    labels:
                      verb: write
                    expr: |
                      sum by (cluster, code, resource) (rate(apiserver_request_total{job="apiserver",verb=~"POST|PUT|PATCH|DELETE"}[5m]))
                  - record: code_verb:apiserver_request_total:increase1h
                    expr: |
                      sum by (cluster, code, verb) (increase(apiserver_request_total{job="apiserver",verb=~"LIST|GET|POST|PUT|PATCH|DELETE",code=~"2.."}[1h]))
                  - record: code_verb:apiserver_request_total:increase1h
                    expr: |
                      sum by (cluster, code, verb) (increase(apiserver_request_total{job="apiserver",verb=~"LIST|GET|POST|PUT|PATCH|DELETE",code=~"3.."}[1h]))
                  - record: code_verb:apiserver_request_total:increase1h
                    expr: |
                      sum by (cluster, code, verb) (increase(apiserver_request_total{job="apiserver",verb=~"LIST|GET|POST|PUT|PATCH|DELETE",code=~"4.."}[1h]))
                  - record: code_verb:apiserver_request_total:increase1h
                    expr: |
                      sum by (cluster, code, verb) (increase(apiserver_request_total{job="apiserver",verb=~"LIST|GET|POST|PUT|PATCH|DELETE",code=~"5.."}[1h]))

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
