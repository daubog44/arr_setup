---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: haac-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/daubog44/arr_setup.git
    targetRevision: main
    path: k8s/bootstrap/root
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
