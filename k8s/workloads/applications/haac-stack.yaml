---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: haac-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.ntfy: ""
    notifications.argoproj.io/subscribe.on-degraded.ntfy: ""
    notifications.argoproj.io/subscribe.on-sync-succeeded.ntfy: ""
spec:
  project: workloads
  source:
    repoURL: https://github.com/daubog44/arr_setup.git
    targetRevision: main
    path: k8s/charts/haac-stack
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: seerr
      namespace: media
      jqPathExpressions:
        - .spec.volumeClaimTemplates[]?.status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
