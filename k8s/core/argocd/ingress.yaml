---
# IngressRoute (CRD Traefik nativo) per ArgoCD.
# ArgoCD è in modalità insecure (server.insecure: true), quindi serve HTTP.
# Usa h2c (HTTP/2 cleartext) per supportare sia la Web UI che le chiamate gRPC-web.
# Cloudflare → Traefik (HTTP:80) → ArgoCD (h2c:80)
# URL: https://argocd.${DOMAIN_NAME}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: Host(`argocd.${DOMAIN_NAME}`)
      services:
        - name: argocd-server
          port: 80
