apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    # renovate: registryUrl=https://prometheus-community.github.io/helm-charts chart=kube-prometheus-stack
    renovate/helm-chart: "kube-prometheus-stack"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.2.2 # Latest as of now
    helm:
      values: |
        # Disable default rules that are too noisy for homelabs or not applicable
        defaultRules:
          create: true
          rules:
            kubeApiserverAvailability: false
            kubeApiserverSlos: false
            kubernetesSystem: false
            
        alertmanager:
          enabled: true
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['namespace', 'alertname']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: 'ntfy'
              routes:
              - matchers:
                - alertname = "Watchdog"
                receiver: 'null'
            receivers:
            - name: 'null'
            - name: 'ntfy'
              webhook_configs:
                - url: 'https://ntfy.${DOMAIN_NAME}/haac-alerts'
                  send_resolved: true

        grafana:
          enabled: true
          adminPassword: "${QUI_PASSWORD}" # Use the global admin password
          grafana.ini:
            server:
              root_url: "https://grafana.${DOMAIN_NAME}"
          ingress:
            enabled: false # We will manage ingress manually if needed or via Traefik IngressRoute later
          
          # Provision Dashboard from Grafana.com
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
              - name: 'default'
                orgId: 1
                folder: ''
                type: file
                disableDeletion: false
                editable: false
                options:
                  path: /var/lib/grafana/dashboards/default
          dashboards:
            default:
              trivy-operator:
                # https://grafana.com/grafana/dashboards/17813-trivy-operator-dashboard/
                gnetId: 17813
                revision: 1
                datasource: Prometheus
              qbittorrent:
                # A standard qBittorrent dashboard matching the exporter we will set up
                gnetId: 17897
                revision: 1
                datasource: Prometheus
            

        prometheus:
          prometheusSpec:
            ruleSelectorNilUsesHelmValues: false
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            retention: 15d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi

        # K3s specific configurations
        kubeControllerManager:
          enabled: false
        kubeEtcd:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
