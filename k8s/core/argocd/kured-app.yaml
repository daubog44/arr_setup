---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kured
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.ntfy: ""
    notifications.argoproj.io/subscribe.on-degraded.ntfy: ""
spec:
  project: default
  source:
    repoURL: https://kubereboot.github.io/charts
    chart: kured
    # renovate: registryUrl=https://kubereboot.github.io/charts chart=kured
    targetRevision: "5.11.0"
    helm:
      values: |
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
          - key: node-role.kubernetes.io/master
            operator: Exists
            effect: NoSchedule
        configuration:
          period: 1h
          rebootSentinelFile: /var/run/reboot-required
          startTime: "01:00"
          endTime: "05:00"
          timeZone: Europe/Rome
          rebootDays: [mon, tue, wed, thu, fri, sat, sun]
          drainGracePeriod: 120s
          skipWaitForDeleteTimeoutSeconds: 60
          notifyUrl: "generic+http://ntfy.mgmt.svc.cluster.local:80/haac_alerts?title=Kured+Reboot&tags=arrows_counterclockwise"
        securityContext:
          privileged: true
        hostPID: true
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system   # ← kured DEVE stare qui per accedere ai nodi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
