---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: semaphore
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.ntfy: ""
    notifications.argoproj.io/subscribe.on-degraded.ntfy: ""
    notifications.argoproj.io/subscribe.on-sync-succeeded.ntfy: ""
spec:
  project: default
  source:
    repoURL: https://charts.semaphoreui.com
    chart: semaphore
    # renovate: registryUrl=https://charts.semaphoreui.com chart=semaphore
    targetRevision: "2.10.22"
    helm:
      values: |
        # Deployment basics
        replicaCount: 1

        service:
          type: ClusterIP
          port: 3000

        # Database: use the bundled PostgreSQL subchart
        postgresql:
          enabled: true
          auth:
            username: semaphore
            database: semaphore
            existingSecret: semaphore-db-secret
            secretKeys:
              adminPasswordKey: POSTGRES_PASSWORD
              userPasswordKey: POSTGRES_PASSWORD

        # Semaphore application config
        semaphore:
          access_key_encryption:
            existingSecret: semaphore-db-secret
            existingSecretKey: APP_SECRET

          admin:
            create: true
            username: admin
            email: admin@localhost
            name: Admin
            existingSecret: semaphore-db-secret
            existingSecretKey: ADMIN_PASSWORD

          # OIDC via Authelia
          oidcProviders:
            authelia:
              display_name: "Login con Authelia"
              provider_url: "https://auth.nucleoautogenerativo.it"
              client_id: "semaphore"
              existingSecret: semaphore-db-secret
              existingSecretKey: OIDC_SECRET
              redirect_url: "https://ansible.nucleoautogenerativo.it/api/auth/oidc/redirect"
              scopes:
                - openid
                - profile
                - email
                - groups
              username_claim: "preferred_username"
              email_claim: "email"
              name_claim: "name"

        # Expose via Traefik IngressRoute
        ingress:
          enabled: false  # We use Traefik IngressRoute below via extraManifests

        extraManifests:
          - apiVersion: traefik.io/v1alpha1
            kind: IngressRoute
            metadata:
              name: semaphore
              namespace: mgmt
            spec:
              entryPoints:
                - web
                - websecure
              routes:
                - match: Host(`ansible.nucleoautogenerativo.it`)
                  kind: Rule
                  services:
                    - name: semaphore
                      port: 3000

        persistence:
          enabled: true
          storageClass: local-path
          size: 1Gi

        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: mgmt
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
