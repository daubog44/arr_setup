apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  annotations:
    renovate/helm-chart: "alloy"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    # renovate: registryUrl=https://grafana.github.io/helm-charts chart=alloy
    targetRevision: "0.2.2"
    helm:
      values: |
        alloy:
          # Configuration for scraping logs and sending them to Loki
          configMap:
            content: |-
              // Discover Kubernetes pods
              discovery.kubernetes "pods" {
                role = "pod"
              }

              // Extract container logs path from discovery
              discovery.relabel "pod_logs" {
                targets = discovery.kubernetes.pods.targets
                
                rule {
                  source_labels = ["__meta_kubernetes_pod_node_name"]
                  target_label  = "__host__"
                }

                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }

                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }

                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  target_label  = "container"
                }

                // Map the exact path to container logs on the node
                rule {
                  source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name", "__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
                  separator     = "/"
                  target_label  = "__path__"
                  replacement   = "/var/log/pods/$1_$2_$3/$4/*.log"
                }
              }

              // Tail the log files
              local.file_match "pod_logs" {
                path_targets = discovery.relabel.pod_logs.output
              }

              // Read the discovered file paths
              loki.source.file "pod_logs" {
                targets    = local.file_match.pod_logs.targets
                forward_to = [loki.process.pod_logs.receiver]
              }

              // Parse container logs (Docker/CRI formats)
              loki.process "pod_logs" {
                stage.cri {}
                forward_to = [loki.write.default.receiver]
              }

              // Send parsed logs to Loki
              loki.write "default" {
                endpoint {
                  url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
                }
              }

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
