apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    # renovate: registryUrl=https://grafana.github.io/helm-charts chart=loki
    renovate/helm-chart: "loki"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.2.2 # Latest as of now
    helm:
      values: |
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: 2024-04-01
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
        singleBinary:
          replicas: 1
        read:
          replicas: 0
        backend:
          replicas: 0
        write:
          replicas: 0
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
        # Homelab scale: run everything in one pod
        deploymentMode: SingleBinary
        
        # Disable minio (we use local filesystem for homelab)
        minio:
          enabled: false
          
        gateway:
          enabled: false
          
        monitoring:
          selfMonitoring:
            enabled: false
            grafanaAgent:
              installOperator: false
        
        test:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
