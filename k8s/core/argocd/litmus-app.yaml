apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litmus
  namespace: argocd
  annotations:
    renovate/helm-chart: "litmus"
spec:
  project: default
  source:
    repoURL: https://litmuschaos.github.io/litmus-helm/
    chart: litmus
    # renovate: registryUrl=https://litmuschaos.github.io/litmus-helm/ chart=litmus
    targetRevision: "3.27.0"
    helm:
      values: |
        portal:
          server:
            # Litmus is exposed via IngressRoute in extraManifests (litmus-ingress.yaml)
            service:
              type: ClusterIP
        
        # Deploy the chaos center and agent together for homelab simplicity
        adminMode: true
        
  destination:
    server: https://kubernetes.default.svc
    namespace: chaos
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
