---
# Traefik is already bundled with K3s, but we customise its HelmChartConfig
# to enable the dashboard, set entry points, etc.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    # Expose the Traefik dashboard internally only
    ingressRoute:
      dashboard:
        enabled: true

    # HTTP redirect disabled: Cloudflare Tunnel already terminates TLS.
    # Redirecting would cause an infinite loop (Cloudflare follows the 301
    # back to itself via the tunnel). Ingresses listen on both web+websecure.
    ports:
      web: {}

    # Trust Cloudflare's IP ranges and K3s internal networks to preserve real client IPs and X-Forwarded-Proto
    additionalArguments:
      - "--entryPoints.web.forwardedHeaders.trustedIPs=10.42.0.0/16,10.43.0.0/16,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,104.16.0.0/13,104.24.0.0/14,108.162.192.0/18,131.0.72.0/22,141.101.64.0/18,162.158.0.0/15,172.64.0.0/13,173.245.48.0/20,188.114.96.0/20,190.93.240.0/20,197.234.240.0/22,198.41.128.0/17,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32"
      - "--entryPoints.websecure.forwardedHeaders.trustedIPs=10.42.0.0/16,10.43.0.0/16,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,104.16.0.0/13,104.24.0.0/14,108.162.192.0/18,131.0.72.0/22,141.101.64.0/18,162.158.0.0/15,172.64.0.0/13,173.245.48.0/20,188.114.96.0/20,190.93.240.0/20,197.234.240.0/22,198.41.128.0/17,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32"
      - "--providers.kubernetescrd.allowCrossNamespace=true"
      - "--providers.kubernetesingress.allowCrossNamespace=true"
    
    # Enable access logs for security inspection
    logs:
      access:
        enabled: true
