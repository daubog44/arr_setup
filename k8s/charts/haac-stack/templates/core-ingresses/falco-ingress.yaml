apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: falcosidekick-ui
  namespace: security
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`falco.{{ .Values.global.domainName }}`)
      kind: Rule
      middlewares:
        - name: authelia
      services:
        - name: falco-falcosidekick-ui
          port: 2802
  tls: {}
