---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: Host(`longhorn.{{ .Values.global.domainName }}`)
      services:
        - name: longhorn-frontend
          namespace: longhorn-system
          port: 80
