---
# IMPORTANT: Replace the value with your base64-encoded tunnel token.
# echo -n "YOUR_TUNNEL_TOKEN" | base64
# For production, encrypt this with SOPS or Sealed Secrets instead.
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-tunnel-token
  namespace: cloudflared
stringData:
  token: ${CLOUDFLARE_TUNNEL_TOKEN}
