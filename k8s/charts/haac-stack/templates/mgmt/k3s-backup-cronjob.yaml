apiVersion: batch/v1
kind: CronJob
metadata:
  name: k3s-sqlite-backup
  namespace: mgmt
spec:
  schedule: "0 4 * * *" # Every day at 4 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            node-role.kubernetes.io/control-plane: "true" # Must run on the master node
          hostNetwork: true # To avoid networking issues while copying
          containers:
            - name: backup
              image: alpine:3.19
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Starting K3s SQLite Backup..."
                  apk add --no-cache sqlite
                  
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/nas/k3s/k3s-state-${TIMESTAMP}.db"
                  LATEST_LINK="/nas/k3s/k3s-state-latest.db"
                  
                  # Ensure destination exists
                  mkdir -p /nas/k3s
                  
                  # Create a safe backup using SQLite's built-in backup mechanism
                  # This avoids locking issues with the live DB
                  sqlite3 /var/lib/rancher/k3s/server/db/state.db ".backup '${BACKUP_FILE}'"
                  
                  echo "Backup created at ${BACKUP_FILE}"
                  
                  # Update latest symlink
                  ln -sf "k3s-state-${TIMESTAMP}.db" "${LATEST_LINK}"
                  echo "Updated latest link"
                  
                  # Keep only last 7 days of backups
                  find /nas/k3s -name "k3s-state-*.db" -type f -mtime +7 -exec rm {} \;
                  echo "Cleaned up old backups (>7 days)"
                  
                  echo "Backup completed successfully!"
              volumeMounts:
                - name: k3s-db
                  mountPath: /var/lib/rancher/k3s/server/db
                  readOnly: true
                - name: nas-storage
                  mountPath: /nas
          volumes:
            - name: k3s-db
              hostPath:
                path: /var/lib/rancher/k3s/server/db
                type: Directory
            - name: nas-storage
              hostPath:
                path: /mnt/pve/HaaC-Storage/media # Using the Proxmox bind mount path that is available in K3s node
                type: DirectoryOrCreate
          restartPolicy: OnFailure
