{{- range $name, $conf := .Values.ingresses }}
{{- if (default true $conf.enabled) }}
{{- $authStrategy := (include "haac-stack.ingress.authStrategy" (dict "name" $name "conf" $conf) | trim) -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: "{{ $name }}"
  namespace: "{{ $conf.namespace | default $.Release.Namespace }}"
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: "{{ $.Values.gateway.name }}"
      namespace: "{{ $.Release.Namespace }}"
  hostnames:
    - >-
      {{ include "haac-stack.ingress.url" (dict "subdomain" $conf.subdomain "Values" $.Values) }}
  rules:
{{- range ($conf.path_routes | default (list)) }}
    - matches:
        - path:
            type: {{ default "PathPrefix" .pathType }}
            value: {{ .path | quote }}
      backendRefs:
        - group: ""
          kind: Service
          name: "{{ default $conf.service .service }}"
          port: {{ .port }}
          weight: 1
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: "force-https"
{{- if eq $authStrategy "edge_forward_auth" }}
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: "authelia"
{{- end }}
{{- range ($conf.extra_middlewares | default (list)) }}
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: "{{ . }}"
{{ end }}
{{- end }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: "{{ $conf.service }}"
          port: {{ $conf.port }}
          weight: 1
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: "force-https"
{{- if eq $authStrategy "edge_forward_auth" }}
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: "authelia"
{{- end }}
{{- range ($conf.extra_middlewares | default (list)) }}
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: "{{ . }}"
{{ end }}
{{ end }}
{{- end }}
