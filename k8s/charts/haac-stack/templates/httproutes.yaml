# {{- range $name, $conf := .Values.ingresses }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: "{{ $name }}"
  namespace: "{{ $conf.namespace | default $.Release.Namespace }}"
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: "{{ $.Values.gateway.name }}"
      namespace: "{{ $.Release.Namespace }}"
  hostnames:
    - >-
      {{ include "haac-stack.ingress.url" (dict "subdomain" $conf.subdomain "Values" $.Values) }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: "{{ $conf.service }}"
          port: {{ $conf.port }}
          weight: 1
# {{- if or $conf.auth_enabled $conf.extra_middlewares }}
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: "force-https"
# {{- if $conf.auth_enabled }}
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: "authelia"
# {{- end }}
# {{- if $conf.extra_middlewares }}
# {{- range $conf.extra_middlewares }}
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: "{{ . }}"
# {{- end }}
# {{- end }}
# {{- end }}
# {{- end }}
