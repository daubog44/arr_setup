---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: downloaders
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: downloaders
  template:
    metadata:
      labels:
        app: downloaders
    spec:
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.39.0
          env:
            - name: VPN_SERVICE_PROVIDER
              value: protonvpn
            - name: VPN_TYPE
              value: openvpn
            - name: OPENVPN_USER
              valueFrom:
                secretKeyRef:
                  name: protonvpn-key
                  key: OPENVPN_USER
            - name: OPENVPN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: protonvpn-key
                  key: OPENVPN_PASSWORD
            - name: SERVER_COUNTRIES
              value: "{{ .Values.vpn.serverCountries }}"
            - name: VPN_PORT_FORWARDING
              value: "on"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "10.42.0.0/16,10.43.0.0/16"
            - name: FIREWALL_VPN_INPUT_PORTS
              value: "8080,7476"
            - name: DOT
              value: "off"
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
            privileged: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          volumeMounts:
            - name: gluetun-port
              mountPath: /tmp/gluetun
          livenessProbe:
            tcpSocket:
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5

        - name: port-sync
          image: curlimages/curl:8.6.0
          env:
            - name: QBIT_USER
              value: "{{ .Values.qui.username }}"
            - name: QBIT_PASS
              value: "${QUI_PASSWORD}"
          command: ["/bin/sh", "-c"]
          args:
            - |
              last_port=0
              while true; do
                if [ -f /tmp/gluetun/forwarded_port ]; then
                  port=$(cat /tmp/gluetun/forwarded_port)
                  if [ "$port" != "$last_port" ] && [ -n "$port" ]; then
                    echo "Syncing port $port to qBittorrent..."
                    curl -s -o /dev/null -c /tmp/cookies.txt -d "username=${QBIT_USER}&password=${QBIT_PASS}" http://localhost:8080/api/v2/auth/login
                    curl -s -o /dev/null -b /tmp/cookies.txt -d "json={\"listen_port\": ${port}}" http://localhost:8080/api/v2/app/setPreferences
                    echo "Port synchronized."
                    last_port=$port
                  fi
                fi
                sleep 60
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
          volumeMounts:
            - name: gluetun-port
              mountPath: /tmp/gluetun
              readOnly: true

        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:4.6.3
          env:
            - name: PUID
              value: "{{ .Values.storage.uid }}"
            - name: PGID
              value: "{{ .Values.storage.gid }}"
            - name: WEBUI_PORT
              value: "8080"
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /data
        - name: qui
          image: ghcr.io/autobrr/qui:v1.14.2
          env:
            - name: QUI__OIDC_ENABLED
              value: "true"
            - name: QUI__OIDC_ISSUER
              value: "https://auth.{{ .Values.global.domainName }}"
            - name: QUI__OIDC_CLIENT_ID
              value: "qui"
            - name: QUI__OIDC_CLIENT_SECRET
              value: "${QUI_OIDC_SECRET}"
            - name: QUI__OIDC_REDIRECT_URL
              value: "https://qui.{{ .Values.global.domainName }}/api/auth/oidc/callback"
            - name: QUI__OIDC_DISABLE_BUILT_IN_LOGIN
              value: "true"

          ports:
            - containerPort: 7476
              name: qui-ui
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: qui-config
              mountPath: /app/config
        - name: exporter
          image: guillaumedsde/qbittorrent-exporter:v1.2.0
          ports:
            - containerPort: 8000
              name: metrics
          env:
            - name: QBITTORRENT_BASE_URL
              value: "http://127.0.0.1:8080" # Localhost since it's a sidecar
            # Use default credentials if not changed, else we would need secrets.
            # Assuming basic auth is off for local network in qbittorrent, or using default admin/adminadmin
            - name: QBITTORRENT_USERNAME
              value: "admin"
            - name: QBITTORRENT_PASSWORD
              value: "adminadmin"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbit-config
        - name: qui-config
          persistentVolumeClaim:
            claimName: qui-config
        - name: media
          hostPath:
            path: /data
            type: Directory
        - name: gluetun-port
          emptyDir: {}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qui-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media
spec:
  selector:
    app: downloaders
  ports:
    - port: 8080
      targetPort: 8080
      name: http
    - port: 80
      targetPort: 7476
      name: qui-ui
    - port: 8000
      targetPort: 8000
      name: metrics

---
{{- if .Capabilities.APIVersions.Has "monitoring.coreos.com/v1" }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: qbittorrent
  namespace: media
  labels:
    release: kube-prometheus-stack # Required to be picked up by the default Prometheus configuration
spec:
  selector:
    matchLabels:
      app: downloaders
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qbittorrent
  namespace: media
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: mgmt-force-https@kubernetescrd,mgmt-authelia@kubernetescrd
spec:
  rules:
    - host: qui.{{ .Values.global.domainName }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qbittorrent
                port:
                  name: qui-ui
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbit-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
