{{- $authNamespaces := dict -}}
{{- range $name, $conf := .Values.ingresses }}
{{- if $conf.auth_enabled }}
{{- $namespace := $conf.namespace | default $.Release.Namespace -}}
{{- $_ := set $authNamespaces $namespace true -}}
{{- end }}
{{- end }}
{{- range $namespace, $_ := $authNamespaces }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: force-https
  namespace: {{ $namespace }}
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authelia
  namespace: {{ $namespace }}
spec:
  forwardAuth:
    address: http://authelia.mgmt.svc.cluster.local:9091/api/authz/forward-auth?strategy=header
    trustForwardHeader: true
    authResponseHeaders:
      - Remote-User
      - Remote-Groups
      - Remote-Name
      - Remote-Email
{{- end }}
