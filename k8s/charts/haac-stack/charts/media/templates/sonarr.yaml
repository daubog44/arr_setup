---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      containers:
        - name: sonarr
          image: >-
            {{ .Values.global.images.sonarr.repository }}:{{ .Values.global.images.sonarr.tag }}
          ports:
            - containerPort: 8989
              name: http
          livenessProbe:
            httpGet:
              path: /ping
              port: 8989
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: 8989
            initialDelaySeconds: 15
            periodSeconds: 10
          env:
            - name: PUID
              value: "{{ .Values.global.storage.uid }}"
            - name: PGID
              value: "{{ .Values.global.storage.gid }}"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /data
        - name: exportarr
          image: >-
            {{ .Values.global.images.exportarr.repository }}:{{ .Values.global.images.exportarr.tag }}
          args: ["sonarr"]
          env:
            - name: PORT
              value: "9708"
            - name: URL
              value: "http://127.0.0.1:8989"
            - name: CONFIG
              value: /config/config.xml
            - name: LOG_LEVEL
              value: info
          ports:
            - containerPort: 9708
              name: metrics
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sonarr-config
        - name: media
          hostPath:
            path: /data
            type: Directory

---
apiVersion: v1
kind: Service
metadata:
  name: sonarr
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  selector:
    app: sonarr
  ports:
    - port: 80
      targetPort: 8989
      name: http
    - port: 9708
      targetPort: 9708
      name: metrics

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sonarr-config
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
