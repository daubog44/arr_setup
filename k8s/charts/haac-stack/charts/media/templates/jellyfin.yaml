---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: Replace=true
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      {{- with .Values.global.scheduling.gpu.jellyfinRuntimeClassName }}
      runtimeClassName: {{ . | quote }}
      {{- end }}
      containers:
        - name: jellyfin
          image: >-
            {{ .Values.global.images.jellyfin.repository }}:{{ .Values.global.images.jellyfin.tag }}
          ports:
            - containerPort: 8096
              name: http
          startupProbe:
            httpGet:
              path: /health
              port: 8096
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 15
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          env:
            - name: JELLYFIN_PublishedServerUrl
              value: "https://jellyfin.{{ .Values.global.domainName }}"
          resources:
            {{- if .Values.global.scheduling.gpu.jellyfinResourceName }}
            limits:
              {{ .Values.global.scheduling.gpu.jellyfinResourceName }}: {{ .Values.global.scheduling.gpu.jellyfinResourceCount | quote }}
            requests:
              {{ .Values.global.scheduling.gpu.jellyfinResourceName }}: {{ .Values.global.scheduling.gpu.jellyfinResourceCount | quote }}
            {{- else }}
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /data
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: media
          hostPath:
            path: /data/media
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  selector:
    app: jellyfin
  ports:
    - port: 80
      targetPort: 8096
      name: http

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
