---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  namespace: media
spec:
  selector:
    matchLabels:
      app: flaresolverr
  template:
    metadata:
      labels:
        app: flaresolverr
    spec:
      containers:
        - name: flaresolverr
          image: >-
            {{ .Values.global.images.flaresolverr.repository }}:{{ .Values.global.images.flaresolverr.tag }}
          env:
            - name: LOG_LEVEL
              value: info
            - name: PROMETHEUS_ENABLED
              value: "true"
            - name: PROMETHEUS_PORT
              value: "8192"
          ports:
            - containerPort: 8191
              name: http
            - containerPort: 8192
              name: metrics
          readinessProbe:
            tcpSocket:
              port: 8191
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8191
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: flaresolverr
  namespace: media
  labels:
    app: flaresolverr
spec:
  selector:
    app: flaresolverr
  ports:
    - port: 8191
      targetPort: 8191
      name: http
    - port: 8192
      targetPort: 8192
      name: metrics
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: recyclarr
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  schedule: "0 4 * * 0"  # Every Sunday at 04:00
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: recyclarr
              image: >-
                {{ .Values.global.images.recyclarr.repository }}:{{ .Values.global.images.recyclarr.tag }}
              args: ["sync"]
              volumeMounts:
                - name: config
                  mountPath: /config/recyclarr.yml
                  subPath: recyclarr.yml
                  readOnly: true
                - name: secrets
                  mountPath: /config/secrets.yml
                  subPath: secrets.yml
                  readOnly: true
          volumes:
            - name: config
              configMap:
                name: recyclarr-config
            - name: secrets
              secret:
                secretName: recyclarr-secrets
                optional: true
          restartPolicy: OnFailure
