---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seerr
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  serviceName: seerr
  replicas: 1
  selector:
    matchLabels:
      app: seerr
  template:
    metadata:
      labels:
        app: seerr
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: seerr
          image: >-
            {{ .Values.global.images.seerr.repository }}:{{ .Values.global.images.seerr.tag }}
          env:
            - name: TZ
              value: Europe/Rome
            - name: LOG_LEVEL
              value: info
            - name: PORT
              value: "5055"
          ports:
            - containerPort: 5055
              name: http
          readinessProbe:
            httpGet:
              path: /api/v1/settings/public
              port: 5055
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/v1/settings/public
              port: 5055
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /app/config
  volumeClaimTemplates:
    - metadata:
        name: config
        annotations:
          argocd.argoproj.io/sync-wave: "3"
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: seerr
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  selector:
    app: seerr
  ports:
    - port: 80
      targetPort: 5055
      name: http
