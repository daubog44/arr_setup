---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unpackerr
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  selector:
    matchLabels:
      app: unpackerr
  template:
    metadata:
      labels:
        app: unpackerr
    spec:
      initContainers:
        - name: unpackerr-config
          image: >-
            {{ .Values.global.images.alpine.repository }}:{{ .Values.global.images.alpine.tag }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              set -eu
              apk add --no-cache python3 >/dev/null
              cat > /tmp/render-unpackerr.py <<'PY'
              import pathlib
              import os

              def normalize_api_key(name: str) -> str:
                  value = (os.environ.get(name) or "").strip()
                  if len(value) != 32:
                      return ""
                  return value

              radarr_api_key = normalize_api_key("RADARR_API_KEY")
              sonarr_api_key = normalize_api_key("SONARR_API_KEY")
              whisparr_api_key = normalize_api_key("WHISPARR_API_KEY")
              config = """
              [webserver]
                metrics = true
                listen_addr = "0.0.0.0:5656"
              """.strip()

              if radarr_api_key:
                  config += f"""

              [[radarr]]
                url = "http://radarr.media.svc.cluster.local"
                api_key = "{radarr_api_key}"
                paths = ['/data/torrents']
                protocols = "torrent,TorrentDownloadProtocol"
              """.rstrip()

              if sonarr_api_key:
                  config += f"""

              [[sonarr]]
                url = "http://sonarr.media.svc.cluster.local"
                api_key = "{sonarr_api_key}"
                paths = ['/data/torrents']
                protocols = "torrent,TorrentDownloadProtocol"
              """.rstrip()

              if whisparr_api_key:
                  config += f"""

              [[whisparr]]
                url = "http://whisparr.media.svc.cluster.local"
                api_key = "{whisparr_api_key}"
                paths = ['/data/torrents']
                protocols = "torrent,TorrentDownloadProtocol"
              """.rstrip()

              config += "\n"
              pathlib.Path("/config/unpackerr.conf").write_text(config, encoding="utf-8")
              PY
              python3 /tmp/render-unpackerr.py
          env:
            - name: RADARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: recyclarr-secrets
                  key: RADARR_API_KEY
                  optional: true
            - name: SONARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: recyclarr-secrets
                  key: SONARR_API_KEY
                  optional: true
            - name: WHISPARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: recyclarr-secrets
                  key: WHISPARR_API_KEY
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: unpackerr
          image: >-
            {{ .Values.global.images.unpackerr.repository }}:{{ .Values.global.images.unpackerr.tag }}
          ports:
            - containerPort: 5656
              name: metrics
          readinessProbe:
            httpGet:
              path: /
              port: 5656
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5656
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /data
      volumes:
        - name: config
          emptyDir: {}
        - name: media
          hostPath:
            path: /data
            type: Directory

---
apiVersion: v1
kind: Service
metadata:
  name: unpackerr
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app: unpackerr
spec:
  selector:
    app: unpackerr
  ports:
    - port: 5656
      targetPort: 5656
      name: metrics
