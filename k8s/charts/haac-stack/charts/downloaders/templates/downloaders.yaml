---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: downloaders
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: downloaders
  template:
    metadata:
      labels:
        app: downloaders
    spec:
      containers:
        - name: gluetun
          image: >-
            {{ printf "%s:%s" .Values.global.images.gluetun.repository .Values.global.images.gluetun.tag }}
          env:
            - name: VPN_SERVICE_PROVIDER
              value: protonvpn
            - name: VPN_TYPE
              value: openvpn
            - name: OPENVPN_USER
              valueFrom:
                secretKeyRef:
                  name: protonvpn-key
                  key: OPENVPN_USER
            - name: OPENVPN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: protonvpn-key
                  key: OPENVPN_PASSWORD
            - name: SERVER_COUNTRIES
              value: "{{ .Values.global.vpn.serverCountries }}"
            - name: VPN_PORT_FORWARDING
              value: "on"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "{{ .Values.global.vpn.podSubnet }},{{ .Values.global.vpn.svcSubnet }}"
            - name: FIREWALL_VPN_INPUT_PORTS
              value: "8080,7476"
            - name: DOT
              value: "off"
            - name: HTTP_CONTROL_SERVER
              value: "on"
            - name: HTTP_CONTROL_SERVER_ADDRESS
              value: ":8000"
            - name: VPN_DNS_ADDRESS
              value: "{{ .Values.global.vpn.dnsIp }}"
            - name: DNS_KEEP_NAMESERVER
              value: "on"
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
            privileged: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          volumeMounts:
            - name: gluetun-port
              mountPath: /tmp/gluetun
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5

        - name: port-sync
          image: >-
            {{ printf "%s:%s" .Values.global.images.curl.repository .Values.global.images.curl.tag }}
          env:
            - name: QBIT_USER
              value: "admin"
            - name: QBIT_PASS
              valueFrom:
                secretKeyRef:
                  name: downloaders-auth
                  key: QUI_PASSWORD
          command: ["/bin/sh", "-c"]
          args:
            - |
              last_port=0
              while true; do
                if [ -f /tmp/gluetun/forwarded_port ]; then
                  port=$(cat /tmp/gluetun/forwarded_port)
                  if [ "$port" != "$last_port" ] && [ -n "$port" ]; then
                    echo "Syncing port $port to qBittorrent..."
                    curl -s -o /dev/null -c /tmp/cookies.txt -d "username=${QBIT_USER}&password=${QBIT_PASS}" http://localhost:8080/api/v2/auth/login
                    curl -s -o /dev/null -b /tmp/cookies.txt -d "json={\"listen_port\": ${port}}" http://localhost:8080/api/v2/app/setPreferences
                    echo "Port synchronized."
                    last_port=$port
                  fi
                fi
                sleep 60
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
          volumeMounts:
            - name: gluetun-port
              mountPath: /tmp/gluetun
              readOnly: true

        - name: qbittorrent
          image: >-
            {{ printf "%s:%s" .Values.global.images.qbittorrent.repository .Values.global.images.qbittorrent.tag }}
          env:
            - name: PUID
              value: "{{ .Values.global.storage.uid }}"
            - name: PGID
              value: "{{ .Values.global.storage.gid }}"
            - name: WEBUI_PORT
              value: "8080"
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /data
        - name: qui
          image: >-
            {{ printf "%s:%s" .Values.global.images.qui.repository .Values.global.images.qui.tag }}
          env:
            - name: QUI__OIDC_ENABLED
              value: "false"
            - name: QUI__AUTH_DISABLED
              value: "true"
            - name: QUI__I_ACKNOWLEDGE_THIS_IS_A_BAD_IDEA
              value: "true"
            - name: QUI__AUTH_DISABLED_ALLOWED_CIDRS
              value: "127.0.0.1/32,::1/128,{{ .Values.global.vpn.podSubnet }},{{ .Values.global.vpn.svcSubnet }}"
          ports:
            - containerPort: 7476
              name: qui-ui
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: qui-config
              mountPath: /app/config
        - name: exporter
          image: >-
            {{ printf "%s:%s" .Values.global.images.qbitExporter.repository .Values.global.images.qbitExporter.tag }}
          ports:
            - containerPort: 17871
              name: metrics
          env:
            - name: QBITTORRENT_BASE_URL
              value: "http://127.0.0.1:8080"
            - name: QBITTORRENT_PORT
              value: "8080" # Localhost since it's a sidecar
            - name: QBITTORRENT_USERNAME
              value: "admin"
            - name: QBITTORRENT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: downloaders-auth
                  key: QUI_PASSWORD
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbit-config
        - name: qui-config
          persistentVolumeClaim:
            claimName: qui-config
        - name: media
          hostPath:
            path: /data
            type: Directory
        - name: gluetun-port
          emptyDir: {}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qui-config
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  selector:
    app: downloaders
  ports:
    - port: 8080
      targetPort: 8080
      name: http
    - port: 80
      targetPort: 7476
      name: qui-ui
    - port: 8000
      targetPort: 17871
      name: metrics


---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbit-config
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
