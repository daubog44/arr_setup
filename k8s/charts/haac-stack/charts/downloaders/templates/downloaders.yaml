---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: downloaders
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: downloaders
  template:
    metadata:
      labels:
        app: downloaders
    spec:
      serviceAccountName: downloaders-bootstrap
      containers:
        - name: gluetun
          image: >-
            {{ printf "%s:%s" .Values.global.images.gluetun.repository .Values.global.images.gluetun.tag }}
          env:
            - name: VPN_SERVICE_PROVIDER
              value: protonvpn
            - name: VPN_TYPE
              value: openvpn
            - name: OPENVPN_USER
              valueFrom:
                secretKeyRef:
                  name: protonvpn-key
                  key: OPENVPN_USER
            - name: OPENVPN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: protonvpn-key
                  key: OPENVPN_PASSWORD
            - name: SERVER_COUNTRIES
              value: "{{ .Values.global.vpn.serverCountries }}"
            - name: VPN_PORT_FORWARDING
              value: "on"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "{{ .Values.global.vpn.podSubnet }},{{ .Values.global.vpn.svcSubnet }}"
            - name: FIREWALL_VPN_INPUT_PORTS
              value: "8080,7476"
            - name: DOT
              value: "off"
            - name: HTTP_CONTROL_SERVER
              value: "on"
            - name: HTTP_CONTROL_SERVER_ADDRESS
              value: ":8000"
            - name: VPN_DNS_ADDRESS
              value: "{{ .Values.global.vpn.dnsIp }}"
            - name: DNS_KEEP_NAMESERVER
              value: "on"
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
            privileged: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          volumeMounts:
            - name: gluetun-port
              mountPath: /tmp/gluetun
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5

        - name: port-sync
          image: >-
            {{ printf "%s:%s" .Values.global.images.curl.repository .Values.global.images.curl.tag }}
          env:
            - name: QBIT_USER
              value: "admin"
            - name: QBIT_PASS
              valueFrom:
                secretKeyRef:
                  name: downloaders-auth
                  key: QUI_PASSWORD
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu

              curl_common() {
                curl --connect-timeout 5 --max-time 20 "$@"
              }

              api_call() {
                curl_common -fsS --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                  -H "Authorization: Bearer $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
                  "$@"
              }

              wait_http() {
                url="$1"
                for _ in $(seq 1 60); do
                  if curl_common -fsS "$url" >/dev/null 2>&1; then
                    return 0
                  fi
                  sleep 5
                done
                echo "Timed out waiting for $url" >&2
                return 1
              }

              qbit_login_ok() {
                password="$1"
                login_code=$(curl_common -sS -o /tmp/qbit-login.txt -w '%{http_code}' \
                  --data-urlencode "username=${QBIT_USER}" \
                  --data-urlencode "password=${password}" \
                  http://127.0.0.1:8080/api/v2/auth/login || true)
                if [ "$login_code" = "200" ] && grep -q 'Ok\.' /tmp/qbit-login.txt; then
                  return 0
                fi
                return 1
              }

              extract_instance_id() {
                compact="$1"
                instance_id=$(printf '%s' "$compact" | sed -n 's/.*"id":\([0-9][0-9]*\),"name":"qBittorrent".*/\1/p')
                if [ -z "$instance_id" ]; then
                  instance_id=$(printf '%s' "$compact" | sed -n 's/.*"name":"qBittorrent","id":\([0-9][0-9]*\).*/\1/p')
                fi
                printf '%s' "$instance_id"
              }

              echo "Waiting for qBittorrent and QUI endpoints..."
              wait_http "http://127.0.0.1:8080/api/v2/app/version"
              wait_http "http://127.0.0.1:7476/api/auth/me"

              if ! qbit_login_ok "$QBIT_PASS"; then
                echo "Desired qBittorrent password rejected. Attempting temporary-password recovery..."
                POD_LOGS=$(api_call "https://kubernetes.default.svc/api/v1/namespaces/media/pods/${HOSTNAME}/log?container=qbittorrent")
                TEMP_PASSWORD=$(printf '%s\n' "$POD_LOGS" | sed -n 's/.*A temporary password is provided for this session: //p' | tail -n 1 | tr -d '\r')
                if [ -z "$TEMP_PASSWORD" ]; then
                  echo "qBittorrent is not accepting the desired password and no temporary password was found in logs." >&2
                  exit 1
                fi
                curl_common -fsS -c /tmp/qbit-cookies.txt \
                  --data-urlencode "username=${QBIT_USER}" \
                  --data-urlencode "password=${TEMP_PASSWORD}" \
                  http://127.0.0.1:8080/api/v2/auth/login >/dev/null
                curl_common -fsS -b /tmp/qbit-cookies.txt \
                  --data-urlencode "new_password=${QBIT_PASS}" \
                  http://127.0.0.1:8080/api/v2/auth/changePassword >/dev/null
              fi

              if ! qbit_login_ok "$QBIT_PASS"; then
                echo "qBittorrent did not accept the reconciled password." >&2
                exit 1
              fi

              echo "qBittorrent credentials reconciled. Upserting QUI instance..."
              ESCAPED_QBIT_PASS=$(printf '%s' "$QBIT_PASS" | sed 's/\\/\\\\/g; s/"/\\"/g')
              INSTANCE_PAYLOAD=$(printf '{"name":"qBittorrent","host":"http://127.0.0.1:8080","username":"admin","password":"%s","hasLocalFilesystemAccess":true}' "$ESCAPED_QBIT_PASS")
              INSTANCES=$(curl_common -fsS http://127.0.0.1:7476/api/instances)
              INSTANCES_COMPACT=$(printf '%s' "$INSTANCES" | tr -d '\n ')
              INSTANCE_ID=$(extract_instance_id "$INSTANCES_COMPACT")

              if [ -n "$INSTANCE_ID" ]; then
                curl_common -fsS -X PUT \
                  -H 'Content-Type: application/json' \
                  --data "$INSTANCE_PAYLOAD" \
                  "http://127.0.0.1:7476/api/instances/${INSTANCE_ID}" >/dev/null
              else
                CREATE_CODE=$(curl_common -sS -o /tmp/qui-instance-create.json -w '%{http_code}' \
                  -H 'Content-Type: application/json' \
                  --data "$INSTANCE_PAYLOAD" \
                  http://127.0.0.1:7476/api/instances || true)
                if [ "$CREATE_CODE" != "200" ] && [ "$CREATE_CODE" != "201" ]; then
                  echo "Unable to create qBittorrent instance in QUI." >&2
                  cat /tmp/qui-instance-create.json >&2
                  exit 1
                fi
                INSTANCES=$(curl_common -fsS http://127.0.0.1:7476/api/instances)
                INSTANCES_COMPACT=$(printf '%s' "$INSTANCES" | tr -d '\n ')
                INSTANCE_ID=$(extract_instance_id "$INSTANCES_COMPACT")
              fi

              if [ -z "$INSTANCE_ID" ]; then
                echo "Unable to resolve the qBittorrent instance id from QUI." >&2
                exit 1
              fi

              echo "Waiting for QUI instance connectivity test..."
              TEST_RESPONSE=""
              for _ in $(seq 1 24); do
                TEST_RESPONSE=$(curl_common -sS -X POST "http://127.0.0.1:7476/api/instances/${INSTANCE_ID}/test" || true)
                if printf '%s' "$TEST_RESPONSE" | grep -q '"connected":true'; then
                  echo "QUI instance connectivity test passed."
                  break
                fi
                sleep 5
              done

              if ! printf '%s' "$TEST_RESPONSE" | grep -q '"connected":true'; then
                echo "QUI did not report a connected qBittorrent instance before timeout." >&2
                printf '%s\n' "$TEST_RESPONSE" >&2
                exit 1
              fi

              echo "Bootstrap complete. Starting port-forward sync loop..."
              last_port=0
              while true; do
                if [ -f /tmp/gluetun/forwarded_port ]; then
                  port=$(cat /tmp/gluetun/forwarded_port)
                  if [ "$port" != "$last_port" ] && [ -n "$port" ]; then
                    echo "Syncing port $port to qBittorrent..."
                    curl -s -o /dev/null -c /tmp/cookies.txt \
                      --data-urlencode "username=${QBIT_USER}" \
                      --data-urlencode "password=${QBIT_PASS}" \
                      http://localhost:8080/api/v2/auth/login
                    curl -s -o /dev/null -b /tmp/cookies.txt -d "json={\"listen_port\": ${port}}" http://localhost:8080/api/v2/app/setPreferences
                    echo "Port synchronized."
                    last_port=$port
                  fi
                fi
                sleep 60
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
          volumeMounts:
            - name: gluetun-port
              mountPath: /tmp/gluetun
              readOnly: true

        - name: qbittorrent
          image: >-
            {{ printf "%s:%s" .Values.global.images.qbittorrent.repository .Values.global.images.qbittorrent.tag }}
          env:
            - name: PUID
              value: "{{ .Values.global.storage.uid }}"
            - name: PGID
              value: "{{ .Values.global.storage.gid }}"
            - name: WEBUI_PORT
              value: "8080"
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /data
        - name: qui
          image: >-
            {{ printf "%s:%s" .Values.global.images.qui.repository .Values.global.images.qui.tag }}
          env:
            - name: QUI__OIDC_ENABLED
              value: "false"
            - name: QUI__AUTH_DISABLED
              value: "true"
            - name: QUI__I_ACKNOWLEDGE_THIS_IS_A_BAD_IDEA
              value: "true"
            - name: QUI__AUTH_DISABLED_ALLOWED_CIDRS
              value: "127.0.0.1/32,::1/128,{{ .Values.global.vpn.podSubnet }},{{ .Values.global.vpn.svcSubnet }}"
          ports:
            - containerPort: 7476
              name: qui-ui
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: qui-config
              mountPath: /app/config
        - name: exporter
          image: >-
            {{ printf "%s:%s" .Values.global.images.qbitExporter.repository .Values.global.images.qbitExporter.tag }}
          ports:
            - containerPort: 17871
              name: metrics
          env:
            - name: QBITTORRENT_BASE_URL
              value: "http://127.0.0.1:8080"
            - name: QBITTORRENT_PORT
              value: "8080" # Localhost since it's a sidecar
            - name: QBITTORRENT_USERNAME
              value: "admin"
            - name: QBITTORRENT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: downloaders-auth
                  key: QUI_PASSWORD
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbit-config
        - name: qui-config
          persistentVolumeClaim:
            claimName: qui-config
        - name: media
          hostPath:
            path: /data
            type: Directory
        - name: gluetun-port
          emptyDir: {}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qui-config
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  selector:
    app: downloaders
  ports:
    - port: 8080
      targetPort: 8080
      name: http
    - port: 80
      targetPort: 7476
      name: qui-ui
    - port: 8000
      targetPort: 17871
      name: metrics


---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbit-config
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
