apiVersion: v1
kind: ServiceAccount
metadata:
  name: downloaders-bootstrap
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "4"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: downloaders-bootstrap
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "4"
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: downloaders-bootstrap
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "4"
subjects:
  - kind: ServiceAccount
    name: downloaders-bootstrap
    namespace: media
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: downloaders-bootstrap
---
apiVersion: batch/v1
kind: Job
metadata:
  name: downloaders-bootstrap
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: downloaders-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: >-
            {{ printf "%s:%s" .Values.global.images.curl.repository .Values.global.images.curl.tag }}
          env:
            - name: QUI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: downloaders-auth
                  key: QUI_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              api_call() {
                curl -fsS --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                  -H "Authorization: Bearer $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
                  "$@"
              }

              wait_http() {
                url="$1"
                for _ in $(seq 1 60); do
                  if curl -fsS "$url" >/dev/null 2>&1; then
                    return 0
                  fi
                  sleep 5
                done
                echo "Timed out waiting for $url" >&2
                return 1
              }

              extract_instance_id() {
                compact="$1"
                instance_id=$(printf '%s' "$compact" | sed -n 's/.*"id":\([0-9][0-9]*\),"name":"qBittorrent".*/\1/p')
                if [ -z "$instance_id" ]; then
                  instance_id=$(printf '%s' "$compact" | sed -n 's/.*"name":"qBittorrent","id":\([0-9][0-9]*\).*/\1/p')
                fi
                printf '%s' "$instance_id"
              }

              qbit_login_ok() {
                password="$1"
                login_code=$(curl -sS -o /tmp/qbit-login.txt -w '%{http_code}' \
                  --data "username=admin&password=${password}" \
                  http://qbittorrent.media.svc.cluster.local:8080/api/v2/auth/login || true)
                if [ "$login_code" = "200" ] && grep -q 'Ok\.' /tmp/qbit-login.txt; then
                  return 0
                fi
                return 1
              }

              wait_http "http://qbittorrent.media.svc.cluster.local:8080/api/v2/app/version"
              wait_http "http://qbittorrent.media.svc.cluster.local/api/auth/me"

              POD_JSON=$(api_call "https://kubernetes.default.svc/api/v1/namespaces/media/pods?labelSelector=app%3Ddownloaders")
              POD_JSON_COMPACT=$(printf '%s' "$POD_JSON" | tr -d '\n ')
              POD_NAME=$(printf '%s' "$POD_JSON_COMPACT" | sed -n 's/.*"items":\[{"metadata":{"name":"\([^"]*\)".*/\1/p')
              if [ -z "$POD_NAME" ]; then
                echo "Unable to find the downloaders pod for bootstrap." >&2
                exit 1
              fi

              if ! qbit_login_ok "$QUI_PASSWORD"; then
                POD_LOGS=$(api_call "https://kubernetes.default.svc/api/v1/namespaces/media/pods/${POD_NAME}/log?container=qbittorrent")
                TEMP_PASSWORD=$(printf '%s\n' "$POD_LOGS" | sed -n 's/.*A temporary password is provided for this session: //p' | tail -n 1 | tr -d '\r')
                if [ -z "$TEMP_PASSWORD" ]; then
                  echo "qBittorrent is not accepting the desired password and no temporary password was found in logs." >&2
                  exit 1
                fi
                curl -fsS -c /tmp/qbit-cookies.txt \
                  --data "username=admin&password=${TEMP_PASSWORD}" \
                  http://qbittorrent.media.svc.cluster.local:8080/api/v2/auth/login >/dev/null
                curl -fsS -b /tmp/qbit-cookies.txt \
                  --data "new_password=${QUI_PASSWORD}" \
                  http://qbittorrent.media.svc.cluster.local:8080/api/v2/auth/changePassword >/dev/null
              fi

              if ! qbit_login_ok "$QUI_PASSWORD"; then
                echo "qBittorrent did not accept the reconciled password." >&2
                exit 1
              fi

              INSTANCE_PAYLOAD=$(printf '{"name":"qBittorrent","host":"http://127.0.0.1:8080","username":"admin","password":"%s","hasLocalFilesystemAccess":true}' "$QUI_PASSWORD")

              INSTANCES=$(curl -fsS http://qbittorrent.media.svc.cluster.local/api/instances)
              INSTANCES_COMPACT=$(printf '%s' "$INSTANCES" | tr -d '\n ')
              INSTANCE_ID=$(extract_instance_id "$INSTANCES_COMPACT")

              if [ -n "$INSTANCE_ID" ]; then
                curl -fsS -X PUT \
                  -H 'Content-Type: application/json' \
                  --data "$INSTANCE_PAYLOAD" \
                  "http://qbittorrent.media.svc.cluster.local/api/instances/${INSTANCE_ID}" >/dev/null
              else
                CREATE_CODE=$(curl -sS -o /tmp/qui-instance-create.json -w '%{http_code}' \
                  -H 'Content-Type: application/json' \
                  --data "$INSTANCE_PAYLOAD" \
                  http://qbittorrent.media.svc.cluster.local/api/instances || true)
                if [ "$CREATE_CODE" != "200" ] && [ "$CREATE_CODE" != "201" ]; then
                  echo "Unable to create qBittorrent instance in QUI." >&2
                  cat /tmp/qui-instance-create.json >&2
                  exit 1
                fi
                INSTANCES=$(curl -fsS http://qbittorrent.media.svc.cluster.local/api/instances)
                INSTANCES_COMPACT=$(printf '%s' "$INSTANCES" | tr -d '\n ')
                INSTANCE_ID=$(extract_instance_id "$INSTANCES_COMPACT")
              fi

              if [ -z "$INSTANCE_ID" ]; then
                echo "Unable to resolve the qBittorrent instance id from QUI." >&2
                exit 1
              fi

              TEST_RESPONSE=""
              for _ in $(seq 1 24); do
                TEST_RESPONSE=$(curl -sS -X POST "http://qbittorrent.media.svc.cluster.local/api/instances/${INSTANCE_ID}/test" || true)
                if printf '%s' "$TEST_RESPONSE" | grep -q '"connected":true'; then
                  exit 0
                fi
                sleep 5
              done

              echo "QUI did not report a connected qBittorrent instance before timeout." >&2
              printf '%s\n' "$TEST_RESPONSE" >&2
              exit 1
