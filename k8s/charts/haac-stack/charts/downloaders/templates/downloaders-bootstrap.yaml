apiVersion: v1
kind: ServiceAccount
metadata:
  name: downloaders-bootstrap
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "4"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: downloaders-bootstrap
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "4"
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: downloaders-bootstrap
  namespace: media
  annotations:
    argocd.argoproj.io/sync-wave: "4"
subjects:
  - kind: ServiceAccount
    name: downloaders-bootstrap
    namespace: media
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: downloaders-bootstrap
