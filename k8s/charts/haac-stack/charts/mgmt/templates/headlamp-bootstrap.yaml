apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-bootstrap
  namespace: mgmt
  annotations:
    argocd.argoproj.io/sync-wave: "2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: headlamp-bootstrap
  namespace: mgmt
  annotations:
    argocd.argoproj.io/sync-wave: "2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["traefik.io"]
    resources: ["middlewares"]
    verbs: ["create", "get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: headlamp-bootstrap
  namespace: mgmt
  annotations:
    argocd.argoproj.io/sync-wave: "2"
subjects:
  - kind: ServiceAccount
    name: headlamp-bootstrap
    namespace: mgmt
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: headlamp-bootstrap
---
apiVersion: batch/v1
kind: Job
metadata:
  name: headlamp-token-bootstrap
  namespace: mgmt
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: Replace=true
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: headlamp-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: "{{ .Values.global.images.kubectl.repository }}:{{ .Values.global.images.kubectl.tag }}"
          command:
            - /bin/sh
            - -c
            - |
              set -e
              TOKEN_B64=""
              for _ in $(seq 1 60); do
                TOKEN_B64=$(kubectl get secret headlamp-admin-token -n mgmt -o jsonpath='{.data.token}' 2>/dev/null || true)
                if [ -n "$TOKEN_B64" ]; then
                  break
                fi
                sleep 5
              done

              if [ -z "$TOKEN_B64" ]; then
                echo "Headlamp token secret was not populated in time."
                exit 1
              fi

              TOKEN=$(echo "$TOKEN_B64" | base64 -d)

              cat <<EOF | kubectl apply -f -
              apiVersion: traefik.io/v1alpha1
              kind: Middleware
              metadata:
                name: headlamp-token-header
                namespace: mgmt
              spec:
                headers:
                  customRequestHeaders:
                    Authorization: "Bearer ${TOKEN}"
              EOF
