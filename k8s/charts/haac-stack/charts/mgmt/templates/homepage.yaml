---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: mgmt
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
      annotations:
        checksum/homepage-config: {{ include "haac-stack.homepage.configChecksum" . | quote }}
        checksum/homepage-widgets-secret: {{ .Values.global.auth.homepageWidgetsChecksum | quote }}
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: bootstrap-config
          image: >-
            {{ printf "%s:%s" .Values.global.images.homepage.repository .Values.global.images.homepage.tag }}
          command:
            - /bin/sh
            - -lc
          args:
            - >-
              set -eu;
              mkdir -p /app/config/logs;
              cp -f /bootstrap-config/*.yaml /app/config/;
              if [ ! -f /app/config/kubernetes.yaml ]; then
                cp /app/src/skeleton/kubernetes.yaml /app/config/kubernetes.yaml;
              fi
          volumeMounts:
            - name: config-bootstrap
              mountPath: /bootstrap-config
              readOnly: true
            - name: config-storage
              mountPath: /app/config
      containers:
        - name: homepage
          image: >-
            {{ printf "%s:%s" .Values.global.images.homepage.repository .Values.global.images.homepage.tag }}
          ports:
            - containerPort: 3000
              name: http
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: 3000
            initialDelaySeconds: 15
            timeoutSeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/healthcheck
              port: 3000
            initialDelaySeconds: 5
            timeoutSeconds: 5
            periodSeconds: 10
          env:
            - name: NODE_ENV
              value: "production"
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "$(MY_POD_IP):3000,home.{{ .Values.global.domainName }}"
          envFrom:
            - secretRef:
                name: homepage-widgets-secret
                optional: true
          volumeMounts:
            - name: config-storage
              mountPath: /app/config
      volumes:
        - name: config-bootstrap
          configMap:
            name: homepage-config
        - name: config-storage
          persistentVolumeClaim:
            claimName: homepage-config
---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: mgmt
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: homepage
  ports:
    - port: 80
      targetPort: 3000
      name: http

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homepage-config
  namespace: mgmt
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.global.storage.statefulClass | quote }}
  resources:
    requests:
      storage: 1Gi
