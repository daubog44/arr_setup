---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ntfy-data
  namespace: mgmt
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: mgmt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntfy
  template:
    metadata:
      labels:
        app: ntfy
    spec:
      containers:
        - name: ntfy
          image: binwiederhier/ntfy:v2.18.0
          command:
            - ntfy
            - serve
          env:
            - name: NTFY_BASE_URL
              value: "https://ntfy.{{ .Values.global.domainName }}"
            - name: NTFY_CACHE_FILE
              value: "/var/cache/ntfy/cache.db"
            - name: NTFY_AUTH_FILE
              value: "/var/cache/ntfy/user.db"
            - name: NTFY_AUTH_DEFAULT_ACCESS
              value: "read-write"
            - name: NTFY_BEHIND_PROXY
              value: "true"
            - name: NTFY_ATTACHMENT_CACHE_DIR
              value: "/var/cache/ntfy/attachments"
            - name: NTFY_ENABLE_LOGIN
              value: "true"
            - name: NTFY_LOG_LEVEL
              value: "INFO"
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/cache/ntfy
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ntfy-data
---
apiVersion: v1
kind: Service
metadata:
  name: ntfy
  namespace: mgmt
spec:
  selector:
    app: ntfy
  ports:
    - port: 80
      targetPort: 80
