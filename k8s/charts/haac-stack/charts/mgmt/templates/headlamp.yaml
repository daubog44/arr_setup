{{- $headlampAccessLevel := default "readonly" .Values.global.auth.headlampAccessLevel -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: headlamp
  namespace: mgmt
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: headlamp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: headlamp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: headlamp
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      serviceAccountName: headlamp-access
      volumes:
        - name: headlamp-kubeconfig
          configMap:
            name: headlamp-kubeconfig
      containers:
        - name: headlamp
          image: >-
            {{ .Values.global.images.headlamp.repository }}:{{ .Values.global.images.headlamp.tag }}
          env:
            - name: KUBECONFIG
              value: /home/headlamp/.config/Headlamp/kubeconfigs/config
          ports:
            - containerPort: 4466
          volumeMounts:
            - name: headlamp-kubeconfig
              mountPath: /home/headlamp/.config/Headlamp/kubeconfigs/config
              subPath: config
          livenessProbe:
            httpGet:
              path: /
              port: 4466
            initialDelaySeconds: 15
            timeoutSeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 4466
            initialDelaySeconds: 5
            timeoutSeconds: 5
            periodSeconds: 10
          args:
            - "-in-cluster"
---
apiVersion: v1
kind: Service
metadata:
  name: headlamp
  namespace: mgmt
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  ports:
    - port: 80
      targetPort: 4466
  selector:
    app.kubernetes.io/name: headlamp
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-access
  namespace: mgmt
---
{{- if eq $headlampAccessLevel "admin" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-access-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: headlamp-access
    namespace: mgmt
---
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: headlamp-readonly-cluster-extras
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - persistentvolumes
      - events
      - endpoints
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - nodes
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - csinodes
      - csidrivers
      - volumeattachments
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-access-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: headlamp-access
    namespace: mgmt
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-access-extras
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: headlamp-readonly-cluster-extras
subjects:
  - kind: ServiceAccount
    name: headlamp-access
    namespace: mgmt
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: headlamp-kubeconfig
  namespace: mgmt
data:
  config: |
    apiVersion: v1
    kind: Config
    clusters:
      - name: in-cluster
        cluster:
          server: https://kubernetes.default.svc
          certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    contexts:
      - name: in-cluster
        context:
          cluster: in-cluster
          user: headlamp
    current-context: in-cluster
    users:
      - name: headlamp
        user:
          tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
