apiVersion: apps/v1
kind: Deployment
metadata:
  name: headlamp
  namespace: mgmt
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: headlamp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: headlamp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: headlamp
    spec:
      serviceAccountName: headlamp-admin
      volumes:
        - name: headlamp-kubeconfig
          configMap:
            name: headlamp-kubeconfig
      containers:
        - name: headlamp
          image: >-
            {{ .Values.global.images.headlamp.repository }}:{{ .Values.global.images.headlamp.tag }}
          env:
            - name: KUBECONFIG
              value: /home/headlamp/.config/Headlamp/kubeconfigs/config
          ports:
            - containerPort: 4466
          volumeMounts:
            - name: headlamp-kubeconfig
              mountPath: /home/headlamp/.config/Headlamp/kubeconfigs/config
              subPath: config
          livenessProbe:
            httpGet:
              path: /
              port: 4466
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 4466
            initialDelaySeconds: 5
            periodSeconds: 10
          args:
            - "-in-cluster"
---
apiVersion: v1
kind: Service
metadata:
  name: headlamp
  namespace: mgmt
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  ports:
    - port: 80
      targetPort: 4466
  selector:
    app.kubernetes.io/name: headlamp
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-viewer
  namespace: mgmt
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-admin
  namespace: mgmt
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: headlamp-admin
    namespace: mgmt
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: headlamp-kubeconfig
  namespace: mgmt
data:
  config: |
    apiVersion: v1
    kind: Config
    clusters:
      - name: in-cluster
        cluster:
          server: https://kubernetes.default.svc
          certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    contexts:
      - name: in-cluster
        context:
          cluster: in-cluster
          user: headlamp
    current-context: in-cluster
    users:
      - name: headlamp
        user:
          tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
