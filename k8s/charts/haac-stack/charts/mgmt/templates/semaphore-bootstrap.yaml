---
# Post-install bootstrap Job: configures Semaphore completely via API
# Runs once after Semaphore is deployed and sets up:
#   - SSH key (from SealedSecret)
#   - Git repository (arr_setup repo)
#   - Inventory (from the repo)
#   - Environment (sets ANSIBLE_HOST_KEY_CHECKING=True with explicit known_hosts)
#   - Task template: Rolling OS Update K3s
#   - Task template: Rolling OS Update Proxmox
#   - Schedules for both templates (every Monday 03:00)
apiVersion: batch/v1
kind: Job
metadata:
  name: semaphore-bootstrap
  namespace: mgmt
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  activeDeadlineSeconds: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrapper
          image: >-
            {{ printf "%s:%s" .Values.global.images.curl.repository .Values.global.images.curl.tag }}
          env:
            - name: SEMAPHORE_URL
              value: "http://semaphore.mgmt.svc.cluster.local:3000"
            - name: SEMAPHORE_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: semaphore-db-secret
                  key: ADMIN_USERNAME
            - name: SEMAPHORE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: semaphore-db-secret
                  key: ADMIN_PASSWORD
            - name: REPO_URL
              value: "{{ .Values.global.gitops.repoUrl }}"
            - name: REPO_REVISION
              value: "{{ .Values.global.gitops.repoRevision }}"
            - name: MAINTENANCE_INVENTORY_PATH
              value: "/opt/ansible/maintenance-inventory.yml"
            - name: MAINTENANCE_SSH_KEY_PATH
              value: "/etc/ansible-ssh/maintenance_ed25519"
            - name: MAINTENANCE_KNOWN_HOSTS_PATH
              value: "/etc/ansible-ssh/known_hosts"
          volumeMounts:
            - name: maintenance-ssh-key
              mountPath: /etc/ansible-ssh
              readOnly: true
{{- if or (hasPrefix "git@" .Values.global.gitops.repoUrl) (hasPrefix "ssh://" .Values.global.gitops.repoUrl) }}
            - name: repo-deploy-key
              mountPath: /etc/repo-ssh
              readOnly: true
{{- end }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              BASE="$SEMAPHORE_URL"
              USERNAME="$SEMAPHORE_ADMIN_USERNAME"
              PASS="$SEMAPHORE_ADMIN_PASSWORD"

              # Wait for Semaphore to be ready
              echo "Waiting for Semaphore to be ready..."
              until curl -sf "$BASE/api/ping" > /dev/null 2>&1; do
                echo "  Not ready yet, sleeping 5s..."
                sleep 5
              done
              echo "Semaphore is ready!"

              # Authenticate and get cookie
              curl -sf -c /tmp/cookies.txt -X POST "$BASE/api/auth/login" \
                -H "Content-Type: application/json" \
                -d "{\"auth\":\"$USERNAME\",\"password\":\"$PASS\"}" > /dev/null
              echo "Semaphore admin authentication succeeded."

              find_named_id() {
                RESPONSE="$1"
                RESOURCE_NAME="$2"
                printf '%s' "$RESPONSE" | tr '{' '\n' | grep "\"name\":\"$RESOURCE_NAME\"" | sed 's/.*"id":\([0-9]*\).*/\1/' | head -n 1
              }

              delete_named_resource() {
                COLLECTION="$1"
                RESOURCE_NAME="$2"
                CURRENT=$(curl -sf -b /tmp/cookies.txt "$BASE/api/project/$PROJECT_ID/$COLLECTION")
                CURRENT_ID=$(find_named_id "$CURRENT" "$RESOURCE_NAME")
                if [ -n "$CURRENT_ID" ]; then
                  echo "Removing existing $COLLECTION resource '$RESOURCE_NAME' ($CURRENT_ID)"
                  curl -sf -b /tmp/cookies.txt -X DELETE "$BASE/api/project/$PROJECT_ID/$COLLECTION/$CURRENT_ID" > /dev/null
                fi
              }

              upsert_named_resource() {
                COLLECTION="$1"
                RESOURCE_NAME="$2"
                PAYLOAD="$3"
                CURRENT=$(curl -sf -b /tmp/cookies.txt "$BASE/api/project/$PROJECT_ID/$COLLECTION")
                CURRENT_ID=$(find_named_id "$CURRENT" "$RESOURCE_NAME")
                if [ -n "$CURRENT_ID" ]; then
                  echo "Updating $COLLECTION resource '$RESOURCE_NAME' ($CURRENT_ID)"
                  curl -sf -b /tmp/cookies.txt -X PUT "$BASE/api/project/$PROJECT_ID/$COLLECTION/$CURRENT_ID" \
                    -H "Content-Type: application/json" \
                    -d "$PAYLOAD"
                else
                  echo "Creating $COLLECTION resource '$RESOURCE_NAME'"
                  curl -sf -b /tmp/cookies.txt -X POST "$BASE/api/project/$PROJECT_ID/$COLLECTION" \
                    -H "Content-Type: application/json" \
                    -d "$PAYLOAD"
                fi
              }

              find_schedule_id_by_template() {
                RESPONSE="$1"
                TEMPLATE_ID="$2"
                printf '%s' "$RESPONSE" | tr '{' '\n' | grep "\"template_id\":$TEMPLATE_ID" | sed 's/.*"id":\([0-9]*\).*/\1/' | head -n 1
              }

              upsert_schedule() {
                TEMPLATE_ID="$1"
                CRON_FORMAT="$2"
                PAYLOAD="{\"project_id\":$PROJECT_ID,\"template_id\":$TEMPLATE_ID,\"cron_format\":\"$CRON_FORMAT\",\"enabled\":true}"
                CURRENT=$(curl -sf -b /tmp/cookies.txt "$BASE/api/project/$PROJECT_ID/schedules")
                CURRENT_ID=$(find_schedule_id_by_template "$CURRENT" "$TEMPLATE_ID")
                if [ -n "$CURRENT_ID" ]; then
                  echo "Updating schedule $CURRENT_ID for template $TEMPLATE_ID"
                  curl -sf -b /tmp/cookies.txt -X PUT "$BASE/api/project/$PROJECT_ID/schedules/$CURRENT_ID" \
                    -H "Content-Type: application/json" \
                    -d "$PAYLOAD" > /dev/null
                else
                  echo "Creating schedule for template $TEMPLATE_ID"
                  curl -sf -b /tmp/cookies.txt -X POST "$BASE/api/project/$PROJECT_ID/schedules" \
                    -H "Content-Type: application/json" \
                    -d "$PAYLOAD" > /dev/null
                fi
              }

              # 1. Keep project identity stable; create once, then update it in place.
              EXISTING=$(curl -sf -b /tmp/cookies.txt "$BASE/api/projects")
              PROJECT_ID=$(find_named_id "$EXISTING" "HaaC Maintenance")
              if [ -n "$PROJECT_ID" ]; then
                echo "Reusing managed Semaphore project ID: $PROJECT_ID"
                curl -sf -b /tmp/cookies.txt -X PUT "$BASE/api/project/$PROJECT_ID" \
                  -H "Content-Type: application/json" \
                  -d '{"name":"HaaC Maintenance","alert":true,"alert_chat":"","max_parallel_tasks":1}' > /dev/null
              else
                PROJECT=$(curl -sf -b /tmp/cookies.txt -X POST "$BASE/api/projects" \
                  -H "Content-Type: application/json" \
                  -d '{"name":"HaaC Maintenance","alert":true,"alert_chat":"","max_parallel_tasks":1}')
                PROJECT_ID=$(echo "$PROJECT" | sed 's/.*"id":\([0-9]*\).*/\1/')
                echo "Created project ID: $PROJECT_ID"
              fi

              # 2. Reconcile bootstrap-owned SSH keys without destroying the project.
              delete_named_resource "keys" "HaaC Maintenance SSH Key"
              KEY=$(curl -sf -b /tmp/cookies.txt -X POST "$BASE/api/project/$PROJECT_ID/keys" \
                -H "Content-Type: application/json" \
                -d "{\"name\":\"HaaC Maintenance SSH Key\",\"project_id\":$PROJECT_ID,\"type\":\"ssh\",\"ssh\":{\"login\":\"\",\"passphrase\":\"\",\"private_key\":\"$(cat $MAINTENANCE_SSH_KEY_PATH | base64 | tr -d '\n')\"}}")
              KEY_ID=$(echo "$KEY" | sed 's/.*"id":\([0-9]*\).*/\1/')
              echo "Reconciled maintenance SSH key ID: $KEY_ID"

              # 3. Reconcile Git repository
{{- if or (hasPrefix "git@" .Values.global.gitops.repoUrl) (hasPrefix "ssh://" .Values.global.gitops.repoUrl) }}
              delete_named_resource "keys" "HaaC Repo Deploy Key"
              REPO_KEY=$(curl -sf -b /tmp/cookies.txt -X POST "$BASE/api/project/$PROJECT_ID/keys" \
                -H "Content-Type: application/json" \
                -d "{\"name\":\"HaaC Repo Deploy Key\",\"project_id\":$PROJECT_ID,\"type\":\"ssh\",\"ssh\":{\"login\":\"git\",\"passphrase\":\"\",\"private_key\":\"$(cat /etc/repo-ssh/repo_deploy_ed25519 | base64 | tr -d '\n')\"}}")
              REPO_KEY_ID=$(echo "$REPO_KEY" | sed 's/.*"id":\([0-9]*\).*/\1/')
              REPO_PAYLOAD="{\"name\":\"arr_setup\",\"project_id\":$PROJECT_ID,\"git_url\":\"$REPO_URL\",\"git_branch\":\"$REPO_REVISION\",\"ssh_key_id\":$REPO_KEY_ID}"
{{- else }}
              NONE_KEY_ID=$(curl -sf -b /tmp/cookies.txt "$BASE/api/project/$PROJECT_ID/keys" | tr '{' '\n' | grep '"name":"None"' | sed 's/.*"id":\([0-9]*\).*/\1/' | head -n 1)
              REPO_PAYLOAD="{\"name\":\"arr_setup\",\"project_id\":$PROJECT_ID,\"git_url\":\"$REPO_URL\",\"git_branch\":\"$REPO_REVISION\",\"ssh_key_id\":$NONE_KEY_ID}"
{{- end }}
              REPO=$(upsert_named_resource "repositories" "arr_setup" "$REPO_PAYLOAD")
              REPO_ID=$(echo "$REPO" | sed 's/.*"id":\([0-9]*\).*/\1/')
              echo "Reconciled repository ID: $REPO_ID"

              # 4. Reconcile inventory - uses ConfigMap mounted at /opt/ansible/maintenance-inventory.yml
              INV_PAYLOAD="{\"name\":\"HaaC Nodes\",\"project_id\":$PROJECT_ID,\"inventory\":\"$MAINTENANCE_INVENTORY_PATH\",\"type\":\"file\",\"ssh_key_id\":$KEY_ID,\"repository_id\":$REPO_ID,\"become_key_id\":null}"
              INV=$(upsert_named_resource "inventory" "HaaC Nodes" "$INV_PAYLOAD")
              INV_ID=$(echo "$INV" | sed 's/.*"id":\([0-9]*\).*/\1/')
              echo "Reconciled inventory ID: $INV_ID"

              # 5. Reconcile environment (accept new SSH host keys instead of disabling trust)
              ENV_PAYLOAD="{\"name\":\"Default\",\"project_id\":$PROJECT_ID,\"env\":\"{\\\"ANSIBLE_HOST_KEY_CHECKING\\\":\\\"True\\\",\\\"HAAC_SSH_HOST_KEY_CHECKING\\\":\\\"accept-new\\\",\\\"HAAC_MAINTENANCE_SSH_PRIVATE_KEY_PATH\\\":\\\"$MAINTENANCE_SSH_KEY_PATH\\\",\\\"HAAC_SSH_KNOWN_HOSTS_PATH\\\":\\\"$MAINTENANCE_KNOWN_HOSTS_PATH\\\",\\\"DEBIAN_FRONTEND\\\":\\\"noninteractive\\\"}\",\"json\":\"{}\"}"
              ENV=$(upsert_named_resource "environment" "Default" "$ENV_PAYLOAD")
              ENV_ID=$(echo "$ENV" | sed 's/.*"id":\([0-9]*\).*/\1/')
              echo "Reconciled environment ID: $ENV_ID"

              # 6. Reconcile task template: K3s Nodes Update
              TPL_K3S_PAYLOAD="{\"name\":\"Rolling OS Update - K3s Nodes\",\"project_id\":$PROJECT_ID,\"app\":\"ansible\",\"playbook\":\"HaaC/ansible/maintenance-k3s-playbook.yml\",\"inventory_id\":$INV_ID,\"repository_id\":$REPO_ID,\"environment_id\":$ENV_ID,\"description\":\"Aggiorna i nodi K3s (serial: 1) ogni lunedi notte\"}"
              TPL_K3S=$(upsert_named_resource "templates" "Rolling OS Update - K3s Nodes" "$TPL_K3S_PAYLOAD")
              TPL_K3S_ID=$(echo "$TPL_K3S" | sed 's/.*"id":\([0-9]*\).*/\1/')
              echo "Reconciled K3s template ID: $TPL_K3S_ID"

              # 7. Reconcile task template: Proxmox Hosts Update
              TPL_PVE_PAYLOAD="{\"name\":\"Rolling OS Update - Proxmox Hosts\",\"project_id\":$PROJECT_ID,\"app\":\"ansible\",\"playbook\":\"HaaC/ansible/maintenance-proxmox-playbook.yml\",\"inventory_id\":$INV_ID,\"repository_id\":$REPO_ID,\"environment_id\":$ENV_ID,\"description\":\"Aggiorna gli host Proxmox (serial: 1) ogni lunedi notte\"}"
              TPL_PVE=$(upsert_named_resource "templates" "Rolling OS Update - Proxmox Hosts" "$TPL_PVE_PAYLOAD")
              TPL_PVE_ID=$(echo "$TPL_PVE" | sed 's/.*"id":\([0-9]*\).*/\1/')
              echo "Reconciled Proxmox template ID: $TPL_PVE_ID"

              # 7.5 Reconcile task template: K3s Database Restore
              TPL_RESTORE_PAYLOAD="{\"name\":\"Restore K3s Database (from NAS)\",\"project_id\":$PROJECT_ID,\"app\":\"ansible\",\"playbook\":\"HaaC/ansible/restore-k3s-playbook.yml\",\"inventory_id\":$INV_ID,\"repository_id\":$REPO_ID,\"environment_id\":$ENV_ID,\"description\":\"Restore the SQLite database from NAS to the master node. Use with care. Optional BACKUP_FILE parameter (example: BACKUP_FILE=k3s-state-2023.db).\"}"
              TPL_RESTORE=$(upsert_named_resource "templates" "Restore K3s Database (from NAS)" "$TPL_RESTORE_PAYLOAD")
              TPL_RESTORE_ID=$(echo "$TPL_RESTORE" | sed 's/.*"id":\([0-9]*\).*/\1/')
              echo "Reconciled Restore DB template ID: $TPL_RESTORE_ID"

              # 8. Reconcile schedules (every Monday at 03:00 Rome = 02:00 UTC)
              upsert_schedule "$TPL_K3S_ID" "0 2 * * 1"
              echo "Reconciled K3s schedule"

              upsert_schedule "$TPL_PVE_ID" "30 2 * * 1"
              echo "Reconciled Proxmox schedule (30min after K3s)"

              echo "Semaphore bootstrap complete."
      volumes:
        - name: maintenance-ssh-key
          secret:
            secretName: haac-maintenance-ssh-key
{{- if or (hasPrefix "git@" .Values.global.gitops.repoUrl) (hasPrefix "ssh://" .Values.global.gitops.repoUrl) }}
        - name: repo-deploy-key
          secret:
            secretName: haac-repo-deploy-key
{{- end }}
