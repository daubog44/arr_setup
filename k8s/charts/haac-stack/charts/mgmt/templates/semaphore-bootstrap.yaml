---
# Post-install bootstrap Job: configures Semaphore completely via API
# Runs once after Semaphore is deployed and sets up:
#   - SSH Key (from SealedSecret)
#   - Git repository (arr_setup repo)
#   - Inventory (from the repo)
#   - Environment (sets ANSIBLE_HOST_KEY_CHECKING=False)
#   - Task Template: Rolling OS Update K3s
#   - Task Template: Rolling OS Update Proxmox
#   - Schedules for both templates (every Monday 03:00)
apiVersion: batch/v1
kind: Job
metadata:
  name: semaphore-bootstrap
  namespace: mgmt
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  activeDeadlineSeconds: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrapper
          image: >-
            {{ printf "%s:%s" .Values.global.images.curl.repository .Values.global.images.curl.tag }}
          env:
            - name: SEMAPHORE_URL
              value: "http://semaphore.mgmt.svc.cluster.local:3000"
            - name: SEMAPHORE_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: semaphore-db-secret
                  key: ADMIN_USERNAME
            - name: SEMAPHORE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: semaphore-db-secret
                  key: ADMIN_PASSWORD
            - name: REPO_URL
              value: "{{ .Values.global.gitops.repoUrl }}"
            - name: REPO_REVISION
              value: "{{ .Values.global.gitops.repoRevision }}"
            - name: MAINTENANCE_INVENTORY_PATH
              value: "/opt/ansible/maintenance-inventory.yml"
            - name: MAINTENANCE_SSH_KEY_PATH
              value: "/etc/ansible-ssh/maintenance_ed25519"
          volumeMounts:
            - name: maintenance-ssh-key
              mountPath: /etc/ansible-ssh
              readOnly: true
{{- if or (hasPrefix "git@" .Values.global.gitops.repoUrl) (hasPrefix "ssh://" .Values.global.gitops.repoUrl) }}
            - name: repo-deploy-key
              mountPath: /etc/repo-ssh
              readOnly: true
{{- end }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              BASE="$SEMAPHORE_URL"
              USERNAME="$SEMAPHORE_ADMIN_USERNAME"
              PASS="$SEMAPHORE_ADMIN_PASSWORD"

              # Wait for Semaphore to be ready
              echo "Waiting for Semaphore to be ready..."
              until curl -sf "$BASE/api/ping" > /dev/null 2>&1; do
                echo "  Not ready yet, sleeping 5s..."
                sleep 5
              done
              echo "Semaphore is ready!"

              # Authenticate and get cookie
              curl -sf -c /tmp/cookies.txt -X POST "$BASE/api/auth/login" \
                -H "Content-Type: application/json" \
                -d "{\"auth\":\"$USERNAME\",\"password\":\"$PASS\"}" > /dev/null
              echo "Semaphore admin authentication succeeded."

              HDR='-H "Content-Type: application/json"'

              # Reconcile the managed project idempotently by recreating it if it already exists.
              # This keeps the managed inventory/key/repository model converged after auth and trust-model changes.
              EXISTING=$(curl -sf -b /tmp/cookies.txt "$BASE/api/projects")
              if echo "$EXISTING" | grep -q "HaaC Maintenance"; then
                EXISTING_PROJECT_ID=$(echo "$EXISTING" | tr '{' '\n' | grep '"name":"HaaC Maintenance"' | sed 's/.*"id":\([0-9]*\).*/\1/' | head -n 1)
                if [ -n "$EXISTING_PROJECT_ID" ]; then
                  echo "Managed Semaphore project already exists. Recreating project $EXISTING_PROJECT_ID to converge bootstrap-owned resources."
                  curl -sf -b /tmp/cookies.txt -X DELETE "$BASE/api/project/$EXISTING_PROJECT_ID" > /dev/null
                  sleep 3
                fi
              fi

              # 1. Create project
              PROJECT=$(curl -sf -b /tmp/cookies.txt -X POST "$BASE/api/projects" \
                -H "Content-Type: application/json" \
                -d '{"name":"HaaC Maintenance","alert":true,"alert_chat":"","max_parallel_tasks":1}')
              PROJECT_ID=$(echo "$PROJECT" | sed 's/.*"id":\([0-9]*\).*/\1/')
              echo "Created project ID: $PROJECT_ID"

              # 2. Create maintenance SSH key from mounted secret
              KEY=$(curl -sf -b /tmp/cookies.txt -X POST "$BASE/api/project/$PROJECT_ID/keys" \
                -H "Content-Type: application/json" \
                -d "{\"name\":\"HaaC Maintenance SSH Key\",\"project_id\":$PROJECT_ID,\"type\":\"ssh\",\"ssh\":{\"login\":\"\",\"passphrase\":\"\",\"private_key\":\"$(cat $MAINTENANCE_SSH_KEY_PATH | base64 | tr -d '\n')\"}}")
              KEY_ID=$(echo "$KEY" | sed 's/.*"id":\([0-9]*\).*/\1/')
              echo "Created maintenance SSH key ID: $KEY_ID"

              # 3. Create Git repository
{{- if or (hasPrefix "git@" .Values.global.gitops.repoUrl) (hasPrefix "ssh://" .Values.global.gitops.repoUrl) }}
              REPO_KEY=$(curl -sf -b /tmp/cookies.txt -X POST "$BASE/api/project/$PROJECT_ID/keys" \
                -H "Content-Type: application/json" \
                -d "{\"name\":\"HaaC Repo Deploy Key\",\"project_id\":$PROJECT_ID,\"type\":\"ssh\",\"ssh\":{\"login\":\"git\",\"passphrase\":\"\",\"private_key\":\"$(cat /etc/repo-ssh/repo_deploy_ed25519 | base64 | tr -d '\n')\"}}")
              REPO_KEY_ID=$(echo "$REPO_KEY" | sed 's/.*"id":\([0-9]*\).*/\1/')
              REPO_PAYLOAD="{\"name\":\"arr_setup\",\"project_id\":$PROJECT_ID,\"git_url\":\"$REPO_URL\",\"git_branch\":\"$REPO_REVISION\",\"ssh_key_id\":$REPO_KEY_ID}"
{{- else }}
              NONE_KEY_ID=$(curl -sf -b /tmp/cookies.txt "$BASE/api/project/$PROJECT_ID/keys" | tr '{' '\n' | grep '"name":"None"' | sed 's/.*"id":\([0-9]*\).*/\1/' | head -n 1)
              REPO_PAYLOAD="{\"name\":\"arr_setup\",\"project_id\":$PROJECT_ID,\"git_url\":\"$REPO_URL\",\"git_branch\":\"$REPO_REVISION\",\"ssh_key_id\":$NONE_KEY_ID}"
{{- end }}
              REPO=$(curl -sf -b /tmp/cookies.txt -X POST "$BASE/api/project/$PROJECT_ID/repositories" \
                -H "Content-Type: application/json" \
                -d "$REPO_PAYLOAD")
              REPO_ID=$(echo "$REPO" | sed 's/.*"id":\([0-9]*\).*/\1/')
              echo "Created repository ID: $REPO_ID"

              # 4. Create inventory — uses ConfigMap mounted at /opt/ansible/maintenance-inventory.yml
              # This file auto-updates when Terraform regenerates inventory + Taskfile updates the ConfigMap
              INV=$(curl -sf -b /tmp/cookies.txt -X POST "$BASE/api/project/$PROJECT_ID/inventory" \
                -H "Content-Type: application/json" \
                -d "{\"name\":\"HaaC Nodes\",\"project_id\":$PROJECT_ID,\"inventory\":\"$MAINTENANCE_INVENTORY_PATH\",\"type\":\"file\",\"ssh_key_id\":$KEY_ID,\"repository_id\":$REPO_ID,\"become_key_id\":null}")
              INV_ID=$(echo "$INV" | sed 's/.*"id":\([0-9]*\).*/\1/')
              echo "Created inventory ID: $INV_ID"

              # 5. Create environment (accept new SSH host keys instead of disabling trust)
              ENV=$(curl -sf -b /tmp/cookies.txt -X POST "$BASE/api/project/$PROJECT_ID/environment" \
                -H "Content-Type: application/json" \
                -d "{\"name\":\"Default\",\"project_id\":$PROJECT_ID,\"env\":\"{\\\"ANSIBLE_HOST_KEY_CHECKING\\\":\\\"True\\\",\\\"HAAC_SSH_HOST_KEY_CHECKING\\\":\\\"accept-new\\\",\\\"HAAC_MAINTENANCE_SSH_PRIVATE_KEY_PATH\\\":\\\"$MAINTENANCE_SSH_KEY_PATH\\\",\\\"DEBIAN_FRONTEND\\\":\\\"noninteractive\\\"}\",\"json\":\"{}\"}")
              ENV_ID=$(echo "$ENV" | sed 's/.*"id":\([0-9]*\).*/\1/')
              echo "Created environment ID: $ENV_ID"

              # 6. Create task template: K3s Nodes Update
              TPL_K3S=$(curl -sf -b /tmp/cookies.txt -X POST "$BASE/api/project/$PROJECT_ID/templates" \
                -H "Content-Type: application/json" \
                -d "{\"name\":\"Rolling OS Update - K3s Nodes\",\"project_id\":$PROJECT_ID,\"app\":\"ansible\",\"playbook\":\"HaaC/ansible/maintenance-playbook.yml\",\"inventory_id\":$INV_ID,\"repository_id\":$REPO_ID,\"environment_id\":$ENV_ID,\"description\":\"Aggiorna i nodi K3s (serial: 1) ogni lunedi notte\"}")
              TPL_K3S_ID=$(echo "$TPL_K3S" | sed 's/.*"id":\([0-9]*\).*/\1/')
              echo "Created K3s template ID: $TPL_K3S_ID"

              # 7. Create task template: Proxmox Hosts Update
              TPL_PVE=$(curl -sf -b /tmp/cookies.txt -X POST "$BASE/api/project/$PROJECT_ID/templates" \
                -H "Content-Type: application/json" \
                -d "{\"name\":\"Rolling OS Update - Proxmox Hosts\",\"project_id\":$PROJECT_ID,\"app\":\"ansible\",\"playbook\":\"HaaC/ansible/maintenance-playbook.yml\",\"inventory_id\":$INV_ID,\"repository_id\":$REPO_ID,\"environment_id\":$ENV_ID,\"description\":\"Aggiorna gli host Proxmox (serial: 1) ogni lunedi notte\"}")
              TPL_PVE_ID=$(echo "$TPL_PVE" | sed 's/.*"id":\([0-9]*\).*/\1/')
              echo "Created Proxmox template ID: $TPL_PVE_ID"

              # 7.5 Create task template: K3s Database Restore
              # It will run a local bash script generated dynamically via an inline playbook since Semaphore runs ansible natively
              TPL_RESTORE=$(curl -sf -b /tmp/cookies.txt -X POST "$BASE/api/project/$PROJECT_ID/templates" \
                -H "Content-Type: application/json" \
                -d "{\"name\":\"⚠️ Restore K3s Database (from NAS)\",\"project_id\":$PROJECT_ID,\"app\":\"ansible\",\"playbook\":\"HaaC/ansible/restore-k3s-playbook.yml\",\"inventory_id\":$INV_ID,\"repository_id\":$REPO_ID,\"environment_id\":$ENV_ID,\"description\":\"Ripristina il db SQLite dal NAS sul master nodo. USARE CON CAUTELA. Parametro BACKUP_FILE facoltativo (es. BACKUP_FILE=k3s-state-2023.db)\"}")
              TPL_RESTORE_ID=$(echo "$TPL_RESTORE" | sed 's/.*"id":\([0-9]*\).*/\1/')
              echo "Created Restore DB template ID: $TPL_RESTORE_ID"

              # 8. Create schedules (every Monday at 03:00 Rome = 02:00 UTC)
              curl -sf -b /tmp/cookies.txt -X POST "$BASE/api/project/$PROJECT_ID/schedules" \
                -H "Content-Type: application/json" \
                -d "{\"project_id\":$PROJECT_ID,\"template_id\":$TPL_K3S_ID,\"cron_format\":\"0 2 * * 1\",\"enabled\":true}" > /dev/null
              echo "Created K3s schedule"

              curl -sf -b /tmp/cookies.txt -X POST "$BASE/api/project/$PROJECT_ID/schedules" \
                -H "Content-Type: application/json" \
                -d "{\"project_id\":$PROJECT_ID,\"template_id\":$TPL_PVE_ID,\"cron_format\":\"30 2 * * 1\",\"enabled\":true}" > /dev/null
              echo "Created Proxmox schedule (30min after K3s)"

              echo "✅ Semaphore bootstrap complete!"
      volumes:
        - name: maintenance-ssh-key
          secret:
            secretName: haac-maintenance-ssh-key
{{- if or (hasPrefix "git@" .Values.global.gitops.repoUrl) (hasPrefix "ssh://" .Values.global.gitops.repoUrl) }}
        - name: repo-deploy-key
          secret:
            secretName: haac-repo-deploy-key
{{- end }}
