apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: haac-workloads
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/daubog44/arr_setup.git
    targetRevision: main
    path: k8s/workloads
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
