---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: downloaders
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: downloaders
  template:
    metadata:
      labels:
        app: downloaders
    spec:
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:latest
          env:
            - name: VPN_SERVICE_PROVIDER
              value: protonvpn
            - name: VPN_TYPE
              value: openvpn
            - name: OPENVPN_USER
              valueFrom:
                secretKeyRef:
                  name: protonvpn-key
                  key: OPENVPN_USER
            - name: OPENVPN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: protonvpn-key
                  key: OPENVPN_PASSWORD
            - name: SERVER_COUNTRIES
              value: "${PROTONVPN_SERVER_COUNTRIES}"
            - name: VPN_PORT_FORWARDING
              value: "on"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "10.42.0.0/16,10.43.0.0/16"
            - name: FIREWALL_VPN_INPUT_PORTS
              value: "8080,7476"
            - name: DOT
              value: "off"
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
            privileged: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          volumeMounts:
            - name: gluetun-port
              mountPath: /tmp/gluetun

        - name: port-sync
          image: curlimages/curl:latest
          env:
            - name: QBIT_USER
              value: "${QUI_USERNAME}"
            - name: QBIT_PASS
              value: "${QUI_PASSWORD}"
          command: ["/bin/sh", "-c"]
          args:
            - |
              last_port=0
              while true; do
                if [ -f /tmp/gluetun/forwarded_port ]; then
                  port=$(cat /tmp/gluetun/forwarded_port)
                  if [ "$port" != "$last_port" ] && [ -n "$port" ]; then
                    echo "Syncing port $port to qBittorrent..."
                    curl -s -o /dev/null -c /tmp/cookies.txt -d "username=${QBIT_USER}&password=${QBIT_PASS}" http://localhost:8080/api/v2/auth/login
                    curl -s -o /dev/null -b /tmp/cookies.txt -d "json={\"listen_port\": ${port}}" http://localhost:8080/api/v2/app/setPreferences
                    echo "Port synchronized."
                    last_port=$port
                  fi
                fi
                sleep 60
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
          volumeMounts:
            - name: gluetun-port
              mountPath: /tmp/gluetun
              readOnly: true

        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          env:
            - name: PUID
              value: "${STORAGE_UID}"
            - name: PGID
              value: "${STORAGE_GID}"
            - name: WEBUI_PORT
              value: "8080"
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /data
        - name: qui
          image: ghcr.io/autobrr/qui:latest
          env:
            - name: QUI_OIDC_ENABLED
              value: "true"
            - name: QUI_OIDC_ISSUER_URL
              value: "https://auth.${DOMAIN_NAME}"
            - name: QUI_OIDC_CLIENT_ID
              value: "qui"
            - name: QUI_OIDC_CLIENT_SECRET
              value: "${QUI_OIDC_SECRET}"
          ports:
            - containerPort: 7476
              name: qui-ui
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: qui-config
              mountPath: /app/config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbit-config
        - name: qui-config
          persistentVolumeClaim:
            claimName: qui-config
        - name: media
          hostPath:
            path: /data
            type: Directory
        - name: gluetun-port
          emptyDir: {}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qui-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media
spec:
  selector:
    app: downloaders
  ports:
    - port: 8080
      targetPort: 8080
      name: http
    - port: 80
      targetPort: 7476
      name: qui-ui
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qbittorrent
  namespace: media
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: mgmt-force-https@kubernetescrd,mgmt-authelia@kubernetescrd
spec:
  rules:
    - host: qui.${DOMAIN_NAME}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qbittorrent
                port:
                  name: qui-ui
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbit-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
