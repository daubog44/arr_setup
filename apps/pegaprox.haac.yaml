apiVersion: haac.dev/v1alpha1
kind: App
metadata:
  name: pegaprox
spec:
  enabled: true
  profile: stateful-web-app
  namespace: mgmt
  image:
    repository: ghcr.io/pegaprox/pegaprox
    tag: 0.9.8.1
  service:
    port: 5000
    extraPorts:
      - name: vnc-ws
        port: 5001
      - name: ssh-ws
        port: 5002
  auth:
    oidc:
      enabled: true
      provider: generic
      issuer: https://auth.${DOMAIN_NAME}
      clientID: pegaprox
      redirectURI: https://pegaprox.${DOMAIN_NAME}/oidc/callback
      scopes:
        - openid
        - profile
        - email
        - groups
      buttonText: Sign in with Authelia
      defaultRole: viewer
      autoCreateUsers: true
  route:
    subdomain: pegaprox
    auth: edge_forward_auth
    presets:
      - pegaprox-console
  storage:
    config:
      enabled: true
      size: 5Gi
      mountPath: /app/config
  env:
    - name: PEGAPROX_BEHIND_PROXY
      value: "true"
    - name: PEGAPROX_HOST
      value: 0.0.0.0
    - name: PEGAPROX_ALLOWED_ORIGINS
      value: https://pegaprox.${DOMAIN_NAME}
    - name: PEGAPROX_URL
      value: https://pegaprox.${DOMAIN_NAME}
    - name: PEGAPROX_SERVER
      value: auto
    - name: PEGAPROX_OIDC_PROVIDER
      value: generic
    - name: PEGAPROX_OIDC_AUTHORITY
      value: https://auth.${DOMAIN_NAME}
    - name: PEGAPROX_OIDC_CLIENT_ID
      value: pegaprox
    - name: PEGAPROX_OIDC_REDIRECT_URI
      value: https://pegaprox.${DOMAIN_NAME}/oidc/callback
    - name: PEGAPROX_OIDC_SCOPES
      value: openid profile email groups
    - name: PEGAPROX_OIDC_BUTTON_TEXT
      value: Sign in with Authelia
    - name: PEGAPROX_OIDC_DEFAULT_ROLE
      value: viewer
  secrets:
    - name: PEGAPROX_OIDC_CLIENT_SECRET
      secretName: pegaprox-oidc-secret
      key: clientSecret
  observability:
    metrics:
      enabled: true
      path: /api/metrics
      interval: 30s
  postInstall:
    hooks:
      - pegaprox-settings
  homepage:
    group: Management
    name: PegaProx
    icon: mdi-server
    description: Proxmox and XCP-ng datacenter management UI
  security:
    runAsUser: 999
    runAsGroup: 999
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 2Gi
