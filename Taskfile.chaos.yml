version: "3"

vars:
  HAAC_CMD: '{{default "haac" .HAAC_CMD}}'
  PYTHON_CMD: '{{default "python" .PYTHON_CMD}}'
  TOFU_DIR: '{{default "tofu" .TOFU_DIR}}'
  LXC_PASSWORD_VALUE:
    sh: '{{.HAAC_CMD}} env-value --name LXC_PASSWORD'
  NAS_PATH_VALUE:
    sh: '{{.HAAC_CMD}} env-value --name NAS_PATH'
  KUBECTL:
    sh: '{{.HAAC_CMD}} tool-path --name kubectl'
  K3S_KUBECONFIG:
    sh: '{{.HAAC_CMD}} kubeconfig-path'
  MASTER_IP:
    sh: '{{.HAAC_CMD}} master-ip'
  PROXMOX_HOST:
    sh: '{{.HAAC_CMD}} proxmox-access-host'

tasks:
  post-install:
    desc: Reconcile the Litmus chaos center, default infra, and repo-managed chaos experiment catalog after the platform apps are healthy.
    env:
      PROXMOX_HOST_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      LXC_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      NAS_PATH: "{{.NAS_PATH_VALUE}}"
    cmds:
      - '{{.HAAC_CMD}} check-env'
      - '{{.HAAC_CMD}} doctor'
      - '{{.HAAC_CMD}} reconcile-litmus-admin'
      - '{{.HAAC_CMD}} reconcile-litmus-chaos'
