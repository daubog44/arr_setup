version: "3"

vars:
  PYTHON_CMD: '{{default "python" .PYTHON_CMD}}'
  TOFU_DIR: '{{default "tofu" .TOFU_DIR}}'
  LXC_PASSWORD_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name LXC_PASSWORD'
  NAS_PATH_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name NAS_PATH'
  KUBECTL:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" tool-path --name kubectl'
  K3S_KUBECONFIG:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" kubeconfig-path'
  MASTER_IP:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" tofu-output --dir "{{.TOFU_DIR}}" --name master_ip --default 127.0.0.1'
  PROXMOX_HOST:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" proxmox-access-host'

tasks:
  post-install:
    desc: Reconcile the Litmus chaos center, default infra, and repo-managed chaos experiment catalog after the platform apps are healthy.
    env:
      PROXMOX_HOST_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      LXC_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      NAS_PATH: "{{.NAS_PATH_VALUE}}"
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" check-env'
      - '{{.PYTHON_CMD}} "scripts/haac.py" doctor'
      - '{{.PYTHON_CMD}} "scripts/haac.py" reconcile-litmus-admin --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'
      - '{{.PYTHON_CMD}} "scripts/haac.py" reconcile-litmus-chaos --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'
