version: "3"

dotenv: [".env"]

vars:
  TOFU_DIR: tofu
  DEFAULT_GATEWAY:
    sh: "ip route | grep default | awk '{print $3}' | head -n 1"

tasks:
  default:
    cmds:
      - task: up

  check-env:
    desc: Check if .env file exists and has required variables.
    cmds:
      - test -f .env || (echo "Please create a .env file based on .env.example" && exit 1)
      - test -n "{{.LXC_PASSWORD}}" || (echo "LXC_PASSWORD is not set in .env" && exit 1)
      - test -n "{{.LXC_MASTER_HOSTNAME}}" || (echo "LXC_MASTER_HOSTNAME is not set in .env" && exit 1)
      - test -n "{{.DOMAIN_NAME}}" || (echo "DOMAIN_NAME is not set in .env" && exit 1)
      - test -n "{{.NAS_ADDRESS}}" || (echo "NAS_ADDRESS is not set in .env" && exit 1)



  sync:
    desc: "🔄 Sincronizza il repository locale con GitHub (per caricare gli auto-merge di Renovate)."
    cmds:
      - git stash --include-untracked || true
      - git pull --rebase
      - git stash pop || true
      - echo "✅ Repository locale aggiornato."

  up:
    desc: "🚀 Eroga l'intera infrastruttura da zero: Crea i container LXC, configura il SO, installa K3s e avvia il CD GitOps."
    dir: "{{.TOFU_DIR}}"
    deps: [check-env, sync]
    env:
      # Unified Tofu Variables from .env
      TF_VAR_lxc_password: "{{.LXC_PASSWORD}}"
      TF_VAR_lxc_master_hostname: "{{.LXC_MASTER_HOSTNAME}}"
      TF_VAR_master_target_node: "{{.MASTER_TARGET_NODE}}"
      TF_VAR_k3s_master_ip: "{{.K3S_MASTER_IP}}"
      TF_VAR_lxc_gateway: "{{.DEFAULT_GATEWAY}}"
      TF_VAR_worker_nodes: "{{.WORKER_NODES_JSON}}"
      TF_VAR_host_nas_path: "{{.HOST_NAS_PATH}}"
      TF_VAR_cloudflare_tunnel_token: "{{.CLOUDFLARE_TUNNEL_TOKEN}}"
      TF_VAR_domain_name: "{{.DOMAIN_NAME}}"
      TF_VAR_protonvpn_openvpn_username: "{{.PROTONVPN_OPENVPN_USERNAME}}"
      TF_VAR_protonvpn_openvpn_password: "{{.PROTONVPN_OPENVPN_PASSWORD}}"
      TF_VAR_smb_user: "{{.SMB_USER}}"
      TF_VAR_smb_password: "{{.SMB_PASSWORD}}"
      TF_VAR_nas_address: "{{.NAS_ADDRESS}}"
      TF_VAR_nas_share_name: "{{.NAS_SHARE_NAME}}"
      TF_VAR_storage_uid: "{{.STORAGE_UID}}"
      TF_VAR_storage_gid: "{{.STORAGE_GID}}"
      
      # Ansible / App Variables
      PROXMOX_HOST_PASSWORD: "{{.LXC_PASSWORD}}"
      LXC_PASSWORD: "{{.LXC_PASSWORD}}"
      NAS_PATH: "{{.NAS_PATH}}"
      HEADLAMP_USERNAME: "{{.HEADLAMP_USERNAME}}"
      HEADLAMP_PASSWORD: "{{.HEADLAMP_PASSWORD}}"
      ARGOCD_USERNAME: "{{.ARGOCD_USERNAME}}"
      ARGOCD_PASSWORD: "{{.ARGOCD_PASSWORD}}"
      QUI_USERNAME: "{{.QUI_USERNAME}}"
      QUI_PASSWORD: "{{.QUI_PASSWORD}}"

    cmds:
      - task: setup-hooks
      - echo "🏗️ Avvio provisioning layer fisico (OpenTofu)..."
      - tofu init
      - tofu apply -auto-approve
      - echo "⚙️ Avvio configurazione OS e K3s (Ansible)..."
      - task: configure-os
      - echo "🚢 Inizializzazione flotta GitOps Kubernetes..."
      - task: gitops-bootstrap
      - echo "✅ Infrastruttura e applicazioni completamente deployate."
      - task: verify-all

  configure-os:
    desc: "⚙️ Esegue *solo* il playbook Ansible per configurare i nodi LXC (utile in caso di fix veloci all'OS)."
    dir: ansible
    deps: [check-env]
    env:
      PROXMOX_HOST_PASSWORD: "{{.LXC_PASSWORD}}"
      LXC_PASSWORD: "{{.LXC_PASSWORD}}"
      NAS_PATH: "{{.NAS_PATH}}"

    cmds:
      - ansible-playbook {{.DEBUG_LEVEL}} -i inventory.yml playbook.yml

  gitops-bootstrap:
    desc: "📦 Pipeline che raggruppa il deploy base (ArgoCD + Namespace), la generazione dei secret ed il primo deploy locale condizionale."
    cmds:
      - task: deploy-argocd
      - task: generate-secrets
      - task: deploy-local
      - task: sync-cloudflare
      - task: configure-apps
      - echo "📦 Sincronizzazione inventory Ansible nel cluster per il CronJob di manutenzione..."
      - KUBECONFIG=/home/daubog44/.kube/haac-k3s.yaml /home/daubog44/.local/bin/kubectl create configmap ansible-inventory-cm -n mgmt --from-file=inventory.yml=ansible/inventory.yml --dry-run=client -o yaml | KUBECONFIG=/home/daubog44/.kube/haac-k3s.yaml /home/daubog44/.local/bin/kubectl apply -f -

  verify-all:
    desc: "🔎 Pipeline di verifica totale: controlla salute del cluster Kubernetes e raggiungibilità dei servizi sul Web."
    cmds:
      - task: verify-cluster
      - task: verify-endpoints

  deploy-argocd:
    desc: "🧱 Applica le configurazioni ArgoCD con sostituzione del dominio (sealed secrets e namespace li gestisce il playbook Ansible)."
    deps: [check-env]
    vars:
      K3S_KUBECONFIG: "/home/daubog44/.kube/haac-k3s.yaml"
      KUBECTL: "/home/daubog44/.local/bin/kubectl"
      MASTER_IP:
        sh: "tofu -chdir={{.TOFU_DIR}} output -raw master_ip 2>/dev/null | head -n 1 || echo '127.0.0.1'"
      PROXMOX_HOST:
        sh: "tofu -chdir={{.TOFU_DIR}} output -raw master_target_node 2>/dev/null | head -n 1 || echo 'pve'"
    cmds:
      - echo "Opening SSH Tunnel per applicare le ArgoCD Application con DOMAIN_NAME..."
      - ssh -L 6443:{{.MASTER_IP}}:6443 -o StrictHostKeyChecking=no -N -f root@{{.PROXMOX_HOST}}
      - echo "Aggiorno l'IP del server nel kubeconfig..."
      - sed -i "s/https:\/\/.*:6443/https:\/\/127.0.0.1:6443/g" {{.K3S_KUBECONFIG}}
      - echo "Applicazione ArgoCD Applications (con sostituzione DOMAIN_NAME)..."
      - "find k8s/core/argocd -name \"*.yaml\" -type f | xargs -I {} sh -c \"export DOMAIN_NAME={{.DOMAIN_NAME}}; envsubst '\\$DOMAIN_NAME' < {} | KUBECONFIG={{.K3S_KUBECONFIG}} {{.KUBECTL}} apply -f -\""
      - echo "Patch configmap ArgoCD per disabilitare TLS interno (Traefik lo gestisce)..."
      - KUBECONFIG={{.K3S_KUBECONFIG}} {{.KUBECTL}} patch configmap argocd-cmd-params-cm -n argocd --type merge -p '{"data":{"server.insecure":"true"}}' || true
      - pkill -f "ssh -L 6443:{{.MASTER_IP}}:6443" || true
      - echo "✅ ArgoCD Applications create. ArgoCD sincronizzerà il cluster in autonomia."

  generate-secrets:
    desc: "🔐 Estrae valori dal .env locale, idrata i template e cripta i SealedSecrets in locale (Non tocca il cluster)."
    deps: [check-env]
    vars:
      MASTER_IP:
        sh: "tofu -chdir={{.TOFU_DIR}} output -raw master_ip 2>/dev/null | head -n 1 || echo '127.0.0.1'"
      PROXMOX_HOST:
        sh: "tofu -chdir={{.TOFU_DIR}} output -raw master_target_node 2>/dev/null | head -n 1 || echo 'pve'"
    cmds:
      - echo "Opening SSH Tunnel to K3s Master for kubeseal cert fetch..."
      - ssh -L 6443:{{.MASTER_IP}}:6443 -o StrictHostKeyChecking=no -N -f root@{{.PROXMOX_HOST}} || true
      - echo "🔐 Generazione dei Sealed Secrets per il setup GitOps..."
      - ./scripts/generate-sealed-secrets.sh
      - pkill -f "ssh -L 6443:{{.MASTER_IP}}:6443" || true
      - echo "📦 Caricamento Ansible Inventory su Kubernetes come ConfigMap per Semaphore..."
      - KUBECONFIG=$HOME/.kube/haac-k3s.yaml kubectl create namespace mgmt --dry-run=client -o yaml | KUBECONFIG=$HOME/.kube/haac-k3s.yaml kubectl apply -f -
      - KUBECONFIG=$HOME/.kube/haac-k3s.yaml kubectl create configmap ansible-inventory-cm -n mgmt --from-file=inventory.yml=./ansible/inventory.yml --dry-run=client -o yaml | KUBECONFIG=$HOME/.kube/haac-k3s.yaml kubectl apply -f -
      - echo "✅ Fatto! Ricordati di fare commit e push dei file generati in k8s/charts/haac-stack/templates/secrets/"

  setup-hooks:
    desc: "🪝 Inietta un hook in Git: automatizza 'generate-secrets' ad ogni commit per non perdere mai password aggiornate."
    cmds:
      - >
        echo '#!/usr/bin/env bash' > .git/hooks/pre-commit
      - >
        echo 'echo "Esecuzione pre-commit hook: Generazione Sealed Secrets..."' >> .git/hooks/pre-commit
      - >
        echo 'if KUBECONFIG=$HOME/.kube/haac-k3s.yaml kubectl get ns kube-system >/dev/null 2>&1; then ./scripts/generate-sealed-secrets.sh; else echo "⚠️ K3s non raggiungibile dal pre-commit hook. Salto la rigenerazione secrets per evitare di corromperli."; exit 0; fi' >> .git/hooks/pre-commit
      - >
        echo 'git add k8s/charts/haac-stack/templates/secrets/ k8s/charts/haac-stack/values.yaml' >> .git/hooks/pre-commit
      - chmod +x .git/hooks/pre-commit
      - echo "Git pre-commit hook configurato con successo."

  deploy-local:
    desc: "⚡ Applica le modifiche locali di haac-stack al cluster K3s bypassando Git (ideale per Fast Feedback testing)."
    deps: [generate-secrets]
    vars:
      K3S_KUBECONFIG: "/home/daubog44/.kube/haac-k3s.yaml"
      KUBECTL: "/home/daubog44/.local/bin/kubectl"
      MASTER_IP:
        sh: "tofu -chdir={{.TOFU_DIR}} output -raw master_ip 2>/dev/null | head -n 1 || echo '127.0.0.1'"
      PROXMOX_HOST:
        sh: "tofu -chdir={{.TOFU_DIR}} output -raw master_target_node 2>/dev/null | head -n 1 || echo 'pve'"
    cmds:
      - echo "Opening SSH Tunnel to K3s Master for local deploy..."
      - ssh -L 6443:{{.MASTER_IP}}:6443 -o StrictHostKeyChecking=no -N -f root@{{.PROXMOX_HOST}} || true
      - echo "⚙️ Pre-installazione CRD system-upgrade-controller..."
      - KUBECONFIG={{.K3S_KUBECONFIG}} {{.KUBECTL}} apply --server-side -f https://github.com/rancher/system-upgrade-controller/releases/latest/download/crd.yaml || true
      - echo "⏳ Attendo che il CRD upgrade.cattle.io/v1 sia disponibile..."
      - KUBECONFIG={{.K3S_KUBECONFIG}} {{.KUBECTL}} wait --for=condition=established crd/plans.upgrade.cattle.io --timeout=60s || true
      - |
        if KUBECONFIG={{.K3S_KUBECONFIG}} {{.KUBECTL}} get application haac-stack -n argocd >/dev/null 2>&1; then
          echo "⏭️  ArgoCD sta già gestendo attivamente il cluster. Salto il comando 'helm upgrade' locale per evitare conflitti Server-Side Apply."
        else
          echo "⚠️  Forzatura dell'applicazione dei template locali su Kubernetes (ArgoCD non ancora attivo)..."
          KUBECONFIG={{.K3S_KUBECONFIG}} helm upgrade --install haac-stack ./k8s/charts/haac-stack -n mgmt --create-namespace
        fi
      - pkill -f "ssh -L 6443:{{.MASTER_IP}}:6443" || true
      - echo "✅ Task deploy-local completato."

  verify-cluster:
    desc: "🛠️ Riesegue i ping al cluster master/worker e controlla il networking dei nodi K3s interni."
    vars:
      K3S_KUBECONFIG: "/home/daubog44/.kube/haac-k3s.yaml"
      KUBECTL: "/home/daubog44/.local/bin/kubectl"
      MASTER_IP:
        sh: "tofu -chdir={{.TOFU_DIR}} output -raw master_ip 2>/dev/null | head -n 1 || echo '127.0.0.1'"
      PROXMOX_HOST:
        sh: "tofu -chdir={{.TOFU_DIR}} output -raw master_target_node 2>/dev/null | head -n 1 || echo 'pve'"
    cmds:
      - echo "Opening SSH Tunnel to K3s Master for verification..."
      - ssh -L 6443:{{.MASTER_IP}}:6443 -o StrictHostKeyChecking=no -N -f root@{{.PROXMOX_HOST}} || true
      - KUBECONFIG={{.K3S_KUBECONFIG}} ./scripts/verify_cluster.sh
      - pkill -f "ssh -L 6443:{{.MASTER_IP}}:6443" || true

  verify-endpoints:
    desc: "🌐 Controlla dinamicamente lo status HTTP di ogni applicazione esposta via Cloudflare Tunnel."
    cmds:
      - DOMAIN_NAME="{{.DOMAIN_NAME}}" ./scripts/verify-web.sh

  sync-cloudflare:
    desc: "☁️ Crea e aggiorna automaticamente le rotte Ingress e DNS su Cloudflare Zero Trust preservando record preesistenti."
    deps: [check-env]
    cmds:
      - ./scripts/sync-cloudflare-tunnel.sh

  configure-apps:
    desc: "⚙️ Configura le password e le API iniziali (ArgoCD, Headlamp, QUI) post-deploy."
    deps: [check-env]
    vars:
      K3S_KUBECONFIG: "/home/daubog44/.kube/haac-k3s.yaml"
      MASTER_IP:
        sh: "tofu -chdir={{.TOFU_DIR}} output -raw master_ip 2>/dev/null | head -n 1 || echo '127.0.0.1'"
      PROXMOX_HOST:
        sh: "tofu -chdir={{.TOFU_DIR}} output -raw master_target_node 2>/dev/null | head -n 1 || echo 'pve'"
    cmds:
      - echo "Opening SSH Tunnel for app configuration..."
      - ssh -L 6443:{{.MASTER_IP}}:6443 -o StrictHostKeyChecking=no -N -f root@{{.PROXMOX_HOST}} || true
      - KUBECONFIG={{.K3S_KUBECONFIG}} ./scripts/setup-auth.sh
      - pkill -f "ssh -L 6443:{{.MASTER_IP}}:6443" || true

  restore-k3s:
    desc: "⏪ Ripristina il database SQLite K3s (state.db) da un backup presente sul NAS. Usage: go-task restore-k3s BACKUP_FILE=k3s-state-20231025.db"
    deps: [check-env]
    vars:
      MASTER_TARGET_NODE: "{{.MASTER_TARGET_NODE}}"
      BACKUP_FILE: '{{default "k3s-state-latest.db" .BACKUP_FILE}}'
      NAS_MOUNT_PATH: '/mnt/pve/HaaC-Storage/media/k3s' # Using the Proxmox bind mount path
    cmds:
      - 'echo "⚠️ Iniziando il ripristino di K3s dal backup: {{.BACKUP_FILE}}"'
      - 'echo "1. Fermo il servizio K3s sul master..."'
      - 'ssh -o StrictHostKeyChecking=no root@{{.MASTER_TARGET_NODE}} "pct exec $(tofu -chdir={{.TOFU_DIR}} output -raw master_vmid) -- systemctl stop k3s"'
      - 'echo "2. Sposto il database attuale e ripristino il backup..."'
      - |
        ssh -o StrictHostKeyChecking=no root@{{.MASTER_TARGET_NODE}} << 'EOF'
        LXC_ID=$(pct list | grep "haacarr-master" | awk '{print $1}')
        pct exec $LXC_ID -- mv /var/lib/rancher/k3s/server/db/state.db /var/lib/rancher/k3s/server/db/state.db.corrupted-$(date +%s)
        cp {{.NAS_MOUNT_PATH}}/{{.BACKUP_FILE}} /var/lib/lxc/$LXC_ID/rootfs/var/lib/rancher/k3s/server/db/state.db
        pct exec $LXC_ID -- chown root:root /var/lib/rancher/k3s/server/db/state.db
        EOF
      - 'echo "3. Riaccendo il servizio K3s..."'
      - 'ssh -o StrictHostKeyChecking=no root@{{.MASTER_TARGET_NODE}} "pct exec $(tofu -chdir={{.TOFU_DIR}} output -raw master_vmid) -- systemctl start k3s"'
      - 'echo "✅ K3s ripristinato con successo! Controlla i pod con: kubectl get pods -A"'

  down:
    desc: Distrugge l'infrastruttura (LXC e tutto il suo contenuto).
    dir: "{{.TOFU_DIR}}"
    deps: [check-env]
    env:
      # Unified Tofu Variables from .env
      TF_VAR_lxc_password: "{{.LXC_PASSWORD}}"
      TF_VAR_lxc_master_hostname: "{{.LXC_MASTER_HOSTNAME}}"
      TF_VAR_master_target_node: "{{.MASTER_TARGET_NODE}}"
      TF_VAR_k3s_master_ip: "{{.K3S_MASTER_IP}}"
      TF_VAR_lxc_gateway: "{{.DEFAULT_GATEWAY}}"
      TF_VAR_worker_nodes: "{{.WORKER_NODES_JSON}}"
      TF_VAR_host_nas_path: "{{.HOST_NAS_PATH}}"
      TF_VAR_cloudflare_tunnel_token: "{{.CLOUDFLARE_TUNNEL_TOKEN}}"
      TF_VAR_domain_name: "{{.DOMAIN_NAME}}"
      TF_VAR_protonvpn_openvpn_username: "{{.PROTONVPN_OPENVPN_USERNAME}}"
      TF_VAR_protonvpn_openvpn_password: "{{.PROTONVPN_OPENVPN_PASSWORD}}"
      TF_VAR_smb_user: "{{.SMB_USER}}"
      TF_VAR_smb_password: "{{.SMB_PASSWORD}}"
      TF_VAR_nas_address: "{{.NAS_ADDRESS}}"
      TF_VAR_nas_share_name: "{{.NAS_SHARE_NAME}}"
      TF_VAR_storage_uid: "{{.STORAGE_UID}}"
      TF_VAR_storage_gid: "{{.STORAGE_GID}}"

    cmds:
      - tofu init
      - tofu destroy -auto-approve
