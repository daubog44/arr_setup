version: "3"

dotenv: [".env"]

vars:
  PYTHON_CMD: '{{default "python" .PYTHON_CMD}}'
  TOFU_DIR: tofu
  LXC_PASSWORD_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name LXC_PASSWORD'
  LXC_ROOTFS_DATASTORE_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name LXC_ROOTFS_DATASTORE'
  LXC_MASTER_HOSTNAME_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name LXC_MASTER_HOSTNAME'
  LXC_UNPRIVILEGED_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name LXC_UNPRIVILEGED'
  LXC_NESTING_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name LXC_NESTING'
  MASTER_TARGET_NODE_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name MASTER_TARGET_NODE'
  K3S_MASTER_IP_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name K3S_MASTER_IP'
  WORKER_NODES_JSON_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name WORKER_NODES_JSON'
  HOST_NAS_PATH_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name HOST_NAS_PATH'
  CLOUDFLARE_TUNNEL_TOKEN_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name CLOUDFLARE_TUNNEL_TOKEN'
  DOMAIN_NAME_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name DOMAIN_NAME'
  PROTONVPN_OPENVPN_USERNAME_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name PROTONVPN_OPENVPN_USERNAME'
  PROTONVPN_OPENVPN_PASSWORD_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name PROTONVPN_OPENVPN_PASSWORD'
  SMB_USER_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name SMB_USER'
  SMB_PASSWORD_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name SMB_PASSWORD'
  NAS_ADDRESS_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name NAS_ADDRESS'
  NAS_SHARE_NAME_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name NAS_SHARE_NAME'
  STORAGE_UID_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name STORAGE_UID'
  STORAGE_GID_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name STORAGE_GID'
  NAS_PATH_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name NAS_PATH'
  TOFU_CMD:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" tool-path --name tofu'
  KUBECTL:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" tool-path --name kubectl'
  HELM:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" tool-path --name helm'
  K3S_KUBECONFIG:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" kubeconfig-path'
  DEFAULT_GATEWAY:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" default-gateway'
  MASTER_IP:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" tofu-output --dir "{{.TOFU_DIR}}" --name master_ip --default 127.0.0.1'
  PROXMOX_HOST:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" tofu-output --dir "{{.TOFU_DIR}}" --name master_target_node --default pve'

env:
  TF_VAR_lxc_password: "{{.LXC_PASSWORD_VALUE}}"
  TF_VAR_lxc_rootfs_datastore: "{{.LXC_ROOTFS_DATASTORE_VALUE}}"
  TF_VAR_lxc_master_hostname: "{{.LXC_MASTER_HOSTNAME_VALUE}}"
  TF_VAR_lxc_unprivileged: "{{.LXC_UNPRIVILEGED_VALUE}}"
  TF_VAR_lxc_nesting: "{{.LXC_NESTING_VALUE}}"
  TF_VAR_master_target_node: "{{.MASTER_TARGET_NODE_VALUE}}"
  TF_VAR_k3s_master_ip: "{{.K3S_MASTER_IP_VALUE}}"
  TF_VAR_lxc_gateway: "{{.DEFAULT_GATEWAY}}"
  TF_VAR_worker_nodes: "{{.WORKER_NODES_JSON_VALUE}}"
  TF_VAR_host_nas_path: "{{.HOST_NAS_PATH_VALUE}}"
  TF_VAR_cloudflare_tunnel_token: "{{.CLOUDFLARE_TUNNEL_TOKEN_VALUE}}"
  TF_VAR_domain_name: "{{.DOMAIN_NAME_VALUE}}"
  TF_VAR_protonvpn_openvpn_username: "{{.PROTONVPN_OPENVPN_USERNAME_VALUE}}"
  TF_VAR_protonvpn_openvpn_password: "{{.PROTONVPN_OPENVPN_PASSWORD_VALUE}}"
  TF_VAR_smb_user: "{{.SMB_USER_VALUE}}"
  TF_VAR_smb_password: "{{.SMB_PASSWORD_VALUE}}"
  TF_VAR_nas_address: "{{.NAS_ADDRESS_VALUE}}"
  TF_VAR_nas_share_name: "{{.NAS_SHARE_NAME_VALUE}}"
  TF_VAR_storage_uid: "{{.STORAGE_UID_VALUE}}"
  TF_VAR_storage_gid: "{{.STORAGE_GID_VALUE}}"
  TF_VAR_python_executable: "{{.PYTHON_CMD}}"

tasks:
  default:
    cmds:
      - task: up

  check-env:
    desc: Validate the local .env file and the minimum variables required by the stack.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" check-env'

  doctor:
    desc: Verify the local Windows/WSL or Unix tooling required by the project before a full run.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" doctor'

  install-tools:
    desc: Bootstrap the local `.tools/bin` toolchain on any OS, and install the required WSL control-node packages on Windows.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" install-tools'

  install-windows-tools:
    desc: Backward-compatible alias for `task install-tools`.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" install-windows-tools'

  install-wsl-tools:
    desc: Install the required Ansible control-node packages inside the configured WSL distro.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" install-wsl-tools'

  sync:
    desc: Save local work and sync the GitOps branch from `GITOPS_REPO_REVISION`, preferring local changes on merge conflicts.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" sync-repo'

  up:
    desc: "Full bootstrap from scratch: OpenTofu, Ansible, GitOps bootstrap, app configuration, and verification."
    deps: [check-env, doctor, sync]
    env:
      PROXMOX_HOST_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      LXC_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      NAS_PATH: "{{.NAS_PATH_VALUE}}"
    cmds:
      - task: setup-hooks
      - '{{.PYTHON_CMD}} "scripts/haac.py" run-tofu --dir "{{.TOFU_DIR}}" init'
      - '{{.PYTHON_CMD}} "scripts/haac.py" run-tofu --dir "{{.TOFU_DIR}}" apply -auto-approve'
      - task: configure-os
      - task: gitops-bootstrap
        vars:
          PUSH_ALL: "{{.PUSH_ALL}}"
      - task: verify-all

  plan:
    desc: Run a safe OpenTofu plan with all environment-backed variables.
    deps: [check-env]
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" run-tofu --dir "{{.TOFU_DIR}}" init'
      - '{{.PYTHON_CMD}} "scripts/haac.py" run-tofu --dir "{{.TOFU_DIR}}" plan'

  configure-os:
    desc: Run only the Ansible playbook to configure Proxmox and the K3s nodes.
    deps: [check-env, doctor]
    env:
      PROXMOX_HOST_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      LXC_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      NAS_PATH: "{{.NAS_PATH_VALUE}}"
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" run-ansible --inventory ansible/inventory.yml --playbook ansible/playbook.yml --extra-args "{{.DEBUG_LEVEL}}"'

  gitops-bootstrap:
    desc: Generate secrets, push them, bootstrap the App-of-Apps in ArgoCD, and let in-cluster post-deploy automation reconcile itself.
    cmds:
      - task: generate-secrets
      - task: push-changes
        vars:
          PUSH_ALL: "{{.PUSH_ALL}}"
      - task: deploy-argocd
      - task: wait-for-argocd-sync
      - task: sync-cloudflare

  verify-all:
    desc: Verify cluster health and public endpoints.
    cmds:
      - task: verify-cluster
      - task: verify-endpoints

  monitor:
    desc: Open a K9s session against the remote cluster through an SSH tunnel.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" monitor --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}"'

  deploy-argocd:
    desc: Apply the ArgoCD app manifests with DOMAIN_NAME substitution.
    deps: [check-env]
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" deploy-argocd --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'

  generate-secrets:
    desc: Fetch the Sealed Secrets public cert, hydrate templates, and regenerate local Sealed Secrets.
    deps: [check-env]
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" generate-secrets --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'

  push-changes:
    desc: Save local work, regenerate sealed secrets from the cached cert, then push changes if a git remote exists.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" push-changes {{if eq .PUSH_ALL "true"}}--push-all{{end}} --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'

  setup-hooks:
    desc: Install a cross-platform pre-commit hook that regenerates Sealed Secrets when the cluster is reachable.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" setup-hooks'

  deploy-local:
    desc: Apply the local haac-stack chart when ArgoCD is not already managing it.
    deps: [generate-secrets]
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" deploy-local --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}" --helm "{{.HELM}}"'

  wait-for-argocd-sync:
    desc: Wait for ArgoCD to sync haac-stack and for the critical downloader pod to become ready.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" wait-for-stack --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}" --timeout 3600'

  verify-cluster:
    desc: Run cluster-level checks over the remote K3s API.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" verify-cluster --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'

  verify-endpoints:
    desc: Check the public HTTP endpoints exposed through Cloudflare and Traefik.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" verify-web --domain "{{.DOMAIN_NAME_VALUE}}"'

  sync-cloudflare:
    desc: Reconcile Cloudflare Tunnel ingress rules and the required DNS records.
    deps: [check-env]
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" sync-cloudflare'

  configure-apps:
    desc: Manual fallback bootstrap for QUI and qBittorrent when the in-cluster bootstrap Job must be retriggered explicitly.
    deps: [check-env]
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" configure-apps --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'

  configure-argocd-local-auth:
    desc: Optionally configure a local ArgoCD username/password fallback on top of the declarative OIDC setup.
    deps: [check-env]
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" configure-argocd-local-auth --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'

  restore-k3s:
    desc: Restore the K3s SQLite database from a NAS backup file.
    vars:
      BACKUP_FILE: '{{default "k3s-state-latest.db" .BACKUP_FILE}}'
      NAS_MOUNT_PATH: "/mnt/pve/HaaC-Storage/media/k3s"
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" restore-k3s --master-target-node "{{.PROXMOX_HOST}}" --tofu-dir "{{.TOFU_DIR}}" --backup-file "{{.BACKUP_FILE}}" --nas-mount-path "{{.NAS_MOUNT_PATH}}"'

  shutdown-cluster:
    desc: Gracefully stop the K3s LXC containers on Proxmox.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" shutdown-cluster --master-target-node "{{.PROXMOX_HOST}}" --tofu-dir "{{.TOFU_DIR}}"'

  down:
    desc: Destroy the infrastructure after a graceful cluster shutdown.
    deps: [check-env]
    cmds:
      - task: shutdown-cluster
      - '{{.PYTHON_CMD}} "scripts/haac.py" run-tofu --dir "{{.TOFU_DIR}}" init'
      - '{{.PYTHON_CMD}} "scripts/haac.py" run-tofu --dir "{{.TOFU_DIR}}" destroy -auto-approve'
      - '{{.PYTHON_CMD}} "scripts/haac.py" remove-file --path "scripts/pub-sealed-secrets.pem"'
