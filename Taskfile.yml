version: "3"

dotenv: [".env"]

vars:
  PYTHON_CMD: '{{default "python" .PYTHON_CMD}}'
  TOFU_DIR: tofu
  LXC_PASSWORD_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name LXC_PASSWORD'
  DOMAIN_NAME_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name DOMAIN_NAME'
  NAS_PATH_VALUE:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" env-value --name NAS_PATH'
  KUBECTL:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" tool-path --name kubectl'
  HELM:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" tool-path --name helm'
  K3S_KUBECONFIG:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" kubeconfig-path'
  MASTER_IP:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" tofu-output --dir "{{.TOFU_DIR}}" --name master_ip --default 127.0.0.1'
  PROXMOX_HOST:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" proxmox-access-host'

tasks:
  default:
    cmds:
      - task: up

  check-env:
    desc: Validate the required `.env` inputs plus the effective workstation-to-Proxmox access path.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" check-env'

  doctor:
    desc: Verify the local Windows/WSL or Unix tooling required before provisioning starts.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" doctor'

  preflight:
    desc: "Run the ordered bootstrap preflight: env validation plus workstation/tooling checks."
    cmds:
      - task: check-env
      - task: doctor

  install-tools:
    desc: Bootstrap the local platform-aware `.tools/<os>-<arch>/bin` toolchain and, on Windows, the WSL control-node packages.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" install-tools'

  install-windows-tools:
    desc: Backward-compatible alias for `task install-tools`.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" install-windows-tools'

  install-wsl-tools:
    desc: Install the required Ansible control-node packages inside the configured WSL distro.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" install-wsl-tools'

  clean-artifacts:
    desc: Remove stray local investigation artifacts outside `.tmp/`.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" clean-artifacts'

  sync:
    desc: Save local work, validate the declared GitOps remote, and own the explicit merge-policy path before provisioning.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" sync-repo'

  up:
    desc: "Full bootstrap from scratch: OpenTofu, Ansible, GitOps bootstrap, app configuration, and verification."
    env:
      PROXMOX_HOST_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      LXC_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      NAS_PATH: "{{.NAS_PATH_VALUE}}"
    cmds:
      - task: preflight
      - task: setup-hooks
      - task: provision-infra
      - task: configure-os
      - task: gitops-bootstrap
      - task: verify-all

  plan:
    desc: Run a diagnostic OpenTofu plan with provider refresh enabled so unsupported Proxmox LXC drift stays visible.
    deps: [check-env]
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" run-tofu --dir "{{.TOFU_DIR}}" init'
      - '{{.PYTHON_CMD}} "scripts/haac.py" run-tofu --dir "{{.TOFU_DIR}}" plan'

  configure-os:
    desc: Run only the Ansible playbook to configure Proxmox and the K3s nodes.
    deps: [check-env, doctor]
    env:
      PROXMOX_HOST_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      LXC_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      NAS_PATH: "{{.NAS_PATH_VALUE}}"
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" run-ansible --inventory ansible/inventory.yml --playbook ansible/playbook.yml --extra-args={{default "" .DEBUG_LEVEL}}'

  provision-infra:
    desc: Reconcile the declared OpenTofu infrastructure using the state-safe apply path required by the current Proxmox LXC provider gap.
    env:
      PROXMOX_HOST_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      LXC_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      NAS_PATH: "{{.NAS_PATH_VALUE}}"
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" run-tofu --dir "{{.TOFU_DIR}}" init'
      - '{{.PYTHON_CMD}} "scripts/haac.py" run-tofu --dir "{{.TOFU_DIR}}" apply -auto-approve'

  gitops-bootstrap:
    desc: Generate secrets, push them, bootstrap the App-of-Apps in ArgoCD, and let in-cluster post-deploy automation reconcile itself.
    cmds:
      - task: generate-secrets
      - task: push-changes
      - task: deploy-argocd
      - task: wait-for-argocd-sync
      - task: sync-cloudflare

  reconcile:sealed-secrets:
    desc: "Regenerate Sealed Secrets from `.env`, publish only the GitOps outputs, and wait for the cluster to reconcile them."
    cmds:
      - task: generate-secrets
      - task: push-changes
      - task: wait-for-argocd-sync

  reconcile:argocd:
    desc: "Push GitOps state, re-apply the remote ArgoCD bootstrap overlay, reconcile Cloudflare edge state, and verify public URLs."
    cmds:
      - task: push-changes
      - task: deploy-argocd
      - task: wait-for-argocd-sync
      - task: sync-cloudflare
      - task: repair-litmus-admin
      - task: repair-litmus-chaos
      - task: verify-endpoints
      - task: verify-browser-auth

  reconcile:gitops:
    desc: "Reconcile the full remote GitOps layer without reprovisioning infra: secrets, ArgoCD bootstrap, workloads, Cloudflare, and public URLs."
    cmds:
      - task: generate-secrets
      - task: push-changes
      - task: deploy-argocd
      - task: wait-for-argocd-sync
      - task: sync-cloudflare
      - task: repair-litmus-admin
      - task: repair-litmus-chaos
      - task: verify-endpoints
      - task: verify-browser-auth

  reconcile:infra:
    desc: "Reconcile remote infra and node configuration without re-running the full final verification path."
    env:
      PROXMOX_HOST_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      LXC_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      NAS_PATH: "{{.NAS_PATH_VALUE}}"
    cmds:
      - task: preflight
      - task: provision-infra
      - task: configure-os

  verify-all:
    desc: Verify cluster health, then enforce both HTTP-level and browser-level public URL checks.
    cmds:
      - task: verify-cluster
      - task: repair-litmus-admin
      - task: repair-litmus-chaos
      - task: verify-endpoints
      - task: verify-browser-auth

  monitor:
    desc: Open a K9s session against the remote cluster through an SSH tunnel.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" monitor --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}"'

  deploy-argocd:
    desc: Apply the ArgoCD app manifests with DOMAIN_NAME substitution.
    deps: [check-env]
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" deploy-argocd --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'

  generate-secrets:
    desc: Fetch the Sealed Secrets public cert, hydrate templates, and regenerate local Sealed Secrets.
    deps: [check-env]
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" generate-secrets --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'

  push-changes:
    desc: Regenerate sealed secrets from the cached cert, then push only the GitOps source of truth without performing Git merge policy.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" push-changes --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'

  setup-hooks:
    desc: Install a cross-platform pre-commit hook that regenerates Sealed Secrets when the cluster is reachable.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" setup-hooks'

  deploy-local:
    desc: Apply the local haac-stack chart when ArgoCD is not already managing it.
    deps: [generate-secrets]
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" deploy-local --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}" --helm "{{.HELM}}"'

  wait-for-argocd-sync:
    desc: Wait through staged ArgoCD root/platform/workload gates and the critical downloader readiness gate.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" wait-for-stack --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}" --timeout 3600'

  verify-cluster:
    desc: Run cluster-level checks over the remote K3s API.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" verify-cluster --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'

  verify-endpoints:
    desc: Check the public HTTP endpoints exposed through Cloudflare and Traefik, reporting full versus partial success.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" verify-web --domain "{{.DOMAIN_NAME_VALUE}}"'

  repair-litmus-admin:
    desc: Reconcile the Litmus admin account from the repo-managed secret when the persisted MongoDB state drifted.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" reconcile-litmus-admin --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'

  repair-litmus-chaos:
    desc: Reconcile a usable Litmus environment and default chaos infrastructure without manual YAML apply.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" reconcile-litmus-chaos --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'

  verify-browser-auth:
    desc: Run browser-level auth verification for the official public UI surface using the repo-local Playwright verifier.
    cmds:
      - 'node "scripts/verify-public-auth.mjs"'

  sync-cloudflare:
    desc: Reconcile Cloudflare Tunnel ingress rules and the required DNS records.
    deps: [check-env]
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" sync-cloudflare --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'

  configure-apps:
    desc: Manual fallback bootstrap for QUI and qBittorrent when the in-cluster bootstrap Job must be retriggered explicitly.
    deps: [check-env]
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" configure-apps --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'

  configure-argocd-local-auth:
    desc: Optionally configure a local ArgoCD username/password fallback on top of the declarative OIDC setup.
    deps: [check-env]
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" configure-argocd-local-auth --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'

  restore-k3s:
    desc: Restore the K3s SQLite database from a NAS backup file.
    vars:
      BACKUP_FILE: '{{default "k3s-state-latest.db" .BACKUP_FILE}}'
      NAS_MOUNT_PATH: "/mnt/pve/HaaC-Storage/media/k3s"
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" restore-k3s --proxmox-host "{{.PROXMOX_HOST}}" --tofu-dir "{{.TOFU_DIR}}" --backup-file "{{.BACKUP_FILE}}" --nas-mount-path "{{.NAS_MOUNT_PATH}}"'

  shutdown-cluster:
    desc: Gracefully stop the K3s LXC containers on Proxmox.
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" shutdown-cluster --proxmox-host "{{.PROXMOX_HOST}}" --tofu-dir "{{.TOFU_DIR}}"'

  down:
    desc: Destroy the infrastructure after a graceful cluster shutdown.
    deps: [check-env]
    cmds:
      - task: shutdown-cluster
      - '{{.PYTHON_CMD}} "scripts/haac.py" run-tofu --dir "{{.TOFU_DIR}}" init'
      - '{{.PYTHON_CMD}} "scripts/haac.py" run-tofu --dir "{{.TOFU_DIR}}" destroy -auto-approve'
      - '{{.PYTHON_CMD}} "scripts/haac.py" remove-file --path "scripts/pub-sealed-secrets.pem"'

  loop:check:
    desc: Verify the local OpenSpec/CodexPotter loop bootstrap and validate active changes.
    cmds:
      - '{{.PYTHON_CMD}} -u "scripts/haac_loop.py" check'

  loop:prompt:
    desc: Print the dynamic Ralph loop prompt used for this repo.
    vars:
      SLUG: '{{default "session" .SLUG}}'
      MODE: '{{default "apply" .MODE}}'
    cmds:
      - '{{.PYTHON_CMD}} -u "scripts/haac_loop.py" prompt --slug "{{.SLUG}}" --mode "{{.MODE}}"'

  loop:worklog:
    desc: Print or create the current Ralph loop worklog path.
    vars:
      SLUG: '{{default "session" .SLUG}}'
      MODE: '{{default "apply" .MODE}}'
    cmds:
      - '{{.PYTHON_CMD}} -u "scripts/haac_loop.py" worklog --slug "{{.SLUG}}" --mode "{{.MODE}}"'

  loop:yolo:
    desc: Launch the autonomous OpenSpec-first Ralph loop with an isolated Codex home, using apply-first plus autodiscovery/auto-improve fallback.
    vars:
      SLUG: '{{default "session" .SLUG}}'
      ROUNDS: '{{default "10" .ROUNDS}}'
    cmds:
      - '{{.PYTHON_CMD}} -u "scripts/haac_loop.py" run --slug "{{.SLUG}}" --rounds "{{.ROUNDS}}" --mode apply'

  loop:yolo:dry:
    desc: Dry run the Ralph loop bootstrap without launching CodexPotter.
    vars:
      SLUG: '{{default "session" .SLUG}}'
      ROUNDS: '{{default "10" .ROUNDS}}'
    cmds:
      - '{{.PYTHON_CMD}} -u "scripts/haac_loop.py" run --slug "{{.SLUG}}" --rounds "{{.ROUNDS}}" --mode apply --dry-run'

  loop:yolo:checked:
    desc: Launch the Ralph loop after local readiness checks and Codex-side MCP preflight, with apply-first plus autodiscovery/auto-improve fallback.
    vars:
      SLUG: '{{default "session" .SLUG}}'
      ROUNDS: '{{default "10" .ROUNDS}}'
    cmds:
      - '{{.PYTHON_CMD}} -u "scripts/haac_loop.py" run --slug "{{.SLUG}}" --rounds "{{.ROUNDS}}" --mode apply --with-preflight'

  loop:yolo:global:
    desc: Launch the Ralph loop against the existing global CODEX_HOME instead of an isolated repo-local home, with apply-first plus autodiscovery/auto-improve fallback.
    vars:
      SLUG: '{{default "session" .SLUG}}'
      ROUNDS: '{{default "10" .ROUNDS}}'
    cmds:
      - '{{.PYTHON_CMD}} -u "scripts/haac_loop.py" run --slug "{{.SLUG}}" --rounds "{{.ROUNDS}}" --mode apply --use-global-home'

  loop:yolo:global:dry:
    desc: Dry run the global Ralph loop bootstrap.
    vars:
      SLUG: '{{default "session" .SLUG}}'
      ROUNDS: '{{default "10" .ROUNDS}}'
    cmds:
      - '{{.PYTHON_CMD}} -u "scripts/haac_loop.py" run --slug "{{.SLUG}}" --rounds "{{.ROUNDS}}" --mode apply --use-global-home --dry-run'

  loop:yolo:global:checked:
    desc: Launch the global Ralph loop after local readiness checks and Codex-side MCP preflight.
    vars:
      SLUG: '{{default "session" .SLUG}}'
      ROUNDS: '{{default "10" .ROUNDS}}'
    cmds:
      - '{{.PYTHON_CMD}} -u "scripts/haac_loop.py" run --slug "{{.SLUG}}" --rounds "{{.ROUNDS}}" --mode apply --use-global-home --with-preflight'

  loop:discover:
    desc: Run the loop in narrow discovery mode so it may open exactly one new evidence-backed OpenSpec change.
    vars:
      SLUG: '{{default "discovery" .SLUG}}'
      ROUNDS: '{{default "3" .ROUNDS}}'
    cmds:
      - '{{.PYTHON_CMD}} -u "scripts/haac_loop.py" run --slug "{{.SLUG}}" --rounds "{{.ROUNDS}}" --mode discover'

  loop:discover:dry:
    desc: Dry run the loop discovery bootstrap.
    vars:
      SLUG: '{{default "discovery" .SLUG}}'
      ROUNDS: '{{default "3" .ROUNDS}}'
    cmds:
      - '{{.PYTHON_CMD}} -u "scripts/haac_loop.py" run --slug "{{.SLUG}}" --rounds "{{.ROUNDS}}" --mode discover --dry-run'
