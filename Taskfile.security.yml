version: "3"

vars:
  HAAC_CMD: '{{default "haac" .HAAC_CMD}}'
  PYTHON_CMD: '{{default "python" .PYTHON_CMD}}'
  TOFU_DIR: '{{default "tofu" .TOFU_DIR}}'
  LXC_PASSWORD_VALUE:
    sh: '{{.HAAC_CMD}} env-value --name LXC_PASSWORD'
  NAS_PATH_VALUE:
    sh: '{{.HAAC_CMD}} env-value --name NAS_PATH'
  KUBECTL:
    sh: '{{.HAAC_CMD}} tool-path --name kubectl'
  K3S_KUBECONFIG:
    sh: '{{.HAAC_CMD}} kubeconfig-path'
  MASTER_IP:
    sh: '{{.HAAC_CMD}} master-ip'
  PROXMOX_HOST:
    sh: '{{.HAAC_CMD}} proxmox-access-host'

tasks:
  post-install:
    desc: Reconcile post-install security assets after the platform apps are healthy.
    env:
      PROXMOX_HOST_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      LXC_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      NAS_PATH: "{{.NAS_PATH_VALUE}}"
    cmds:
      - '{{.HAAC_CMD}} check-env'
      - '{{.HAAC_CMD}} doctor'
      - '{{.HAAC_CMD}} run-ansible --inventory ansible/inventory.yml --playbook ansible/maintenance-security-playbook.yml'

  cleanup-signal-residue:
    desc: Manually prune the known stale security-report residue left by historical rollout objects in argocd/security.
    env:
      PROXMOX_HOST_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      LXC_PASSWORD: "{{.LXC_PASSWORD_VALUE}}"
      NAS_PATH: "{{.NAS_PATH_VALUE}}"
    cmds:
      - '{{.HAAC_CMD}} check-env'
      - '{{.HAAC_CMD}} doctor'
      - '{{.HAAC_CMD}} cleanup-security-signal-residue'
