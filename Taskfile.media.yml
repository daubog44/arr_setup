version: "3"

vars:
  PYTHON_CMD: '{{default "python" .PYTHON_CMD}}'
  TOFU_DIR: '{{default "tofu" .TOFU_DIR}}'
  KUBECTL:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" tool-path --name kubectl'
  K3S_KUBECONFIG:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" kubeconfig-path'
  MASTER_IP:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" tofu-output --dir "{{.TOFU_DIR}}" --name master_ip --default 127.0.0.1'
  PROXMOX_HOST:
    sh: '{{.PYTHON_CMD}} "scripts/haac.py" proxmox-access-host'

tasks:
  post-install:
    desc: "Reconcile the repo-managed media surface after workloads are healthy: downloader bootstrap, ARR common settings, Lidarr/SAB wiring, Seerr/Jellyfin bootstrap, and metrics warmup."
    cmds:
      - '{{.PYTHON_CMD}} "scripts/haac.py" check-env'
      - '{{.PYTHON_CMD}} "scripts/haac.py" doctor'
      - '{{.PYTHON_CMD}} "scripts/haac.py" reconcile-media-stack --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'
