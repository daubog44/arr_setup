---
- name: Rolling OS Update (K3s Nodes)
  hosts: k3s_master,k3s_workers
  serial: 1
  gather_facts: false
  tasks:
    - name: Wait for node to be reachable
      ansible.builtin.wait_for_connection:
        timeout: 60

    - name: Run bounded K3s node maintenance wrapper
      ansible.builtin.command: /usr/local/sbin/haac-k3s-maintenance
      become: true
      register: maintenance_result
      changed_when: true

    - name: Log reboot status
      ansible.builtin.debug:
        msg: "Node {{ inventory_hostname }} {{ 'NEEDS REBOOT - Kured will handle it tonight' if 'REBOOT_REQUIRED=1' in maintenance_result.stdout else 'is up to date' }}"
