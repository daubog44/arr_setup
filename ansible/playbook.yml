- name: Proxmox Shared Storage Setup
  hosts: proxmox_host
  gather_facts: false
  vars:
    operator_bootstrap_pubkey: "{{ lookup('file', playbook_dir ~ '/../.ssh/haac_ed25519.pub') | trim }}"
    semaphore_maintenance_pubkey: "{{ lookup('file', playbook_dir ~ '/../.ssh/haac_semaphore_ed25519.pub') | trim }}"
    repo_deploy_pubkey: "{{ lookup('file', playbook_dir ~ '/../.ssh/haac_repo_deploy_ed25519.pub') | trim }}"
    maintenance_user: "{{ lookup('env', 'HAAC_MAINTENANCE_USER') | default('haac-maint', true) }}"
  tasks:
    - name: Ensure Proxmox is reachable
      ansible.builtin.wait_for_connection:
        timeout: 60

    - name: Ensure root SSH directory exists on Proxmox
      ansible.builtin.file:
        path: /root/.ssh
        state: directory
        owner: root
        group: root
        mode: '0700'

    - name: Authorize the operator bootstrap SSH key on Proxmox root for ProxyJump access
      ansible.builtin.lineinfile:
        path: /root/.ssh/authorized_keys
        line: "{{ operator_bootstrap_pubkey }}"
        create: true
        owner: root
        group: root
        mode: '0600'

    - name: Remove maintenance and repo deploy keys from Proxmox root authorization
      ansible.builtin.lineinfile:
        path: /root/.ssh/authorized_keys
        line: "{{ item }}"
        state: absent
        create: true
        owner: root
        group: root
        mode: '0600'
      loop:
        - "{{ semaphore_maintenance_pubkey }}"
        - "{{ repo_deploy_pubkey }}"

    - name: Ensure sudo is installed on Proxmox for maintenance delegation
      ansible.builtin.apt:
        name: sudo
        state: present

    - name: Ensure maintenance user exists on Proxmox
      ansible.builtin.user:
        name: "{{ maintenance_user }}"
        shell: /bin/bash
        create_home: true
        state: present

    - name: Ensure maintenance SSH directory exists on Proxmox
      ansible.builtin.file:
        path: "/home/{{ maintenance_user }}/.ssh"
        state: directory
        owner: "{{ maintenance_user }}"
        group: "{{ maintenance_user }}"
        mode: '0700'

    - name: Authorize the Semaphore maintenance key for the Proxmox maintenance user
      ansible.builtin.lineinfile:
        path: "/home/{{ maintenance_user }}/.ssh/authorized_keys"
        line: "{{ semaphore_maintenance_pubkey }}"
        create: true
        owner: "{{ maintenance_user }}"
        group: "{{ maintenance_user }}"
        mode: '0600'

    - name: Install bounded Proxmox maintenance wrapper
      ansible.builtin.copy:
        src: files/haac-proxmox-maintenance.sh
        dest: /usr/local/sbin/haac-proxmox-maintenance
        owner: root
        group: root
        mode: '0755'

    - name: Restrict maintenance sudo on Proxmox to the bounded wrapper
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ maintenance_user }}-haac"
        content: |
          {{ maintenance_user }} ALL=(root) NOPASSWD: /usr/local/sbin/haac-proxmox-maintenance
        owner: root
        group: root
        mode: '0440'

    - name: Disable Proxmox Enterprise repository (requires paid subscription)
      ansible.builtin.replace:
        path: /etc/apt/sources.list.d/pve-enterprise.list
        regexp: '^(deb .*enterprise.*)'
        replace: '# \1'
      failed_when: false  # file may not exist on fresh installs, avoid red errors

    - name: Disable Ceph Enterprise repository if present
      ansible.builtin.replace:
        path: /etc/apt/sources.list.d/ceph.list
        regexp: '^(deb .*enterprise.*)'
        replace: '# \1'
      failed_when: false

    - name: Enable Proxmox No-Subscription repository
      ansible.builtin.blockinfile:
        path: /etc/apt/sources.list
        marker: "# {mark} ANSIBLE MANAGED: Proxmox no-subscription repo"
        block: |
          deb http://download.proxmox.com/debian/pve {{ ansible_facts['distribution_release'] | default('bookworm') }} pve-no-subscription
        create: true
        mode: '0644'

    - name: Update apt cache after repo changes
      ansible.builtin.apt:
        update_cache: true
      changed_when: false

    - name: Install CIFS utilities
      ansible.builtin.apt:
        name: cifs-utils
        state: present
      delegate_to: "{{ inventory_hostname }}"

    - name: Ensure SMB credentials directory exists
      ansible.builtin.file:
        path: /etc/samba
        state: directory
        mode: '0700'

    - name: Dynamically resolve NAS IP from default gateway (bypass Tailscale)
      ansible.builtin.shell: |
        GW=$(ip route | awk '/default/ {print $3}' | head -n 1)
        if [[ "{{ nas_address }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "{{ nas_address }}"
        else
          dig +short @$GW {{ nas_address }} | tail -n 1
        fi
      args:
        executable: /bin/bash
      register: nas_ip_dynamic
      changed_when: false

    - name: Ensure NAS hostname is in Proxmox /etc/hosts (Bypass Tailscale DNS override)
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '.*\s+{{ nas_address }}$'
        line: "{{ nas_ip_dynamic.stdout }} {{ nas_address }}"
        state: present
      when: nas_ip_dynamic.stdout != "" and nas_ip_dynamic.stdout != nas_address

    - name: Write SMB credentials file
      ansible.builtin.copy:
        dest: "/etc/samba/.smb_credentials_{{ nas_address }}"
        content: |
          username={{ lookup('env', 'SMB_USER') }}
          password={{ lookup('env', 'SMB_PASSWORD') }}
        mode: '0600'

    - name: Ensure mount point exists
      ansible.builtin.file:
        path: "{{ host_nas_path }}"
        state: directory
        mode: '0755'

    - name: Mount Samba Share persistently
      ansible.builtin.mount:
        path: "{{ host_nas_path }}"
        src: "//{{ nas_address }}/{{ nas_share_name | default('proxmox') }}"
        fstype: cifs
        opts: "credentials=/etc/samba/.smb_credentials_{{ nas_address }},iocharset=utf8,vers=3.0,uid={{ storage_uid | default(13000) }},gid={{ storage_gid | default(13000) }},file_mode=0777,dir_mode=0777"
        state: mounted

    - name: Create TRaSH Guides Folder Structure on Host Storage

      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ storage_uid | default(13000) }}"
        group: "{{ storage_gid | default(13000) }}"
        mode: "0777"
      ignore_errors: true
      with_items:
        - "{{ host_nas_path }}"
        - "{{ host_nas_path }}/torrents"
        - "{{ host_nas_path }}/torrents/complete"
        - "{{ host_nas_path }}/torrents/incomplete"
        - "{{ host_nas_path }}/media"
        - "{{ host_nas_path }}/media/movies"
        - "{{ host_nas_path }}/media/tv"

    - name: Ensure Host NAS directory is owned by bare-metal UID/GID
      ansible.builtin.shell: "chown -R {{ storage_uid | default(13000) }}:{{ storage_uid | default(13000) }} {{ host_nas_path }} && chmod -R 777 {{ host_nas_path }}"

    - name: Enable bridge netfilter on Proxmox Host (Required for K3s networking)
      ansible.builtin.sysctl:
        name: "{{ item }}"
        value: '1'
        state: present
        reload: yes
      loop:
        - net.bridge.bridge-nf-call-iptables
        - net.bridge.bridge-nf-call-ip6tables

- name: Host Hardware Discovery & Driver Setup
  hosts: proxmox_host
  gather_facts: true
  vars:
    haac_enable_falco: "{{ (lookup('env', 'HAAC_ENABLE_FALCO') | default('', true) | lower) in ['1', 'true', 'yes', 'on'] }}"
  tasks:
    - name: Ensure Proxmox kernel headers are installed when Falco runtime is enabled
      ansible.builtin.apt:
        name: "proxmox-headers-{{ ansible_facts['kernel'] }}"
        state: present
        update_cache: true
      when: haac_enable_falco

    - name: Detect NVIDIA GPU
      ansible.builtin.shell: lspci | grep -i "NVIDIA" | grep -i "VGA" || true
      register: nvidia_check
      changed_when: false

    - name: Detect Intel GPU
      ansible.builtin.shell: lspci | grep -i "Intel" | grep -i "VGA" || true
      register: intel_check
      changed_when: false

    - name: Set GPU Discovery Facts
      ansible.builtin.set_fact:
        has_nvidia: "{{ 'NVIDIA' in nvidia_check.stdout }}"
        has_intel: "{{ 'Intel' in intel_check.stdout }}"
        nvidia_model: "{{ nvidia_check.stdout | regex_replace('.*\\[([^\\]]+)\\].*', '\\1') | regex_replace(' ', '_') | lower if 'NVIDIA' in nvidia_check.stdout else 'none' }}"
        intel_model: "{{ intel_check.stdout | regex_replace('.*\\[([^\\]]+)\\].*', '\\1') | regex_replace(' ', '_') | lower if 'Intel' in intel_check.stdout else 'none' }}"

    - name: Install NVIDIA drivers on Proxmox Host
      when: has_nvidia
      block:
        - name: Enable contrib and non-free repositories on Proxmox
          ansible.builtin.apt_repository:
            repo: "deb http://ftp.debian.org/debian {{ ansible_facts['distribution_release'] }} main contrib non-free non-free-firmware"
            state: present

        - name: Install Proxmox Headers and NVIDIA Kernel Modules
          ansible.builtin.apt:
            name:
              - "proxmox-headers-{{ ansible_facts['kernel'] }}"
              - nvidia-kernel-dkms
              - nvidia-driver-libs
              - nvidia-smi
              - nvidia-vulkan-icd
            update_cache: true
            state: present

        - name: Force DKMS to build NVIDIA modules
          ansible.builtin.shell: "dkms autoinstall -k {{ ansible_facts['kernel'] }}"
          register: dkms_build
          changed_when: "'installed' in dkms_build.stdout"
          failed_when: false

        # --- Community patch: github.com/Boux/nvidia-550xx-dkms ---
        # Fixes NVIDIA 550 compilation on kernel 6.17+ using LINUX_VERSION_CODE conditionals
        - name: Write community kernel 6.17 compatibility patch to host
          ansible.builtin.copy:
            dest: /tmp/0005-nvidia-kernel617.patch
            content: |
              --- a/nvidia-drm/nvidia-drm-drv.c
              +++ b/nvidia-drm/nvidia-drm-drv.c
              @@ -202,6 +202,10 @@ static void nv_drm_output_poll_changed(struct drm_device *dev)
               static struct drm_framebuffer *nv_drm_framebuffer_create(
                   struct drm_device *dev,
                   struct drm_file *file,
              +#if LINUX_VERSION_CODE >= KERNEL_VERSION(6, 17, 0)
              +    const struct drm_format_info *info,
              +#endif
                   #if defined(NV_DRM_HELPER_MODE_FILL_FB_STRUCT_HAS_CONST_MODE_CMD_ARG)
                   const struct drm_mode_fb_cmd2 *cmd
                   #else
              @@ -217,6 +221,10 @@ static struct drm_framebuffer *nv_drm_framebuffer_create(
                   fb = nv_drm_internal_framebuffer_create(
                           dev,
                           file,
              +#if LINUX_VERSION_CODE >= KERNEL_VERSION(6, 17, 0)
              +            info,
              +#endif
                           &local_cmd);
               
              --- a/nvidia-drm/nvidia-drm-fb.c
              +++ b/nvidia-drm/nvidia-drm-fb.c
              @@ -33,6 +33,7 @@
               #include "nvidia-drm-format.h"
               #include <drm/drm_crtc_helper.h>
              +#include <linux/version.h>
               
              @@ -246,6 +247,10 @@ static int nv_drm_framebuffer_init(struct drm_device *dev,
               struct drm_framebuffer *nv_drm_internal_framebuffer_create(
                   struct drm_device *dev,
                   struct drm_file *file,
              +#if LINUX_VERSION_CODE >= KERNEL_VERSION(6, 17, 0)
              +    const struct drm_format_info *info,
              +#endif
                   struct drm_mode_fb_cmd2 *cmd)
               {
              @@ -299,6 +304,10 @@ struct drm_framebuffer *nv_drm_internal_framebuffer_create(
                       dev,
                       #endif
                       &nv_fb->base,
              +#if LINUX_VERSION_CODE >= KERNEL_VERSION(6, 17, 0)
              +        info,
              +#endif
                       cmd);
               
              --- a/nvidia-drm/nvidia-drm-fb.h
              +++ b/nvidia-drm/nvidia-drm-fb.h
              @@ -35,6 +35,8 @@
               #include <drm/drm_framebuffer.h>
               #endif
               
              +#include <linux/version.h>
              +
               #include "nvidia-drm-gem-nvkms-memory.h"
              @@ -59,6 +61,10 @@ static inline struct nv_drm_framebuffer *to_nv_framebuffer(
               struct drm_framebuffer *nv_drm_internal_framebuffer_create(
                   struct drm_device *dev,
                   struct drm_file *file,
              +#if LINUX_VERSION_CODE >= KERNEL_VERSION(6, 17, 0)
              +    const struct drm_format_info *info,
              +#endif
                   struct drm_mode_fb_cmd2 *cmd);
            mode: '0644'
          when: dkms_build.rc != 0 and ansible_facts['kernel'] is version('6.17', '>=')

        - name: Apply community kernel 6.17 patch to NVIDIA sources
          ansible.builtin.shell: |
            cd /usr/src/nvidia-current-550.163.01
            patch -p1 --forward --reject-file=/tmp/nvidia-patch.rej < /tmp/0005-nvidia-kernel617.patch || true
          when: dkms_build.rc != 0 and ansible_facts['kernel'] is version('6.17', '>=')
          register: patch_result

        - name: Remove stale DKMS build directory to force clean rebuild
          ansible.builtin.file:
            path: "/var/lib/dkms/nvidia-current/550.163.01/{{ ansible_facts['kernel'] }}"
            state: absent
          when: dkms_build.rc != 0

        - name: Retry DKMS build after community patch
          ansible.builtin.shell: "dkms autoinstall -k {{ ansible_facts['kernel'] }}"
          when: dkms_build.rc != 0

        - name: Blacklist nouveau and other conflicting drivers
          ansible.builtin.copy:
            dest: /etc/modprobe.d/blacklist-nouveau.conf
            content: |
              blacklist nouveau
              blacklist nvidiafb
              options nouveau modeset=0
            mode: '0644'

        - name: Update initramfs to apply blacklist
          ansible.builtin.shell: "update-initramfs -u"
          changed_when: true

        - name: Unbind nouveau from GPU at runtime
          ansible.builtin.shell: |
            PCI_ID=$(lspci | grep -i "NVIDIA" | grep -i "VGA" | head -n 1 | awk '{print $1}')
            if [ -n "$PCI_ID" ] && [ -d /sys/bus/pci/drivers/nouveau ]; then
              # Convert 01:00.0 to 0000:01:00.0 if necessary
              FULL_PCI_ID=$(echo $PCI_ID | sed 's/^[0-9]\+/0000:&/')
              if [ -d "/sys/bus/pci/drivers/nouveau/$FULL_PCI_ID" ]; then
                echo "$FULL_PCI_ID" > /sys/bus/pci/drivers/nouveau/unbind || true
              fi
            fi
          changed_when: false

        - name: Ensure NVIDIA modules are loaded
          ansible.builtin.modprobe:
            name: "{{ item }}"
            state: present
          loop: [nvidia, nvidia_uvm, nvidia_drm]
          ignore_errors: true

        - name: Verify NVIDIA device nodes exist
          ansible.builtin.shell: "ls -l /dev/nvidia*"
          register: nvidia_devs
          changed_when: false

- name: LXC Node Hardware Mapping & eBPF Setup
  hosts: k3s_master, k3s_workers
  gather_facts: false
  vars:
    operator_bootstrap_pubkey: "{{ lookup('file', playbook_dir ~ '/../.ssh/haac_ed25519.pub') | trim }}"
    semaphore_maintenance_pubkey: "{{ lookup('file', playbook_dir ~ '/../.ssh/haac_semaphore_ed25519.pub') | trim }}"
    repo_deploy_pubkey: "{{ lookup('file', playbook_dir ~ '/../.ssh/haac_repo_deploy_ed25519.pub') | trim }}"
    haac_enable_falco: "{{ (lookup('env', 'HAAC_ENABLE_FALCO') | default('', true) | lower) in ['1', 'true', 'yes', 'on'] }}"
  tasks:
    - name: Get Video and Render GIDs
      ansible.builtin.shell: |
        python3 -c "
        import grp
        try: v = grp.getgrnam('video').gr_gid
        except: v = 44
        try: r = grp.getgrnam('render').gr_gid
        except: r = 104
        print(f'{v},{r}')
        "
      register: gids_out
      changed_when: false
      delegate_to: "{{ proxmox_host }}"

    - name: Set GID facts
      ansible.builtin.set_fact:
        video_gid: "{{ gids_out.stdout.split(',')[0] | int }}"
        render_gid: "{{ gids_out.stdout.split(',')[1] | int }}"

    - name: Allow root to map specific UID/GIDs in subuid and subgid
      ansible.builtin.lineinfile:
        path: "{{ item.path }}"
        line: "root:{{ item.id }}:1"
      with_items:
        - { path: /etc/subgid, id: "{{ video_gid }}" }
        - { path: /etc/subgid, id: "{{ render_gid }}" }
        - { path: /etc/subgid, id: "{{ storage_gid | default(13000) }}" }
        - { path: /etc/subuid, id: "{{ storage_uid | default(13000) }}" }
      delegate_to: "{{ proxmox_host }}"

    - name: Generate LXC ID mappings
      ansible.builtin.shell: |
        python3 -c "
        video_gid = {{ video_gid }}
        render_gid = {{ render_gid }}
        storage_uid = {{ storage_uid | default(13000) }}
        storage_gid = {{ storage_gid | default(13000) }}
        gids = sorted(list(set([video_gid, render_gid, storage_gid])))
        current_container_gid = 0
        mapped_from_pool = 0
        lines = []
        # UIDs mapping
        lines.append(f'lxc.idmap: u 0 100000 {storage_uid}')
        lines.append(f'lxc.idmap: u {storage_uid} {storage_uid} 1')
        lines.append(f'lxc.idmap: u {storage_uid + 1} {storage_uid + 100000} {65535 - storage_uid}')
        # GIDs mapping
        for g in gids:
            if g > current_container_gid:
                count = g - current_container_gid
                lines.append(f'lxc.idmap: g {current_container_gid} {100000 + mapped_from_pool} {count}')
                mapped_from_pool += count
            lines.append(f'lxc.idmap: g {g} {g} 1')
            current_container_gid = g + 1
        if current_container_gid < 65536:
            count = 65536 - current_container_gid
            lines.append(f'lxc.idmap: g {current_container_gid} {100000 + mapped_from_pool} {count}')
        for line in lines:
            print(line)
        "
      register: lxc_idmap_config
      changed_when: false
      delegate_to: "{{ proxmox_host }}"

    - name: Generate GPU Passthrough lines
      ansible.builtin.shell: |
        python3 -c "
        import os, glob
        def unique_sorted(paths):
            return sorted({path for path in paths if path})
        config = []
        # Map both Intel (dri) and NVIDIA devices
        for dev in unique_sorted(glob.glob('/dev/dri/*') + glob.glob('/dev/nvidia*')):
            if os.path.exists(dev) and not os.path.isdir(dev):
                stat = os.stat(dev)
                major = os.major(stat.st_rdev)
                minor = os.minor(stat.st_rdev)
                config.append(f'lxc.cgroup2.devices.allow: c {major}:{minor} rwm')
                config.append(f'lxc.mount.entry: {dev} {dev[1:]} none bind,optional,create=file')
        # Mount NVIDIA userspace libraries (needed by nvidia-container-toolkit)
        # Search both base dir and nvidia/current/ where versioned .so files live
        lib_dirs = ['/usr/lib/x86_64-linux-gnu', '/usr/lib/x86_64-linux-gnu/nvidia/current']
        nvidia_libs = []
        lib_patterns = (
            'libnvidia*',
            'libcuda*',
            'libnvcuvid*',
            'libnvoptix*',
            'libEGL_nvidia*',
            'libGLX_nvidia*',
            'libGLESv*_nvidia*',
            'libvdpau_nvidia*',
        )
        for d in lib_dirs:
            for pattern in lib_patterns:
                nvidia_libs.extend(glob.glob(f'{d}/{pattern}'))
        for lib in unique_sorted(nvidia_libs):
            if os.path.isfile(lib) or os.path.islink(lib):
                config.append(f'lxc.mount.entry: {lib} {lib[1:]} none bind,optional,create=file')
        # Mount nvidia-smi binary
        if os.path.exists('/usr/bin/nvidia-smi'):
            config.append('lxc.mount.entry: /usr/bin/nvidia-smi usr/bin/nvidia-smi none bind,optional,create=file')
        print('\n'.join(config))
        "
      register: gpu_passthrough_config
      changed_when: false
      delegate_to: "{{ proxmox_host }}"

    - name: Compose desired HAAC-managed LXC hardware block lines
      ansible.builtin.set_fact:
        lxc_managed_config_lines: >-
          {{
            (
              lxc_idmap_config.stdout_lines
              + (gpu_passthrough_config.stdout_lines if (lxc_enable_gpu_passthrough | bool) else [])
              + ([
                  'lxc.cgroup2.devices.allow: a',
                  'lxc.cap.drop: ',
                  'lxc.apparmor.profile: unconfined',
                  'lxc.mount.auto: proc:rw sys:rw'
                ] if (lxc_k3s_compat_mode | bool) else [])
              + ([
                  'lxc.mount.entry: /sys/kernel/debug sys/kernel/debug none bind,optional 0 0',
                  'lxc.mount.entry: /sys/kernel/btf sys/kernel/btf none bind,optional 0 0'
                ] if (lxc_enable_ebpf_mounts | bool) else [])
              + ([
                  'lxc.mount.entry: /usr/lib/modules usr/lib/modules none bind,optional 0 0',
                  'lxc.mount.entry: /usr/src usr/src none bind,optional 0 0'
                ] if (
                  haac_enable_falco
                  and ((node_labels | default({})).get('haac.io/falco-runtime', '') | string | lower) in ['1', 'true', 'yes', 'on']
                ) else [])
              + ([
                  'lxc.mount.entry: /dev/net/tun dev/net/tun none bind,create=file'
                ] if (lxc_enable_tun | bool) else [])
              + [
                  'lxc.mount.entry: ' + (host_nas_path) + ' data none bind,create=dir'
                ]
            ) | reject('equalto', '') | list
          }}

    - name: Stage LXC hardware reconciliation helper on Proxmox
      ansible.builtin.copy:
        dest: /tmp/reconcile_lxc_hardware_block.py
        content: "{{ lookup('file', playbook_dir ~ '/../scripts/reconcile_lxc_hardware_block.py') }}"
        mode: '0755'
      delegate_to: "{{ proxmox_host }}"
      run_once: true

    - name: Reconcile HAAC-managed LXC hardware block
      ansible.builtin.command: "python3 /tmp/reconcile_lxc_hardware_block.py /etc/pve/lxc/{{ lxc_vmid }}.conf"
      environment:
        HAAC_LXC_MANAGED_CONFIG_JSON: "{{ lxc_managed_config_lines | to_json }}"
      register: lxc_conf
      changed_when: (lxc_conf.stdout | trim) == 'changed'
      delegate_to: "{{ proxmox_host }}"

    - name: Ensure LXC Container is restarted to apply hardware mappings
      ansible.builtin.shell: "pct stop {{ lxc_vmid }} || true && pct start {{ lxc_vmid }}"
      when: lxc_conf.changed
      delegate_to: "{{ proxmox_host }}"

    - name: Wait for LXC Container to securely be running
      ansible.builtin.shell: "pct status {{ lxc_vmid }}"
      register: lxc_status
      until: "'status: running' in lxc_status.stdout"
      retries: 5
      delay: 5
      when: lxc_conf.changed
      delegate_to: "{{ proxmox_host }}"

    - name: Ensure the operator bootstrap SSH public key is installed in guest root
      ansible.builtin.shell: |
        pubkey="$(printf '%s' '{{ operator_bootstrap_pubkey | b64encode }}' | base64 -d)"
        pct exec {{ lxc_vmid }} -- sh -lc "install -d -m 700 /root/.ssh && touch /root/.ssh/authorized_keys && chmod 600 /root/.ssh/authorized_keys && grep -qxF \"\$pubkey\" /root/.ssh/authorized_keys || printf '%s\n' \"\$pubkey\" >> /root/.ssh/authorized_keys"
        pct exec {{ lxc_vmid }} -- sh -lc "grep -qxF \"\$pubkey\" /root/.ssh/authorized_keys"
      register: guest_ssh_key_ready
      until: guest_ssh_key_ready.rc == 0
      retries: 10
      delay: 3
      changed_when: false
      delegate_to: "{{ proxmox_host }}"

    - name: Remove maintenance and repo deploy keys from guest root authorization
      ansible.builtin.shell: |
        pubkey="$(printf '%s' '{{ item | b64encode }}' | base64 -d)"
        pct exec {{ lxc_vmid }} -- sh -lc "touch /root/.ssh/authorized_keys && chmod 600 /root/.ssh/authorized_keys && grep -qxF \"\$pubkey\" /root/.ssh/authorized_keys && grep -vxF \"\$pubkey\" /root/.ssh/authorized_keys > /root/.ssh/authorized_keys.tmp && mv /root/.ssh/authorized_keys.tmp /root/.ssh/authorized_keys || true"
      delegate_to: "{{ proxmox_host }}"
      changed_when: false
      loop:
        - "{{ semaphore_maintenance_pubkey }}"
        - "{{ repo_deploy_pubkey }}"


- name: Automate OS Baseline and Dependencies (All K3s Nodes)
  hosts: k3s_master, k3s_workers
  gather_facts: false
  vars:
    maintenance_user: "{{ lookup('env', 'HAAC_MAINTENANCE_USER') | default('haac-maint', true) }}"
    semaphore_maintenance_pubkey: "{{ lookup('file', playbook_dir ~ '/../.ssh/haac_semaphore_ed25519.pub') | trim }}"
    repo_deploy_pubkey: "{{ lookup('file', playbook_dir ~ '/../.ssh/haac_repo_deploy_ed25519.pub') | trim }}"

  tasks:
    - name: Wait for system to become reachable
      ansible.builtin.wait_for_connection:
        timeout: 180
        sleep: 5

    - name: Gather facts for the first time
      ansible.builtin.setup:

    - name: Ensure sudo is installed on K3s nodes for maintenance delegation
      ansible.builtin.apt:
        name: sudo
        state: present

    - name: Ensure maintenance user exists on K3s nodes
      ansible.builtin.user:
        name: "{{ maintenance_user }}"
        shell: /bin/bash
        create_home: true
        state: present

    - name: Ensure maintenance SSH directory exists on K3s nodes
      ansible.builtin.file:
        path: "/home/{{ maintenance_user }}/.ssh"
        state: directory
        owner: "{{ maintenance_user }}"
        group: "{{ maintenance_user }}"
        mode: '0700'

    - name: Authorize the Semaphore maintenance key on K3s nodes
      ansible.builtin.lineinfile:
        path: "/home/{{ maintenance_user }}/.ssh/authorized_keys"
        line: "{{ semaphore_maintenance_pubkey }}"
        create: true
        owner: "{{ maintenance_user }}"
        group: "{{ maintenance_user }}"
        mode: '0600'

    - name: Remove the maintenance key from guest root authorization
      ansible.builtin.lineinfile:
        path: /root/.ssh/authorized_keys
        line: "{{ semaphore_maintenance_pubkey }}"
        state: absent
        create: true
        owner: root
        group: root
        mode: '0600'

    - name: Remove the repo deploy key from guest root authorization
      ansible.builtin.lineinfile:
        path: /root/.ssh/authorized_keys
        line: "{{ repo_deploy_pubkey }}"
        state: absent
        create: true
        owner: root
        group: root
        mode: '0600'

    - name: Install bounded K3s node maintenance wrapper
      ansible.builtin.copy:
        src: files/haac-k3s-maintenance.sh
        dest: /usr/local/sbin/haac-k3s-maintenance
        owner: root
        group: root
        mode: '0755'

    - name: Restrict maintenance sudo on K3s nodes to the bounded wrapper
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ maintenance_user }}-haac"
        content: |
          {{ maintenance_user }} ALL=(root) NOPASSWD: /usr/local/sbin/haac-k3s-maintenance
        owner: root
        group: root
        mode: '0440'

    - name: Debug - Check DNS resolution
      ansible.builtin.command: getent hosts google.com
      register: dns_check
      changed_when: false
      ignore_errors: true

    - name: Debug - Show MTU of eth0
      ansible.builtin.command: ip addr show eth0
      register: mtu_check
      changed_when: false

    - name: Debug - Results
      ansible.builtin.debug:
        msg: 
          - "DNS Check: {{ dns_check.stdout | default('FAILED') }}"
          - "MTU Check: {{ mtu_check.stdout }}"

    - name: Enable non-free and contrib repositories natively (DEB822)
      ansible.builtin.replace:
        path: /etc/apt/sources.list.d/debian.sources
        regexp: '^Components:\s*(.*)'
        replace: 'Components: main contrib non-free non-free-firmware'
      ignore_errors: true

    - name: Check if Legacy List exists
      ansible.builtin.stat:
        path: /etc/apt/sources.list
      register: legacy_sources

    - name: Enable non-free and contrib repositories natively (Legacy List)
      ansible.builtin.replace:
        path: /etc/apt/sources.list
        regexp: '(main\s*$)'
        replace: 'main contrib non-free non-free-firmware'
      when: legacy_sources.stat.exists

    - name: Wait for apt locks to be released
      ansible.builtin.shell: |
        while fuser /var/lib/dpkg/lock >/dev/null 2>&1 || fuser /var/lib/apt/lists/lock >/dev/null 2>&1 || fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do
          sleep 5
        done
      become: true
      changed_when: false

    - name: Fix interrupted dpkg configuration
      ansible.builtin.shell: dpkg --configure -a
      become: true
      changed_when: false
      ignore_errors: true

    - name: Fix broken apt package installations
      ansible.builtin.shell: apt-get install --fix-broken -y
      environment:
        DEBIAN_FRONTEND: noninteractive
      become: true
      changed_when: false
      ignore_errors: true

    - name: Upgrade all packages (Robust & Debuggable)
      ansible.builtin.apt:
        update_cache: true
        upgrade: full
        force_apt_get: true
        dpkg_options: 'force-confold,force-confdef'
      environment:
        DEBIAN_FRONTEND: noninteractive

- name: K3s Shared Node Setup
  hosts: k3s_master:k3s_workers
  gather_facts: true
  vars:
    k3s_pod_cidr: "10.42.0.0/16"
    
  tasks:

    - name: Ensure IP forwarding is enabled
      ansible.builtin.sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        state: present
        reload: yes


    - name: Create K3s config directory
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        mode: '0755'

    - name: Configure K3s Registry Mirror (Docker Hub Rate Limit Bypass)
      ansible.builtin.copy:
        dest: /etc/rancher/k3s/registries.yaml
        content: |
          mirrors:
            docker.io:
              endpoint:
                - "https://mirror.gcr.io"
        owner: root
        group: root
        mode: '0644'

    - name: Tell Proxmox / LXC to stop managing resolv.conf
      ansible.builtin.file:
        path: /etc/.pve-ignore.resolv.conf
        state: touch
        mode: '0644'

    - name: Ensure /etc/resolv.conf is clean and stays clean
      ansible.builtin.copy:
        dest: /etc/resolv.conf
        content: |
          nameserver 1.1.1.1
          nameserver 8.8.8.8
        owner: root
        group: root
        mode: '0644'

    - name: Create a clean resolv.conf for K3s (as a backup/explicit reference)
      ansible.builtin.copy:
        dest: /etc/rancher/k3s/resolv.conf
        content: |
          nameserver 1.1.1.1
          nameserver 8.8.8.8
        owner: root
        group: root
        mode: '0644'

    - name: Install baseline dependencies (NFS, cURL, etc)
      ansible.builtin.apt:
        name:
          - curl
          - htop
          - nano
          - ca-certificates
          - gnupg
          - nfs-common
          - open-iscsi
          - iptables
          - intel-media-va-driver-non-free
          - firmware-misc-nonfree
          - runc
        state: present

    - name: Ensure iptables-legacy is used (K3s requirement sometimes)
      ansible.builtin.alternatives:
        name: iptables
        path: /usr/sbin/iptables-legacy

    - name: Ensure ip6tables-legacy is used
      ansible.builtin.alternatives:
        name: ip6tables
        path: /usr/sbin/ip6tables-legacy

    - name: Allow IP forwarding in iptables (CNI requirement)
      ansible.builtin.command: iptables -w -P FORWARD ACCEPT
      changed_when: false

    - name: Enable and start iscsid (required by Longhorn storage)
      ansible.builtin.systemd:
        name: iscsid
        enabled: true
        state: started

    - name: Install NVIDIA Container Toolkit (Only if NVIDIA GPU is passed)
      ansible.builtin.shell: |
        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --yes --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
        curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
          sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
          tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
        DEBIAN_FRONTEND=noninteractive apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y nvidia-container-toolkit
      args:
        creates: /usr/bin/nvidia-ctk
      when: hostvars[proxmox_host]['has_nvidia'] | default(false)

    - name: Ensure /dev/kmsg is persistent via systemd-tmpfiles (LXC fix)
      ansible.builtin.copy:
        dest: /etc/tmpfiles.d/kmsg.conf
        content: 'L /dev/kmsg - - - - /dev/console'
        mode: '0644'

    - name: Apply systemd-tmpfiles for /dev/kmsg immediately
      ansible.builtin.command: systemd-tmpfiles --create /etc/tmpfiles.d/kmsg.conf
      changed_when: false
      ignore_errors: true

- name: K3s Master Node Setup
  hosts: k3s_master
  gather_facts: true
  
  tasks:
    - name: Check if K3s server is already installed
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_server_binary_before_write

    - name: Write K3s server config (LXC-compatible, KubeletInUserNamespace)
      ansible.builtin.copy:
        dest: /etc/rancher/k3s/config.yaml
        content: |
          kubelet-arg:
            - "feature-gates=KubeletInUserNamespace=true"
            - "read-only-port=0"
          tls-san:
            - "{{ ansible_host | default(groups['k3s_master'][0]) }}"
          disable:
            - servicelb
          write-kubeconfig-mode: "644"
          cluster-cidr: "{{ hostvars[inventory_hostname]['k3s_pod_cidr'] | default('10.42.0.0/16') }}"
          flannel-backend: host-gw
          resolv-conf: /etc/rancher/k3s/resolv.conf
        owner: root
        group: root
        mode: '0644'
      register: k3s_server_config

    - name: Download and install K3s Server
      ansible.builtin.shell: |
        INSTALL_K3S_VERSION="{{ lookup('env', 'HAAC_K3S_VERSION') | default('', true) }}"
        if [ -n "$INSTALL_K3S_VERSION" ]; then export INSTALL_K3S_VERSION; fi
        curl -sfL https://get.k3s.io | sh -s - server \
          --disable servicelb \
          --write-kubeconfig-mode 644 \
          --resolv-conf /etc/rancher/k3s/resolv.conf
      args:
        creates: /usr/local/bin/k3s

    - name: Fix K3s service definition for LXC compatibility (ignore modprobe failures)
      ansible.builtin.replace:
        path: /etc/systemd/system/k3s.service
        regexp: 'ExecStartPre=/sbin/modprobe'
        replace: 'ExecStartPre=-/sbin/modprobe'
      register: k3s_server_service_fix

    - name: Restart K3s server when config or service drift requires it
      ansible.builtin.include_tasks: tasks/restart_k3s_service.yml
      vars:
        k3s_service_name: k3s
        k3s_service_daemon_reload: "{{ k3s_server_service_fix.changed | default(false) }}"
      when:
        - (k3s_server_service_fix.changed | default(false))
          or ((k3s_server_config.changed | default(false)) and (k3s_server_binary_before_write.stat.exists | default(false)))

    - name: Wait for node-token
      ansible.builtin.wait_for:
        path: /var/lib/rancher/k3s/server/node-token

    - name: Read node-token from Master
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token_b64

    - name: Store node-token as fact
      ansible.builtin.set_fact:
        k3s_token: "{{ node_token_b64['content'] | b64decode | trim }}"
        cacheable: yes

    - name: Ensure local kubeconfig directory exists on the controller
      ansible.builtin.file:
        path: "{{ (lookup('env', 'HAAC_KUBECONFIG_PATH') | default((lookup('env', 'HOME') ~ '/.kube/haac-k3s.yaml'), true)) | dirname }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      become: false

    - name: Fetch kubeconfig from Master
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ lookup('env', 'HAAC_KUBECONFIG_PATH') | default((lookup('env', 'HOME') ~ '/.kube/haac-k3s.yaml'), true) }}"
        flat: yes

- name: K3s Worker Nodes Setup
  hosts: k3s_workers
  gather_facts: true

  tasks:
    - name: Check if K3s agent is already installed
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_agent_binary_before_write

    - name: Check if the K3s agent systemd unit already exists
      ansible.builtin.stat:
        path: /etc/systemd/system/k3s-agent.service
      register: k3s_agent_service_unit_before_write

    - name: Check if the K3s agent containerd config already exists
      ansible.builtin.stat:
        path: /var/lib/rancher/k3s/agent/etc/containerd/config.toml
      register: k3s_agent_containerd_config_before_write

    - name: Detect partial K3s worker bootstrap state
      ansible.builtin.set_fact:
        k3s_cluster_node_name: "{{ ansible_facts['hostname'] | default(worker_name | default(inventory_hostname)) }}"
        k3s_worker_partial_bootstrap: >-
          {{
            (k3s_agent_binary_before_write.stat.exists | default(false))
            and (
              not (k3s_agent_service_unit_before_write.stat.exists | default(false))
              or not (k3s_agent_containerd_config_before_write.stat.exists | default(false))
            )
          }}
        k3s_agent_registration_reset: false

    - name: Reset stale K3s worker registration before reinstall
      ansible.builtin.include_tasks: tasks/reset_stale_k3s_agent_registration.yml
      when: k3s_worker_partial_bootstrap | bool

    - name: Ensure K3s config directory exists on workers
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Write K3s agent base config (LXC-compatible)
      ansible.builtin.copy:
        dest: /etc/rancher/k3s/config.yaml
        content: |
          kubelet-arg:
            - "feature-gates=KubeletInUserNamespace=true"
            - "read-only-port=0"
          resolv-conf: /etc/rancher/k3s/resolv.conf
        owner: root
        group: root
        mode: '0644'
      register: k3s_worker_base_config

    - name: Remove legacy global NVIDIA default runtime from K3s agent config
      ansible.builtin.lineinfile:
        path: /etc/rancher/k3s/config.yaml
        regexp: '^default-runtime:\s*nvidia$'
        state: absent
      register: k3s_worker_default_runtime_removed

    - name: Download and install K3s Agent
      ansible.builtin.shell: |
        MASTER_IP="{{ groups['k3s_master'][0] }}"
        TOKEN="{{ hostvars[groups['k3s_master'][0]]['k3s_token'] | default('') }}"
        INSTALL_K3S_VERSION="{{ lookup('env', 'HAAC_K3S_VERSION') | default('', true) }}"
        if [ -z "$TOKEN" ]; then echo "TOKEN NOT FOUND" && exit 1; fi
        if [ -n "$INSTALL_K3S_VERSION" ]; then export INSTALL_K3S_VERSION; fi
        curl -sfL https://get.k3s.io | K3S_URL=https://${MASTER_IP}:6443 K3S_TOKEN=${TOKEN} sh -
      register: k3s_agent_install
      when:
        - not (k3s_agent_binary_before_write.stat.exists | default(false))
          or not (k3s_agent_service_unit_before_write.stat.exists | default(false))
          or (k3s_agent_registration_reset | default(false))

    - name: Fix K3s-agent service definition for LXC compatibility (ignore modprobe failures)
      ansible.builtin.replace:
        path: /etc/systemd/system/k3s-agent.service
        regexp: 'ExecStartPre=/sbin/modprobe'
        replace: 'ExecStartPre=-/sbin/modprobe'
      register: k3s_agent_service_fix

    - name: Start or recover K3s agent before runtime-specific mutation
      ansible.builtin.include_tasks: tasks/restart_k3s_service.yml
      vars:
        k3s_service_name: k3s-agent
        k3s_service_daemon_reload: "{{ k3s_agent_service_fix.changed | default(false) }}"
      when:
        - (k3s_agent_install.changed | default(false))
          or (k3s_agent_registration_reset | default(false))
          or (k3s_agent_service_fix.changed | default(false))
          or ((k3s_worker_base_config.changed | default(false)) and (k3s_agent_binary_before_write.stat.exists | default(false)))
          or (k3s_worker_default_runtime_removed.changed | default(false))
          or not (k3s_agent_containerd_config_before_write.stat.exists | default(false))

    - name: Wait for K3s containerd config.toml to be created (async after install)
      ansible.builtin.wait_for:
        path: /var/lib/rancher/k3s/agent/etc/containerd/config.toml
        state: present
        timeout: 60
      when: hostvars[proxmox_host]['has_nvidia'] | default(false)

    - name: Check whether the NVIDIA runtime handler is already present in K3s containerd config
      ansible.builtin.shell: grep -Fq 'BinaryName = "/usr/bin/nvidia-container-runtime"' /var/lib/rancher/k3s/agent/etc/containerd/config.toml
      args:
        executable: /bin/bash
      register: k3s_nvidia_runtime_present
      changed_when: false
      failed_when: false
      when: hostvars[proxmox_host]['has_nvidia'] | default(false)

    - name: Configure NVIDIA runtime handler in K3s containerd when missing
      ansible.builtin.shell: |
        nvidia-ctk runtime configure --runtime=containerd \
          --config=/var/lib/rancher/k3s/agent/etc/containerd/config.toml
      register: k3s_nvidia_runtime_configured
      changed_when: k3s_nvidia_runtime_configured.rc == 0
      when:
        - hostvars[proxmox_host]['has_nvidia'] | default(false)
        - k3s_nvidia_runtime_present.rc != 0

    - name: Restart K3s agent after NVIDIA runtime handler changes
      ansible.builtin.include_tasks: tasks/restart_k3s_service.yml
      vars:
        k3s_service_name: k3s-agent
        k3s_service_daemon_reload: "{{ k3s_agent_service_fix.changed | default(false) }}"
      when:
        - ((k3s_nvidia_runtime_configured is defined) and (k3s_nvidia_runtime_configured.changed | default(false)))

    - name: Relax degraded Longhorn admission webhooks before bootstrap node mutations
      ansible.builtin.include_tasks: tasks/relax_longhorn_admission_webhooks.yml
      vars:
        longhorn_webhook_delegate: "{{ groups['k3s_master'][0] }}"
      run_once: true

- name: K3s Cluster Networking Readiness Gate
  hosts: k3s_master:k3s_workers
  gather_facts: false

  tasks:
    - name: Restart K3s agents once after relaxing degraded Longhorn admission webhooks
      ansible.builtin.include_tasks: tasks/restart_k3s_service.yml
      vars:
        k3s_service_name: k3s-agent
        k3s_service_allow_activating: true
      when:
        - "'k3s_workers' in group_names"
        - hostvars[groups['k3s_master'][0]].longhorn_admission_webhooks_relaxed | default(false)

    - name: Wait for local flannel subnet state on K3s servers before GitOps bootstrap
      ansible.builtin.include_tasks: tasks/wait_for_flannel_subnet_env.yml
      vars:
        flannel_k3s_service_name: k3s
      when: "'k3s_master' in group_names"

    - name: Wait for local flannel subnet state on K3s agents before GitOps bootstrap
      ansible.builtin.include_tasks: tasks/wait_for_flannel_subnet_env.yml
      vars:
        flannel_k3s_service_name: k3s-agent
      when: "'k3s_workers' in group_names"


- name: Post-Installation GitOps Setup (ArgoCD & Configs)
  hosts: k3s_master
  gather_facts: false

  tasks:
    - name: Wait for all expected Kubernetes nodes to report Ready
      block:
        - name: Poll cluster node readiness before GitOps bootstrap
          ansible.builtin.shell: |
            set -euo pipefail
            total="$(k3s kubectl get nodes --no-headers | wc -l | tr -d ' ')"
            ready="$(k3s kubectl get nodes --no-headers | awk '$2 == "Ready" {count++} END {print count+0}')"
            test "$total" -eq "{{ (groups['k3s_master'] | length) + (groups['k3s_workers'] | length) }}"
            test "$ready" -eq "$total"
          args:
            executable: /bin/bash
          register: k3s_nodes_ready
          changed_when: false
          until: k3s_nodes_ready.rc == 0
          retries: 24
          delay: 5
      rescue:
        - name: Capture cluster node status
          ansible.builtin.command: k3s kubectl get nodes -o wide
          register: k3s_nodes_status
          changed_when: false
          failed_when: false

        - name: Capture kube-system pods before GitOps bootstrap
          ansible.builtin.command: k3s kubectl get pods -n kube-system -o wide
          register: k3s_kube_system_status
          changed_when: false
          failed_when: false

        - name: Fail with explicit cluster readiness diagnostics
          ansible.builtin.fail:
            msg: |
              Kubernetes node readiness did not converge before GitOps bootstrap.
              kubectl get nodes -o wide:
              {{ (k3s_nodes_status.stdout | default('') | trim) or 'no node output' }}

              kubectl get pods -n kube-system -o wide:
              {{ (k3s_kube_system_status.stdout | default('') | trim) or 'no kube-system output' }}

    - name: Wait for Kubernetes API to be completely ready
      ansible.builtin.command: k3s kubectl get nodes
      register: k8s_nodes
      until: k8s_nodes.rc == 0
      retries: 10
      delay: 10
      changed_when: false

    - name: Wait for cluster-side flannel and essential kube-system workloads before GitOps bootstrap
      ansible.builtin.include_tasks: tasks/wait_for_kube_system_core.yml

    - name: Re-check master local flannel subnet state immediately before cluster bootstrap installs
      ansible.builtin.include_tasks: tasks/wait_for_flannel_subnet_env.yml
      vars:
        flannel_k3s_service_name: k3s

    - name: Ensure argocd namespace exists for bootstrap
      ansible.builtin.command: k3s kubectl create namespace argocd --dry-run=client -o yaml
      register: argocd_ns_yaml
      changed_when: false

    - name: Apply argocd namespace bootstrap manifest
      ansible.builtin.command: k3s kubectl apply -f -
      args:
        stdin: "{{ argocd_ns_yaml.stdout }}"
      changed_when: false

    # --- Sealed Secrets Controller ---
    - name: Resolve Sealed Secrets controller bootstrap version
      ansible.builtin.set_fact:
        sealed_secrets_controller_version: >-
          {{
            lookup('env', 'HAAC_SEALED_SECRETS_CONTROLLER_VERSION')
            | default(lookup('env', 'HAAC_KUBESEAL_VERSION') | default('0.36.6', true), true)
          }}

    - name: Install Sealed Secrets Controller with control-plane placement
      ansible.builtin.include_tasks: tasks/apply_sealed_secrets_controller.yml

    - name: Wait for Sealed Secrets controller to be ready
      block:
        - name: Poll Sealed Secrets controller rollout status
          ansible.builtin.command: >
            k3s kubectl rollout status deploy/sealed-secrets-controller -n kube-system --timeout=300s
          register: ss_ready
          until: ss_ready.rc == 0
          retries: 3
          delay: 10
          changed_when: false

        - name: Wait for a ready Sealed Secrets controller pod
          ansible.builtin.command: >
            k3s kubectl wait --for=condition=Ready pod -n kube-system
            -l name=sealed-secrets-controller --timeout=180s
          register: ss_pod_ready
          until: ss_pod_ready.rc == 0
          retries: 2
          delay: 10
          changed_when: false

        - name: Verify Sealed Secrets controller pod is on a control-plane node
          ansible.builtin.shell: |
            set -euo pipefail
            pod_node="$(k3s kubectl get pod -n kube-system -l name=sealed-secrets-controller -o jsonpath='{.items[0].spec.nodeName}')"
            [ -n "$pod_node" ]
            control_plane_label="$(k3s kubectl get node "$pod_node" -o jsonpath='{.metadata.labels.node-role\.kubernetes\.io/control-plane}')"
            [ -n "$control_plane_label" ]
            printf 'sealed-secrets-controller node=%s control-plane=%s\n' "$pod_node" "$control_plane_label"
          args:
            executable: /bin/bash
          register: sealed_secrets_control_plane_placement
          changed_when: false
      rescue:
        - name: Capture Sealed Secrets deployment status
          ansible.builtin.command: k3s kubectl get deploy sealed-secrets-controller -n kube-system -o wide
          register: sealed_secrets_deployment_status
          changed_when: false
          failed_when: false

        - name: Capture Sealed Secrets pods
          ansible.builtin.shell: |
            set -o pipefail
            k3s kubectl get pods -n kube-system -o wide | grep sealed-secrets || true
          args:
            executable: /bin/bash
          register: sealed_secrets_pods_status
          changed_when: false
          failed_when: false

        - name: Capture Sealed Secrets pod names
          ansible.builtin.shell: |
            set -o pipefail
            k3s kubectl get pods -n kube-system -o custom-columns=NAME:.metadata.name --no-headers | grep sealed-secrets || true
          args:
            executable: /bin/bash
          register: sealed_secrets_pod_names
          changed_when: false
          failed_when: false

        - name: Capture Sealed Secrets pod describe output
          ansible.builtin.shell: |
            set -euo pipefail
            pods="$(k3s kubectl get pods -n kube-system -o custom-columns=NAME:.metadata.name --no-headers | grep sealed-secrets || true)"
            if [ -z "$pods" ]; then
              echo "no Sealed Secrets pod found in kube-system"
              exit 0
            fi
            first=1
            while IFS= read -r pod; do
              [ -n "$pod" ] || continue
              if [ "$first" -eq 0 ]; then
                printf '\n\n'
              fi
              first=0
              echo "### $pod"
              k3s kubectl describe pod -n kube-system "$pod"
            done <<< "$pods"
          args:
            executable: /bin/bash
          register: sealed_secrets_pod_describe
          changed_when: false
          failed_when: false

        - name: Capture Sealed Secrets pod logs
          ansible.builtin.shell: |
            set -euo pipefail
            pods="$(k3s kubectl get pods -n kube-system -o custom-columns=NAME:.metadata.name --no-headers | grep sealed-secrets || true)"
            if [ -z "$pods" ]; then
              echo "no Sealed Secrets pod found in kube-system"
              exit 0
            fi
            first=1
            while IFS= read -r pod; do
              [ -n "$pod" ] || continue
              if [ "$first" -eq 0 ]; then
                printf '\n\n'
              fi
              first=0
              echo "### $pod"
              k3s kubectl logs -n kube-system "$pod" --all-containers --tail=120 || true
            done <<< "$pods"
          args:
            executable: /bin/bash
          register: sealed_secrets_pod_logs
          changed_when: false
          failed_when: false

        - name: Capture Sealed Secrets pod placement
          ansible.builtin.shell: |
            set -euo pipefail
            k3s kubectl get pods -n kube-system -l name=sealed-secrets-controller -o custom-columns=NAME:.metadata.name,NODE:.spec.nodeName,READY:.status.containerStatuses[0].ready --no-headers || true
          args:
            executable: /bin/bash
          register: sealed_secrets_pod_placement
          changed_when: false
          failed_when: false

        - name: Capture kube-system events during Sealed Secrets rollout failure
          ansible.builtin.command: k3s kubectl get events -n kube-system --sort-by=.lastTimestamp
          register: sealed_secrets_events
          changed_when: false
          failed_when: false

        - name: Fail with explicit Sealed Secrets rollout diagnostics
          ansible.builtin.fail:
            msg: |
              Sealed Secrets controller did not become ready before timeout.
              kubectl get deploy sealed-secrets-controller -n kube-system -o wide:
              {{ (sealed_secrets_deployment_status.stdout | default('') | trim) or 'no deployment output' }}

              kubectl get pods -n kube-system | grep sealed-secrets:
              {{ (sealed_secrets_pods_status.stdout | default('') | trim) or 'no Sealed Secrets pod output' }}

              kubectl describe pod output:
              {{ (sealed_secrets_pod_describe.stdout | default('') | trim) or 'no Sealed Secrets pod describe output' }}

              kubectl logs output:
              {{ (sealed_secrets_pod_logs.stdout | default('') | trim) or 'no Sealed Secrets pod log output' }}

              kubectl get pods -n kube-system -l name=sealed-secrets-controller -o custom-columns=NAME:.metadata.name,NODE:.spec.nodeName,READY:.status.containerStatuses[0].ready:
              {{ (sealed_secrets_pod_placement.stdout | default('') | trim) or 'no Sealed Secrets placement output' }}

              kubectl get events -n kube-system --sort-by=.lastTimestamp:
              {{ (sealed_secrets_events.stdout | default('') | trim) or 'no event output' }}

    - name: Wait for Sealed Secrets master key to be generated
      ansible.builtin.shell: |
        k3s kubectl get secrets -n kube-system -l sealedsecrets.bitnami.com/sealed-secrets-key=active --no-headers | grep -q "sealed-secrets-key"
      register: ss_key_ready
      until: ss_key_ready.rc == 0
      retries: 24
      delay: 5

    # ArgoCD bootstrap ownership intentionally lives in scripts/haac.py -> deploy_argocd().
    # That path applies the repo-local install overlay so the bootstrap source of truth stays in Git.

- name: Deferred Kubernetes Node Label Reconciliation
  hosts: k3s_master:k3s_workers
  gather_facts: false

  tasks:
    - name: Apply deferred node label reconciliation after bootstrap core is stable
      ansible.builtin.include_tasks: tasks/apply_node_labels.yml

- name: Automated Security Updates (Unattended Upgrades)
  hosts: k3s_master:k3s_workers
  gather_facts: false

  tasks:
    - name: Install unattended-upgrades
      ansible.builtin.apt:
        name:
          - unattended-upgrades
          - apt-listchanges
        state: present

    - name: Configure auto-upgrades
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
          APT::Periodic::AutocleanInterval "7";
        mode: '0644'

    - name: Configure unattended-upgrades (security only)
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        content: |
          Unattended-Upgrade::Allowed-Origins {
              "${distro_id}:${distro_codename}";
              "${distro_id}:${distro_codename}-security";
              "${distro_id}ESMApps:${distro_codename}-apps-security";
              "${distro_id}ESM:${distro_codename}-infra-security";
          };
          Unattended-Upgrade::AutoFixInterruptedDpkg "true";
          Unattended-Upgrade::MinimalSteps "true";
          Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
          Unattended-Upgrade::Remove-Unused-Dependencies "true";
          Unattended-Upgrade::Automatic-Reboot "false";
          Unattended-Upgrade::Automatic-Reboot-WithUsers "false";
        mode: '0644'

    - name: Enable and start unattended-upgrades timer
      ansible.builtin.systemd:
        name: unattended-upgrades
        enabled: true
        state: started
