---
# HaaC Ansible Inventory
# Questo file è la versione statica dell'inventory generato da Terraform.
# Aggiornalo manualmente se cambi IP o nodi.

all:
  children:
    k3s_cluster:
      children:
        k3s_master:
          hosts:
            haacarr-master:
              ansible_host: 192.168.0.211
              ansible_user: root
        k3s_workers:
          hosts:
            haacarr-worker1:
              ansible_host: 192.168.0.212
              ansible_user: root
            haacarr-worker2:
              ansible_host: 192.168.0.213
              ansible_user: root
    proxmox_host:
      hosts:
        pve:
          ansible_host: 192.168.0.211   # Proxmox host stesso (stessa IP del master LXC)
          ansible_user: root
          ansible_port: 22
