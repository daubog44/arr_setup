- name: Wait for /run/flannel/subnet.env on {{ inventory_hostname }}
  vars:
    flannel_cluster_node_name: "{{ hostvars[inventory_hostname].get('ansible_facts', {}).get('hostname') or hostvars[inventory_hostname].get('worker_name') or inventory_hostname }}"
    flannel_master_delegate: "{{ groups['k3s_master'][0] }}"
    flannel_cluster_delegate: "{{ flannel_master_delegate if inventory_hostname != flannel_master_delegate else inventory_hostname }}"
  block:
    - name: Wait for flannel subnet.env file to exist
      ansible.builtin.wait_for:
        path: /run/flannel/subnet.env
        state: present
        timeout: "{{ flannel_subnet_env_timeout | default(180) }}"

    - name: Verify flannel subnet.env contains a subnet assignment
      ansible.builtin.shell: grep -q '^FLANNEL_SUBNET=' /run/flannel/subnet.env
      args:
        executable: /bin/bash
      register: flannel_subnet_env_check
      changed_when: false
      until: flannel_subnet_env_check.rc == 0
      retries: "{{ flannel_subnet_env_retries | default(12) }}"
      delay: "{{ flannel_subnet_env_delay | default(5) }}"
  rescue:
    - name: Relax degraded Longhorn admission webhooks before bounded K3s server-side flannel recovery
      ansible.builtin.include_tasks: relax_longhorn_admission_webhooks.yml
      vars:
        longhorn_webhook_delegate: "{{ flannel_master_delegate }}"
      when: flannel_k3s_service_name == 'k3s'

    - name: Attempt one bounded {{ flannel_k3s_service_name }} restart to recover local flannel state
      ansible.builtin.include_tasks: restart_k3s_service.yml
      vars:
        k3s_service_name: "{{ flannel_k3s_service_name }}"

    - name: Re-check /run/flannel/subnet.env after bounded service recovery
      block:
        - name: Wait for flannel subnet.env file to exist after restart
          ansible.builtin.wait_for:
            path: /run/flannel/subnet.env
            state: present
            timeout: "{{ flannel_subnet_env_timeout | default(180) }}"

        - name: Verify flannel subnet.env contains a subnet assignment after restart
          ansible.builtin.shell: grep -q '^FLANNEL_SUBNET=' /run/flannel/subnet.env
          args:
            executable: /bin/bash
          register: flannel_subnet_env_check_after_restart
          changed_when: false
          until: flannel_subnet_env_check_after_restart.rc == 0
          retries: "{{ flannel_subnet_env_retries | default(12) }}"
          delay: "{{ flannel_subnet_env_delay | default(5) }}"
      rescue:
        - name: Capture local flannel subnet.env content
          ansible.builtin.command: cat /run/flannel/subnet.env
          register: flannel_subnet_env_content
          changed_when: false
          failed_when: false

        - name: Capture {{ flannel_k3s_service_name }} status during flannel wait failure
          ansible.builtin.command: systemctl status {{ flannel_k3s_service_name }} --no-pager
          register: flannel_wait_service_status
          changed_when: false
          failed_when: false

        - name: Capture {{ flannel_k3s_service_name }} journal during flannel wait failure
          ansible.builtin.command: journalctl -u {{ flannel_k3s_service_name }} --no-pager -n 120
          register: flannel_wait_service_journal
          changed_when: false
          failed_when: false

        - name: Capture node routes during flannel wait failure
          ansible.builtin.command: ip -4 route
          register: flannel_wait_routes
          changed_when: false
          failed_when: false

        - name: Capture cluster-side node summary for {{ flannel_cluster_node_name }}
          ansible.builtin.command: k3s kubectl get node {{ flannel_cluster_node_name }} -o wide
          delegate_to: "{{ flannel_cluster_delegate }}"
          register: flannel_cluster_node_status
          changed_when: false
          failed_when: false

        - name: Capture cluster-side node describe for {{ flannel_cluster_node_name }}
          ansible.builtin.command: k3s kubectl describe node {{ flannel_cluster_node_name }}
          delegate_to: "{{ flannel_cluster_delegate }}"
          register: flannel_cluster_node_describe
          changed_when: false
          failed_when: false

        - name: Capture cluster-side kube-system pods for {{ flannel_cluster_node_name }}
          ansible.builtin.command: k3s kubectl get pods -n kube-system --field-selector spec.nodeName={{ flannel_cluster_node_name }} -o wide
          delegate_to: "{{ flannel_cluster_delegate }}"
          register: flannel_cluster_node_kube_system_pods
          changed_when: false
          failed_when: false

        - name: Capture cluster-wide kube-system pods during flannel wait failure
          ansible.builtin.command: k3s kubectl get pods -n kube-system -o wide
          delegate_to: "{{ flannel_cluster_delegate }}"
          register: flannel_cluster_kube_system_pods
          changed_when: false
          failed_when: false

        - name: Capture recent kube-system events during flannel wait failure
          ansible.builtin.command: k3s kubectl get events -n kube-system --sort-by=.lastTimestamp
          delegate_to: "{{ flannel_cluster_delegate }}"
          register: flannel_cluster_events
          changed_when: false
          failed_when: false

        - name: Fail with explicit flannel readiness diagnostics
          ansible.builtin.fail:
            msg: |
              {{ inventory_hostname }} did not produce a usable /run/flannel/subnet.env before GitOps bootstrap, even after one bounded {{ flannel_k3s_service_name }} restart.
              subnet.env content:
              {{ (flannel_subnet_env_content.stdout | default('') | trim) or 'file missing or empty' }}

              systemctl status {{ flannel_k3s_service_name }}:
              {{ (flannel_wait_service_status.stdout | default('') | trim) or 'no status output' }}

              journalctl -u {{ flannel_k3s_service_name }} -n 120:
              {{ (flannel_wait_service_journal.stdout | default('') | trim) or 'no journal output' }}

              ip -4 route:
              {{ (flannel_wait_routes.stdout | default('') | trim) or 'no route output' }}

              kubectl get node {{ flannel_cluster_node_name }} -o wide:
              {{ (flannel_cluster_node_status.stdout | default('') | trim) or 'no node output' }}

              kubectl describe node {{ flannel_cluster_node_name }}:
              {{ (flannel_cluster_node_describe.stdout | default('') | trim) or 'no node describe output' }}

              kube-system pods on {{ flannel_cluster_node_name }}:
              {{ (flannel_cluster_node_kube_system_pods.stdout | default('') | trim) or 'no kube-system pods matched the affected node' }}

              cluster-wide kube-system pods:
              {{ (flannel_cluster_kube_system_pods.stdout | default('') | trim) or 'no kube-system pod output' }}

              kube-system events:
              {{ (flannel_cluster_events.stdout | default('') | trim) or 'no kube-system event output' }}
