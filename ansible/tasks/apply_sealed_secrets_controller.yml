- name: Render and apply Sealed Secrets controller bootstrap manifest with control-plane placement
  ansible.builtin.shell: |
    set -euo pipefail

    tmp_dir="$(mktemp -d)"
    cleanup() {
      rm -rf "$tmp_dir"
    }
    trap cleanup EXIT

    curl -fsSL "https://github.com/bitnami-labs/sealed-secrets/releases/download/v{{ sealed_secrets_controller_version }}/controller.yaml" -o "$tmp_dir/controller.yaml"

    cat > "$tmp_dir/kustomization.yaml" <<'EOF'
    resources:
      - controller.yaml
    patches:
      - target:
          group: apps
          version: v1
          kind: Deployment
          name: sealed-secrets-controller
          namespace: kube-system
        patch: |-
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: sealed-secrets-controller
            namespace: kube-system
          spec:
            template:
              metadata:
                annotations:
                  haac.io/bootstrap-placement: control-plane
              spec:
                nodeSelector:
                  node-role.kubernetes.io/control-plane: "true"
                tolerations:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
                    effect: NoSchedule
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
                    effect: NoExecute
    EOF

    k3s kubectl apply -k "$tmp_dir"
  args:
    executable: /bin/bash
  register: sealed_secrets_result
  changed_when: >
    'created' in sealed_secrets_result.stdout
    or 'configured' in sealed_secrets_result.stdout
    or 'patched' in sealed_secrets_result.stdout
