- name: Wait for essential kube-system workloads required before GitOps bootstrap
  vars:
    kube_system_core_deployments:
      - coredns
      - local-path-provisioner
      - metrics-server
  block:
    - name: Poll essential kube-system deployment availability
      ansible.builtin.shell: |
        set -euo pipefail
        for deployment in {{ kube_system_core_deployments | join(' ') }}; do
          k3s kubectl get deployment "$deployment" -n kube-system >/dev/null 2>&1
          k3s kubectl rollout status "deployment/$deployment" -n kube-system --timeout=20s >/dev/null
        done
      args:
        executable: /bin/bash
      register: kube_system_core_ready
      changed_when: false
      until: kube_system_core_ready.rc == 0
      retries: 12
      delay: 10
  rescue:
    - name: Capture kube-system deployments before GitOps bootstrap
      ansible.builtin.command: k3s kubectl get deployment -n kube-system -o wide
      register: kube_system_deployments_status
      changed_when: false
      failed_when: false

    - name: Capture kube-system pods before GitOps bootstrap
      ansible.builtin.command: k3s kubectl get pods -n kube-system -o wide
      register: kube_system_pods_status
      changed_when: false
      failed_when: false

    - name: Capture kube-system events before GitOps bootstrap
      ansible.builtin.command: k3s kubectl get events -n kube-system --sort-by=.lastTimestamp
      register: kube_system_events_status
      changed_when: false
      failed_when: false

    - name: Fail with explicit kube-system core readiness diagnostics
      ansible.builtin.fail:
        msg: |
          Essential kube-system workloads did not converge before GitOps bootstrap.
          kubectl get deployment -n kube-system -o wide:
          {{ (kube_system_deployments_status.stdout | default('') | trim) or 'no deployment output' }}

          kubectl get pods -n kube-system -o wide:
          {{ (kube_system_pods_status.stdout | default('') | trim) or 'no pod output' }}

          kubectl get events -n kube-system --sort-by=.lastTimestamp:
          {{ (kube_system_events_status.stdout | default('') | trim) or 'no event output' }}
