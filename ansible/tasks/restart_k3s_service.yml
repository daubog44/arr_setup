- name: Reload systemd daemon for {{ k3s_service_name }}
  ansible.builtin.command: systemctl daemon-reload
  changed_when: true
  when: k3s_service_daemon_reload | default(false)

- name: Restart {{ k3s_service_name }} without indefinite blocking
  ansible.builtin.command: systemctl restart --no-block {{ k3s_service_name }}
  changed_when: true

- name: Wait for {{ k3s_service_name }} to become active
  block:
    - name: Poll {{ k3s_service_name }} active state
      ansible.builtin.command: systemctl is-active {{ k3s_service_name }}
      register: k3s_service_state
      changed_when: false
      failed_when: false
      until: (k3s_service_state.stdout | trim) in (['active'] + (['activating'] if (k3s_service_allow_activating | default(false)) else []))
      retries: "{{ k3s_service_wait_retries | default(36) }}"
      delay: "{{ k3s_service_wait_delay | default(5) }}"
  rescue:
    - name: Read final {{ k3s_service_name }} active state
      ansible.builtin.command: systemctl is-active {{ k3s_service_name }}
      register: k3s_service_active
      changed_when: false
      failed_when: false

    - name: Capture {{ k3s_service_name }} status
      ansible.builtin.shell: |
        python3 - <<'PY'
        import subprocess
        import sys

        proc = subprocess.run(
            ["systemctl", "status", "{{ k3s_service_name }}", "--no-pager", "--full"],
            stdout=subprocess.PIPE,
            stderr=subprocess.STDOUT,
            check=False,
        )
        sys.stdout.write(proc.stdout.decode("utf-8", "replace"))
        PY
      args:
        executable: /bin/bash
      register: k3s_service_status
      changed_when: false
      failed_when: false

    - name: Capture {{ k3s_service_name }} journal
      ansible.builtin.shell: |
        python3 - <<'PY'
        import subprocess
        import sys

        proc = subprocess.run(
            ["journalctl", "-u", "{{ k3s_service_name }}", "--no-pager", "-n", "80", "-o", "cat"],
            stdout=subprocess.PIPE,
            stderr=subprocess.STDOUT,
            check=False,
        )
        sys.stdout.write(proc.stdout.decode("utf-8", "replace"))
        PY
      args:
        executable: /bin/bash
      register: k3s_service_journal
      changed_when: false
      failed_when: false

    - name: Fail with bounded {{ k3s_service_name }} recovery diagnostics
      ansible.builtin.fail:
        msg: |
          {{ k3s_service_name }} did not become active within the configured recovery window.
          Last systemctl is-active result: {{ (k3s_service_active.stdout | default(k3s_service_state.stdout) | trim) or 'unknown' }}
          systemctl status {{ k3s_service_name }}:
          {{ (k3s_service_status.stdout | default('') | trim) or 'no status output' }}

          journalctl -u {{ k3s_service_name }} -n 80:
          {{ (k3s_service_journal.stdout | default('') | trim) or 'no journal output' }}
