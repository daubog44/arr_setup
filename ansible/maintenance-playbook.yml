---
# Separate maintenance playbook file (not a ConfigMap anymore - stored in repo)
# Location: HaaC/ansible/maintenance-playbook.yml
# Semaphore will clone the repo and find this file via:
#   playbook: HaaC/ansible/maintenance-playbook.yml

- name: Rolling OS Update (K3s Nodes)
  hosts: k3s_master,k3s_workers
  serial: 1          # One node at a time - zero downtime
  gather_facts: false
  tasks:
    - name: Wait for node to be reachable
      ansible.builtin.wait_for_connection:
        timeout: 60

    - name: Update apt cache and upgrade all packages
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        dpkg_options: 'force-confold,force-confdef'
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Log reboot status
      ansible.builtin.debug:
        msg: "Node {{ inventory_hostname }} {{ 'NEEDS REBOOT — Kured will handle it tonight' if reboot_required.stat.exists else 'is up to date ✅' }}"

- name: Rolling OS Update (Proxmox Hosts)
  hosts: proxmox_host
  serial: 1          # One host at a time - cluster keeps running
  gather_facts: false
  tasks:
    - name: Wait for host to be reachable
      ansible.builtin.wait_for_connection:
        timeout: 60

    - name: Update apt cache and upgrade all packages
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        dpkg_options: 'force-confold,force-confdef'
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Log Proxmox host reboot status
      ansible.builtin.debug:
        msg: "Proxmox host {{ inventory_hostname }} {{ 'needs a manual reboot when convenient ⚠️' if reboot_required.stat.exists else 'is up to date ✅' }}"
