version: "3"

vars:
  HAAC_CMD: '{{default "haac" .HAAC_CMD}}'
  PYTHON_CMD: '{{default "python" .PYTHON_CMD}}'
  TOFU_DIR: '{{default "tofu" .TOFU_DIR}}'
  DOMAIN_NAME_VALUE:
    sh: '{{.HAAC_CMD}} env-value --name DOMAIN_NAME'
  KUBECTL:
    sh: '{{.HAAC_CMD}} tool-path --name kubectl'
  HELM:
    sh: '{{.HAAC_CMD}} tool-path --name helm'
  K3S_KUBECONFIG:
    sh: '{{.HAAC_CMD}} kubeconfig-path'
  MASTER_IP:
    sh: '{{.HAAC_CMD}} master-ip'
  PROXMOX_HOST:
    sh: '{{.HAAC_CMD}} proxmox-access-host'

tasks:
  operator-up:
    desc: Internal ordered bootstrap used by the Cobra-owned `haac up` command.
    cmds:
      - task: :preflight
      - task: :setup-hooks
      - task: :provision-infra
      - task: :configure-os
      - task: :gitops-bootstrap
      - task: verify-all

  operator-down:
    desc: Internal destroy path used by the Cobra-owned `haac down` command.
    cmds:
      - task: :check-env
      - task: :shutdown-cluster
      - '{{.HAAC_CMD}} run-tofu --dir "{{.TOFU_DIR}}" -- init'
      - '{{.HAAC_CMD}} run-tofu --dir "{{.TOFU_DIR}}" -- destroy -auto-approve'
      - '{{.HAAC_CMD}} remove-file --path "scripts/pub-sealed-secrets.pem"'

  gitops-bootstrap:
    desc: Internal GitOps bootstrap orchestration up to staged ArgoCD health.
    cmds:
      - task: generate-secrets
      - task: push-changes
      - task: deploy-argocd
      - task: wait-for-argocd-sync

  verify-all:
    desc: Internal cluster and public-surface verification chain.
    cmds:
      - task: verify-cluster
      - task: repair-litmus-admin
      - task: repair-litmus-chaos
      - task: verify-endpoints
      - task: clear-crowdsec-operator-ban
      - task: verify-browser-auth

  deploy-argocd:
    desc: Apply the ArgoCD app manifests with DOMAIN_NAME substitution.
    cmds:
      - '{{.HAAC_CMD}} deploy-argocd'

  generate-secrets:
    desc: Fetch the Sealed Secrets public cert, hydrate templates, and regenerate local Sealed Secrets.
    cmds:
      - '{{.HAAC_CMD}} generate-secrets'

  generate-secrets-local:
    desc: Regenerate repo-managed Sealed Secrets against an existing kubeconfig without fetching a new cert.
    cmds:
      - '{{.HAAC_CMD}} generate-secrets-local'

  push-changes:
    desc: Regenerate sealed secrets from the cached cert, then push only the GitOps source of truth without performing Git merge policy.
    cmds:
      - '{{.HAAC_CMD}} push-changes'

  wait-for-argocd-sync:
    desc: Wait through staged ArgoCD root/platform/workload gates and the critical downloader readiness gate.
    cmds:
      - '{{.HAAC_CMD}} wait-for-stack'

  verify-cluster:
    desc: Run cluster-level checks over the remote K3s API.
    cmds:
      - '{{.HAAC_CMD}} verify-cluster'

  verify-endpoints:
    desc: Check the public HTTP endpoints exposed through Cloudflare and Traefik, reporting full versus partial success.
    cmds:
      - '{{.HAAC_CMD}} verify-web'

  repair-litmus-admin:
    desc: Reconcile the Litmus admin account from the repo-managed secret when the persisted MongoDB state drifted.
    cmds:
      - '{{.HAAC_CMD}} reconcile-litmus-admin'

  repair-litmus-chaos:
    desc: Reconcile a usable Litmus environment and default chaos infrastructure without manual YAML apply.
    cmds:
      - '{{.HAAC_CMD}} reconcile-litmus-chaos'

  verify-browser-auth:
    desc: Run browser-level auth verification for the official public UI surface using the repo-local Playwright verifier.
    cmds:
      - 'node "scripts/verify-public-auth.mjs"'

  clear-crowdsec-operator-ban:
    desc: Remove the current operator workstation from the temporary CrowdSec AppSec out-of-band ban list before browser verification.
    cmds:
      - '{{.HAAC_CMD}} clear-crowdsec-operator-ban'

  sync-cloudflare:
    desc: Reconcile Cloudflare Tunnel ingress rules and the required DNS records.
    cmds:
      - '{{.HAAC_CMD}} sync-cloudflare'

  configure-apps:
    desc: Manual fallback bootstrap for QUI and qBittorrent when the in-cluster bootstrap Job must be retriggered explicitly.
    cmds:
      - '{{.HAAC_CMD}} reconcile-media-stack'

  configure-argocd-local-auth:
    desc: Optionally configure a local ArgoCD username/password fallback on top of the declarative OIDC setup.
    cmds:
      - '{{.HAAC_CMD}} configure-argocd-local-auth --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'

  sync-repo:
    desc: Checkpoint and align the GitOps repository state before publication.
    cmds:
      - '{{.HAAC_CMD}} sync-repo'

  clean-artifacts:
    desc: Remove local investigation artifacts outside .tmp.
    cmds:
      - '{{.HAAC_CMD}} clean-artifacts'

  pre-commit-hook:
    desc: Regenerate repo-managed secrets when the local cluster kubeconfig is usable during git pre-commit.
    cmds:
      - '{{.HAAC_CMD}} pre-commit-hook'

  deploy-local:
    desc: Deploy the local haac-stack chart when ArgoCD is not already managing it.
    cmds:
      - '{{.HAAC_CMD}} deploy-local --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}" --helm "{{.HELM}}"'

  cleanup-security-signal-residue:
    desc: Prune stale security-report residue left by historical rollout objects.
    cmds:
      - '{{.HAAC_CMD}} cleanup-security-signal-residue'

  reconcile-media-stack:
    desc: Reconcile the repo-managed media stack readiness surface.
    cmds:
      - '{{.HAAC_CMD}} reconcile-media-stack'

  verify-arr-flow:
    desc: Run the ARR end-to-end verification path.
    cmds:
      - '{{.HAAC_CMD}} verify-arr-flow'

  restore-k3s:
    desc: Restore K3s from the selected NAS backup file.
    vars:
      BACKUP_FILE: '{{default "k3s-state-latest.db" .BACKUP_FILE}}'
      NAS_MOUNT_PATH: '{{default "/mnt/pve/HaaC-Storage/media/k3s" .NAS_MOUNT_PATH}}'
    cmds:
      - '{{.HAAC_CMD}} restore-k3s --proxmox-host "{{.PROXMOX_HOST}}" --tofu-dir "{{.TOFU_DIR}}" --backup-file "{{.BACKUP_FILE}}" --nas-mount-path "{{.NAS_MOUNT_PATH}}"'

  monitor:
    desc: Open an interactive cluster monitor session.
    cmds:
      - '{{.HAAC_CMD}} monitor --master-ip "{{.MASTER_IP}}" --proxmox-host "{{.PROXMOX_HOST}}" --kubeconfig "{{.K3S_KUBECONFIG}}" --kubectl "{{.KUBECTL}}"'
